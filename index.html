function keywordGrade(q,ans){
  const norm=s=>s.toLowerCase().replace(/\s|[.,·()\[\]'"]/g,'');
  const na=norm(ans);
  const hit=q.keys.filter(k=>na.includes(norm(k)));
  const ratio=q.keys.length?hit.length/q.keys.length:0;
  const score=Math.round(ratio*100);
  const correct=ratio>=0.6, partial=!correct&&ratio>=0.3;
  let fb;
  if(correct)fb=`핵심 키워드 ${hit.length}/${q.keys.length}개를 잘 짚었어요.`;
  else if(partial)fb=`핵심 일부(${hit.length}/${q.keys.length})만 담겼어요. 빠진 키워드: ${q.keys.filter(k=>!hit.includes(k)).join(', ')}`;
  else fb=`핵심을 더 담아야 해요. 필요한 키워드: ${q.keys.join(', ')}`;
  return {score,correct,partial,fb,ai:false};
}
async function aiGrade(q,ans){
  const sys='너는 국제개발협력(ODA) 자격시험의 서술형 채점관이다. 학생 답안이 문제의 핵심 의미를 정확히 파악했는지 "의미 기반"으로 평가하라(단순 키워드 일치가 아니라 개념 이해 여부). 반드시 JSON 객체 하나만 출력: {"score": 0~100 정수, "correct": true 또는 false, "feedback": "한국어 2문장 이내, 무엇을 맞혔고 무엇이 빠졌는지"}';
  const user=`[문제]\n${q.q}\n\n[모범답안]\n${q.model||q.ex||''}\n\n[채점 참고 키워드]\n${(q.keys||[]).join(', ')}\n\n[학생 답안]\n${ans}\n\n핵심 의미를 담았으면 correct=true. JSON만 출력하라.`;
  let text;
  if(CFG.aiProvider==='anthropic'){
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'x-api-key':CFG.aiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','content-type':'application/json'},
      body:JSON.stringify({model:CFG.aiModel||'claude-3-5-haiku-latest',max_tokens:400,system:sys,messages:[{role:'user',content:user}]})});
    if(!res.ok)throw new Error('Anthropic HTTP '+res.status);
    const d=await res.json();text=(d.content&&d.content[0]&&d.content[0].text)||'';
  }else{ // OpenAI 호환
    const base=(CFG.aiBase||'https://api.openai.com/v1').replace(/\/$/,'');
    const res=await fetch(base+'/chat/completions',{method:'POST',
      headers:{'Authorization':'Bearer '+CFG.aiKey,'content-type':'application/json'},
      body:JSON.stringify({model:CFG.aiModel||'gpt-4o-mini',temperature:0,messages:[{role:'system',content:sys},{role:'user',content:user}]})});
    if(!res.ok)throw new Error('OpenAI HTTP '+res.status);
    const d=await res.json();text=(d.choices&&d.choices[0]&&d.choices[0].message.content)||'';
  }
  const m=text.match(/\{[\s\S]*\}/);const j=JSON.parse(m?m[0]:text);
  const score=Math.max(0,Math.min(100,Math.round(Number(j.score)||0)));
  const correct=(j.correct===true)||(j.correct===undefined&&score>=60);
  return {score,correct,partial:(!correct&&score>=40),fb:j.feedback||'',ai:true};
}
async function gradeFree(q){
  const ans=($('#fa').value||'').trim();
  if(!ans){toast('답을 입력해 주세요');return;}
  QUIZ._ans=true;$('#fa').disabled=true;
  if(CFG.aiProvider&&CFG.aiProvider!=='none'&&CFG.aiKey){
    const btn=$('#qc');if(btn){btn.disabled=true;btn.textContent='🤖 AI가 채점 중...';}
    try{const r=await aiGrade(q,ans);finishQ(r.correct,q,ans,r);return;}
    catch(e){toast('AI 채점 실패('+e.message+') — 키워드 채점으로 대체');}
  }
  finishQ.call(null,...(()=>{const r=keywordGrade(q,ans);return [r.correct,q,ans,r];})());
}
function finishQ(correct,q,myAns,free){
  QUIZ.records.push({q,correct,myAns,free});
  if(correct)QUIZ.correct++;
  const foot=$('#qf');
  if(correct){SND.correct();foot.className='qfoot ok';}

  else {SND.wrong();foot.className='qfoot no';}
  const head=correct?'정답이에요!':(free&&free.partial?'거의 맞았어요':'아쉬워요');
  const icon=correct?'✓':(free&&free.partial?'~':'✕');
  let exHtml=`<div class="ex">${q.ex||''}</div>`;
  if(free){exHtml=`<div class="ex"><b>${free.ai?'🤖 AI 채점':'📝 키워드 채점'} (점수 ${free.score}%)</b><br>${free.fb}</div>
     <div class="modelans"><span class="ml">모범답안</span><br>${q.model||q.ex||''}</div>`;}
  foot.innerHTML=`<div class="fb"><div class="ic">${icon}</div><div><div class="fbt">${head}</div>${exHtml}</div></div>
    <button class="btn ${correct?'':(free&&free.partial?'gold':'red')}" id="qc">${QUIZ.i+1<QUIZ.total?'계속':'결과 보기'}</button>`;
  $('#qc').onclick=()=>{QUIZ._ans=false;nextQuiz();};
}
function nextQuiz(){SND.click();if(QUIZ.i+1<QUIZ.total){QUIZ.i++;renderQuiz();}else finishLesson();}

/* ===================== 결과 + 복습 토글 ===================== */
function finishLesson(){
  const l=CUR.lesson,acc=QUIZ.total?QUIZ.correct/QUIZ.total:0,plan=buildPlan();
  const passed=acc>=plan.pass,best=Math.round(acc*100),secs=Math.round((Date.now()-QUIZ.start)/1000);
  const st=lp(l.id),first=st.status!=='done';let gained=0;
  if(passed){
    gained=(first?15:5)+QUIZ.correct*2+(best>=100?5:0);S.xp+=gained;
    S.progress[l.id]={status:'done',best:Math.max(best,st.best||0),due:nextReview(best)};
    const ls=allLessons(),idx=ls.findIndex(x=>x.lesson.id===l.id);
    if(idx+1<ls.length){const nx=ls[idx+1].lesson.id;if(lp(nx).status==='locked')S.progress[nx]={status:'active',best:0};}
    recordStudy();SND.complete();
  } else SND.wrong();
  save();
  const tag={mc:'객관식',ox:'정/오',free:'자유응답'};
  const sc=newScreen();
  sc.innerHTML=`<div class="lesson-top"><button class="x-btn" id="lx">✕</button><div class="lesson-bar"><span style="width:100%"></span></div></div>
   <div class="result">
     <div class="rscore"><div class="big">${QUIZ.correct} / ${QUIZ.total} <small>정답 (${best}%)</small></div><div class="date">${l.title} · ${new Date().toLocaleDateString('ko-KR')}</div></div>
     <div class="rstats"><div class="rbox acc"><div class="rl">정답률</div><div class="rv">${best}%</div></div><div class="rbox xp"><div class="rl">획득 XP</div><div class="rv">+${gained}</div></div><div class="rbox tm"><div class="rl">소요</div><div class="rv">${secs}s</div></div></div>
     <button class="btn ${passed?'':'red'}" id="rmain">${passed?'다음 개념으로 이동 →':'다시 도전하기'}</button>
     ${passed?'':'<button class="btn ghost sm" id="rreview" style="margin-top:9px">개념 다시 보기</button>'}
     <div style="margin:18px 0 8px;font-weight:800;color:#666;font-size:.9rem">📋 문제별 복습 (눌러서 펼치기)</div>
     ${QUIZ.records.map((r,i)=>`<div class="revitem" data-i="${i}"><div class="revq ${r.correct?'ok':'no'}"><div class="ri">${r.correct?'✓':'✕'}</div><div class="qtx"><span class="qt qtype ${r.q.t}">${tag[r.q.t]}</span>${r.q.q}</div><span class="chev">▾</span></div>
       <div class="revbody">
         ${r.q.t==='free'?`<div class="ra mine"><span class="ral">내 답변</span><br>${esc(r.myAns)}</div><div class="ra ans"><span class="ral">모범답안</span><br>${r.q.model||r.q.ex||''}</div>`:
           `<div class="ra ${r.correct?'ans':'mine'}"><span class="ral">내 선택</span><br>${esc(r.myAns)}</div>${r.correct?'':`<div class="ra ans"><span class="ral">정답</span><br>${r.q.t==='ox'?(r.q.a?'맞다':'아니다'):esc(r.q.choices[r.q.a])}</div>`}`}
         <div class="rex">💬 ${r.q.ex||''}</div>
       </div></div>`).join('')}
   </div>`;
  $('#lx').onclick=closeScreen;
  sc.querySelectorAll('.revitem').forEach(it=>it.querySelector('.revq').addEventListener('click',()=>{SND.click();it.classList.toggle('open');}));
  $('#rmain').onclick=()=>{SND.click();passed?renderBridge():startQuiz();};
  const rr=$('#rreview');if(rr)rr.onclick=()=>{SND.click();renderConcept(0);};
}
function nextReview(best){const d=best>=100?4:best>=85?2:1;return new Date(Date.now()+d*864e5).toISOString().slice(0,10);}
function isDue(id){const st=lp(id);return st.status==='done'&&st.due&&st.due<=todayStr();}
function recordStudy(){const t=todayStr();let d=S.studyDays.find(x=>x.date===t);if(!d){d={date:t,count:0};S.studyDays.push(d);}d.count++;
  if(S.lastStudy!==t){const y=new Date(Date.now()-864e5).toISOString().slice(0,10);S.streak=(S.lastStudy===y)?S.streak+1:1;S.lastStudy=t;}}

/* ===================== 개념 연결(브릿지) ===================== */
function renderBridge(){
  const l=CUR.lesson,ls=allLessons(),idx=ls.findIndex(x=>x.lesson.id===l.id);
  const nextX=ls[idx+1];const b=l.bridge||{};
  const sc=newScreen();
  sc.innerHTML=`<div class="lesson-top"><button class="x-btn" id="lx">✕</button><div class="lesson-bar"><span style="width:100%"></span></div></div>
   <div class="bridge"><div class="chk">✓</div><h2>개념 완료!</h2><div class="muted" style="font-weight:700">${l.title}</div>
     ${b.lead?`<div class="bcard link"><div class="bh">✨ 다음으로 연결</div><p>${b.lead}</p></div>`:''}
     ${nextX?`<div class="bcard next"><div class="bh">➡️ 다음 내용</div><div class="nt">${nextX.lesson.title}</div><p>${b.nextPreview||(nextX.unit!==CUR.unit?('['+nextX.unit.title+'] 단원으로 이어집니다.'):'바로 이어서 학습할 수 있어요.')}</p></div>`:`<div class="bcard next"><div class="bh">🏁 마지막 개념</div><p>모든 단원을 한 바퀴 돌았어요! 복습 탭에서 약점을 다지세요.</p></div>`}
     <button class="btn" id="bn" style="margin-top:20px">${nextX?'계속 →':'학습 경로로'}</button>
     <button class="btn ghost sm" id="bp" style="margin-top:9px">학습 경로 보기</button></div>`;

  $('#bn').onclick=()=>{SND.click();if(nextX&&lp(nextX.lesson.id).status!=='locked'){openLesson(nextX.lesson.id);}else closeScreen();};

}

/* ===================== 복습 탭 ===================== */
function renderReview(){
  NAV='review';const ls=allLessons();
  const due=ls.filter(x=>isDue(x.lesson.id));
  const doneWeak=ls.filter(x=>lp(x.lesson.id).status==='done'&&lp(x.lesson.id).best<100);
  let html=`<div class="topbar"><div class="stat streak">🔥${S.streak}</div><div style="flex:1;text-align:center;font-weight:900">복습</div><div class="stat xp">⭐${S.xp}</div></div>
   <div class="page">
     <div class="card" style="border-color:var(--blue)"><div style="font-weight:900;margin-bottom:6px">🔄 오늘 복습할 레슨</div>
       ${due.length?due.map(x=>`<button class="btn blue sm" style="margin-bottom:8px;text-align:left" data-l="${x.lesson.id}">${x.lesson.title} <span style="opacity:.8;font-size:.8rem">· ${x.unit.title.split('.')[0]}</span></button>`).join(''):'<p class="muted" style="font-size:.9rem">아직 복습할 레슨이 없어요. 레슨을 완료하면 간격을 두고 복습 알림이 떠요. (분산복습)</p>'}</div>
     <div class="card"><div style="font-weight:900;margin-bottom:4px">🎯 약점 모아풀기</div><p class="muted" style="font-size:.85rem;margin-bottom:10px">완료한 레슨에서 100%가 아니었던 단원의 문제를 섞어 다시 풀어요. (교차연습)</p>
       <button class="btn" id="weak" ${doneWeak.length?'':'disabled'}>${doneWeak.length?`약점 ${doneWeak.length}개 단원 모아풀기 시작`:'아직 약점 데이터가 없어요'}</button></div>
   </div>`+navBar('review');
  app.innerHTML=html;
  app.querySelectorAll('[data-l]').forEach(b=>b.addEventListener('click',()=>{SND.click();openLesson(b.dataset.l);}));
  const w=$('#weak');if(w&&doneWeak.length)w.onclick=()=>{SND.click();startMixed(doneWeak);};
  bindNav();
}
function startMixed(weak){
  // 약점 단원들의 문제를 섞어서 가상 레슨 구성
  let pool=[];weak.forEach(x=>quizItems(x.lesson).forEach(q=>pool.push(q)));
  pool=pool.sort(()=>Math.random()-.5).slice(0,Math.min(8,pool.length));
  CUR={unit:{title:'복습'},lesson:{id:'__mix__',title:'약점 모아풀기',concept:{points:['틀리기 쉬운 문제를 섞어 풀어요']},quiz:pool,bridge:{lead:'복습으로 장기기억이 강해졌어요!'}}};
  QUIZ={i:0,correct:0,total:pool.length,records:[],start:Date.now()};renderQuiz();
}

       ${sched.map((day,di)=>{const date=new Date(plan.today.getTime()+di*864e5);const ad=day.every(x=>lp(x.lesson.id).status==='done');

/* ===================== Supabase 동기화 ===================== */
let pushT=null;
function syncReady(){return CFG.supaUrl&&CFG.supaKey&&CFG.syncCode;}
function scheduleCloudPush(){if(!syncReady())return;clearTimeout(pushT);pushT=setTimeout(()=>cloudPush(false),2500);}
async function cloudPush(manual){
  if(!syncReady())return '동기화 정보를 먼저 저장하세요.';
  try{
    const r=await fetch(`${CFG.supaUrl}/rest/v1/oda_progress?on_conflict=code`,{method:'POST',
      headers:{apikey:CFG.supaKey,Authorization:'Bearer '+CFG.supaKey,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify([{code:CFG.syncCode,data:S,updated_at:new Date().toISOString()}])});
    if(!r.ok)throw new Error('HTTP '+r.status);
    return manual?'✅ 클라우드에 저장됐어요.':'';
  }catch(e){return '❌ 실패: '+e.message+' (설정/테이블 확인)';}
}
async function cloudPull(){
  if(!syncReady())return '동기화 정보를 먼저 저장하세요.';
  try{
    const r=await fetch(`${CFG.supaUrl}/rest/v1/oda_progress?code=eq.${encodeURIComponent(CFG.syncCode)}&select=data`,{headers:{apikey:CFG.supaKey,Authorization:'Bearer '+CFG.supaKey}});
    if(!r.ok)throw new Error('HTTP '+r.status);const rows=await r.json();
    if(!rows.length)return '클라우드에 저장된 진도가 없어요.';
    S=Object.assign({},DEF,rows[0].data);localStorage.setItem(LS,JSON.stringify(S));initProgress();render();return '✅ 가져왔어요!';
  }catch(e){return '❌ 실패: '+e.message;}
}
async function cloudAutoLoad(){
  if(!syncReady())return;
  try{
    const r=await fetch(`${CFG.supaUrl}/rest/v1/oda_progress?code=eq.${encodeURIComponent(CFG.syncCode)}&select=data,updated_at`,{headers:{apikey:CFG.supaKey,Authorization:'Bearer '+CFG.supaKey}});
    if(!r.ok)return;const rows=await r.json();if(!rows.length)return;
    const cloud=rows[0].data;if(cloud&&(cloud.updatedAt||0)>(S.updatedAt||0)){S=Object.assign({},DEF,cloud);localStorage.setItem(LS,JSON.stringify(S));}
  }catch(e){}
}

/* ===================== 공통 ===================== */
function newScreen(){document.querySelectorAll('.screen').forEach(s=>s.remove());const sc=document.createElement('div');sc.className='screen';document.body.appendChild(sc);sc.scrollTop=0;showFab(false);return sc;}
function closeScreen(){SND.click();document.querySelectorAll('.screen').forEach(s=>s.remove());showFab(true);renderPath();}
function navBar(a){return `<div class="bottomnav">
   <button class="${a==='path'?'on':''}" data-nav="path"><span class="ic">🛤️</span>학습</button>
   <button class="${a==='review'?'on':''}" data-nav="review"><span class="ic">🔁</span>복습</button>
   <button class="${a==='plan'?'on':''}" data-nav="plan"><span class="ic">📅</span>계획</button>
   <button class="${a==='profile'?'on':''}" data-nav="profile"><span class="ic">📊</span>현황</button>
   <button class="${a==='settings'?'on':''}" data-nav="settings"><span class="ic">⚙️</span>설정</button></div>`;}
function bindNav(){app.querySelectorAll('[data-nav]').forEach(b=>b.addEventListener('click',()=>{SND.tab();const n=b.dataset.nav;({path:renderPath,review:renderReview,plan:renderPlan,profile:renderProfile,settings:renderSettings}[n])();}));}

/* ===================== AI 튜터 챗봇 ===================== */
const GLOSSARY={
 '증여등가율':'증여등가율(Grant Equivalent)은 차관(빌려주는 돈)이 "얼마나 공짜에 가까운가"를 %로 나타낸 값이에요. 100%면 완전 무상(공짜), 0%면 시장 금리 그대로라 혜택이 없는 거예요. 금리가 낮고 상환기간이 길수록 ↑. ODA로 인정받으려면 소득그룹별 최소치(저소득국 45%·저중소득국 15%·고중소득국 6%) 이상이어야 해요. (예전엔 \'증여율 25% 이상\' 기준이었는데 2018년부터 이 방식으로 바뀜)',
 '양허성':'양허성(讓許性, concessional)은 "상대방에게 유리하도록 양보한 조건"이라는 뜻이에요. ODA 차관은 시중 은행보다 금리가 낮고 상환기간이 길어서 양허성이 있다고 해요.',
 '비구속성':'비구속성(untied) 원조는 "우리 물자·기업을 꼭 써라"는 조건 없이 주는 원조예요. 반대로 구속성(tied) 원조는 공여국 물품·서비스 구매를 강제해요.',
 'oda':'ODA(Official Development Assistance, 공적개발원조)는 ① 공공부문이 ② 개도국의 경제발전·복지를 위해 ③ 양허적 조건으로 제공하는 자금이에요.',
 'dac':'DAC(Development Assistance Committee, 개발원조위원회)는 OECD 산하 기구로, ODA 통계 모니터링·규범 표준화·동료검토를 맡아요. 한국은 2010년 가입.',
 'sdgs':'SDGs(Sustainable Development Goals, 지속가능발전목표)는 2015년 채택된 17개 목표·169개 세부목표예요. 슬로건은 \'Leave No One Behind\'.',
 'mdgs':'MDGs(Millennium Development Goals, 새천년개발목표)는 2001년 발표된 8개 목표로, SDGs의 전신이에요.'
};
function localAnswer(q){
  const k=q.toLowerCase().replace(/\s/g,'');
  for(const key in GLOSSARY){if(k.includes(key.toLowerCase()))return GLOSSARY[key];}
  return null;
}
async function aiChat(history){
  const sys='너는 ODA(공적개발원조) 국제개발협력 자격시험을 준비하는 학생을 돕는 친절한 한국어 튜터다. 쉽고 정확하게, 핵심 위주로 3~5문장 이내로 답하라. 어려운 약자는 처음에 풀어서 (영문 full name과 한글 뜻) 설명하라.';
  if(CFG.aiProvider==='anthropic'){
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'x-api-key':CFG.aiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','content-type':'application/json'},body:JSON.stringify({model:CFG.aiModel||'claude-3-5-haiku-latest',max_tokens:500,system:sys,messages:history})});
    if(!r.ok)throw new Error('HTTP '+r.status);const d=await r.json();return d.content[0].text;
  }else{
    const base=(CFG.aiBase||'https://api.openai.com/v1').replace(/\/$/,'');
    const r=await fetch(base+'/chat/completions',{method:'POST',headers:{'Authorization':'Bearer '+CFG.aiKey,'content-type':'application/json'},body:JSON.stringify({model:CFG.aiModel||'gpt-4o-mini',temperature:.3,messages:[{role:'system',content:sys},...history]})});
    if(!r.ok)throw new Error('HTTP '+r.status);const d=await r.json();return d.choices[0].message.content;
  }
}
let CHAT=[];
function showFab(b){const f=document.getElementById('chatfab');if(f)f.classList.toggle('hidden',!b);}
function createChatUI(){
  if(document.getElementById('chatfab'))return;
  const fab=document.createElement('button');fab.id='chatfab';fab.textContent='💬';document.body.appendChild(fab);
  const panel=document.createElement('div');panel.id='chatpanel';panel.className='hidden';
  panel.innerHTML=`<div class="cp-head"><span>🤖 ODA 튜터</span><button id="cp-x">✕</button></div>
    <div class="cp-body" id="cp-body"><div class="cp-msg bot">안녕하세요! 공부하다 궁금한 걸 물어보세요. 약어·개념 무엇이든요 🙂</div></div>
    <div class="cp-quick"><button data-q="증여등가율이 뭐야?">증여등가율?</button><button data-q="비구속성 ODA가 뭐야?">비구속성?</button><button data-q="MDGs와 SDGs 차이가 뭐야?">MDGs vs SDGs</button></div>
    <div class="cp-input"><input id="cp-in" placeholder="질문을 입력하세요..."><button id="cp-send">▶</button></div>`;
  document.body.appendChild(panel);
  const body=panel.querySelector('#cp-body');
  function add(role,text){const m=document.createElement('div');m.className='cp-msg '+(role==='user'?'user':'bot');m.textContent=text;body.appendChild(m);body.scrollTop=body.scrollHeight;return m;}
  fab.onclick=()=>{SND.click();panel.classList.toggle('hidden');if(!panel.classList.contains('hidden'))panel.querySelector('#cp-in').focus();};
  panel.querySelector('#cp-x').onclick=()=>panel.classList.add('hidden');
  async function send(text){
    text=(text||panel.querySelector('#cp-in').value).trim();if(!text)return;
    panel.querySelector('#cp-in').value='';add('user',text);CHAT.push({role:'user',content:text});
    if(!(CFG.aiProvider&&CFG.aiProvider!=='none'&&CFG.aiKey)){
      const loc=localAnswer(text);
      add('bot',(loc?loc+'\n\n':'')+'💡 더 자세한 대화형 답변을 원하면 ⚙️설정 → AI 채점에서 무료 키(Gemini/OpenRouter)를 넣어주세요.');
      return;
    }
    const wait=add('bot','…생각 중');
    try{const ans=await aiChat(CHAT.slice(-8));wait.textContent=ans;CHAT.push({role:'assistant',content:ans});}
    catch(e){const loc=localAnswer(text);wait.textContent=(loc?loc+'\n\n':'')+'(AI 연결 실패: '+e.message+')';}
    body.scrollTop=body.scrollHeight;
  }
  panel.querySelector('#cp-send').onclick=()=>send();
  panel.querySelector('#cp-in').addEventListener('keydown',e=>{if(e.key==='Enter')send();});
  panel.querySelectorAll('.cp-quick button').forEach(b=>b.onclick=()=>send(b.dataset.q));
}
</script>
