<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ODA 러닝메이트 · 국제개발협력 자격시험 대비</title>
<style>
:root{
  --green:#58cc02;--green-d:#46a302;--green-l:#d7ffb8;
  --blue:#1cb0f6;--blue-d:#1899d6;--blue-l:#e3f4ff;
  --purple:#ce82ff;--purple-d:#a44dd6;
  --gold:#ffc800;--gold-d:#e6a800;
  --red:#ff4b4b;--red-d:#e63939;--red-l:#ffdfe0;
  --orange:#ff9600;
  --ink:#3c3c3c;--gray:#afafaf;--gray-l:#e5e5e5;--gray-bg:#f7f7f7;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  color:var(--ink);background:var(--gray-bg);line-height:1.5;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
textarea{font-family:inherit}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:#fff;position:relative;display:flex;flex-direction:column}
.hidden{display:none!important}.center{text-align:center}.muted{color:var(--gray)}.kw{font-weight:800;color:var(--ink)}
h1,h2,h3{letter-spacing:-.01em}

.btn{display:block;width:100%;padding:15px;border-radius:16px;font-size:1.05rem;font-weight:800;color:#fff;background:var(--green);box-shadow:0 4px 0 var(--green-d);transition:transform .05s,filter .1s}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--green-d)}
.btn:disabled{background:var(--gray-l);color:#fff;box-shadow:0 4px 0 #cfcfcf;cursor:default}
.btn.blue{background:var(--blue);box-shadow:0 4px 0 var(--blue-d)}.btn.blue:active{box-shadow:0 2px 0 var(--blue-d)}
.btn.red{background:var(--red);box-shadow:0 4px 0 var(--red-d)}.btn.red:active{box-shadow:0 2px 0 var(--red-d)}
.btn.gold{background:var(--gold);color:#7a5a00;box-shadow:0 4px 0 var(--gold-d)}
.btn.ghost{background:#fff;color:var(--blue);border:2px solid var(--gray-l);box-shadow:0 4px 0 var(--gray-l)}
.btn.sm{padding:10px;font-size:.92rem;border-radius:13px}

/* onboarding */
.ob{padding:26px 22px 40px;display:flex;flex-direction:column;min-height:100vh}
.ob .logo{font-size:3rem;text-align:center;margin-top:14px}
.ob h1{font-size:1.6rem;text-align:center;margin:8px 0 2px;color:var(--green-d)}
.ob .sub{text-align:center;color:var(--gray);margin-bottom:20px;font-weight:600;font-size:.92rem}
.ob-step{background:var(--gray-bg);border-radius:18px;padding:18px;margin-bottom:14px}
.ob-step h3{font-size:1.02rem;margin-bottom:4px}
.ob-step p.hint{font-size:.82rem;color:var(--gray);margin-bottom:12px}
input[type=date],input[type=text],input[type=password]{width:100%;padding:13px;border:2px solid var(--gray-l);border-radius:13px;font-size:1.02rem;font-family:inherit;color:var(--ink);background:#fff}
input:focus{outline:none;border-color:var(--blue)}
.grade-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grade-card{border:2px solid var(--gray-l);border-radius:14px;padding:12px;text-align:center;background:#fff;transition:.12s;font-weight:700}
.grade-card .g{font-size:1.4rem;font-weight:900;display:block}
.grade-card .d{font-size:.74rem;color:var(--gray);font-weight:600;margin-top:2px}
.grade-card.sel{border-color:var(--green);background:var(--green-l);color:var(--green-d)}.grade-card.sel .d{color:var(--green-d)}
.time-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.time-card{border:2px solid var(--gray-l);border-radius:14px;padding:12px 4px;text-align:center;font-weight:700;background:#fff;transition:.12s}
.time-card .t{font-size:1.1rem;font-weight:900;display:block}.time-card .d{font-size:.7rem;color:var(--gray)}
.time-card.sel{border-color:var(--blue);background:var(--blue-l);color:var(--blue-d)}
.plan-box{background:#fff;border:2px solid var(--green);border-radius:18px;padding:16px;margin-bottom:14px}
.plan-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px dashed var(--gray-l)}
.plan-row:last-child{border-bottom:none}.plan-row .k{color:var(--gray);font-weight:700;font-size:.9rem}
.plan-row .v{font-weight:900;font-size:1rem}.plan-row .v.big{color:var(--green-d);font-size:1.15rem}

/* top */
.topbar{display:flex;align-items:center;gap:12px;padding:13px 16px;position:sticky;top:0;background:#fff;z-index:20;border-bottom:2px solid var(--gray-bg)}
.stat{display:flex;align-items:center;gap:4px;font-weight:800}
.stat.streak{color:var(--orange)}.stat.xp{color:var(--gold-d)}
.bar{flex:1;height:15px;background:var(--gray-l);border-radius:10px;overflow:hidden}
.bar>span{display:block;height:100%;background:var(--green);border-radius:10px;transition:width .4s}
.iconbtn{font-size:1.2rem;width:30px;text-align:center}

.path-head{padding:16px;background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;border-radius:0 0 22px 22px}
.path-head .course{font-size:1.2rem;font-weight:900}
.path-head .meta{display:flex;gap:14px;margin-top:8px;font-size:.82rem;font-weight:700;opacity:.95;flex-wrap:wrap}
.path-head .meta b{font-size:.98rem}
.today-banner{margin:10px 14px;background:var(--gold);color:#7a5a00;border-radius:16px;padding:11px 15px;font-weight:800;display:flex;align-items:center;gap:9px;box-shadow:0 4px 0 var(--gold-d);font-size:.92rem}
.today-banner .ic{font-size:1.3rem}
.path{padding:6px 0 96px}
.unit-header{margin:16px 14px 4px;padding:13px 17px;border-radius:16px;color:#fff;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 0 rgba(0,0,0,.16)}
.unit-header .ut{font-weight:900;font-size:1.02rem}.unit-header .us{font-size:.74rem;opacity:.92;font-weight:700}
.nodes{display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 0}
.node-wrap{position:relative;display:flex;flex-direction:column;align-items:center}
.node{width:72px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.7rem;transition:transform .08s}
.node:active{transform:translateY(3px)}
.node.locked{background:var(--gray-l);box-shadow:0 5px 0 #cfcfcf;color:#fff}
.node.active{background:var(--green);box-shadow:0 6px 0 var(--green-d);color:#fff}
.node.done{background:var(--gold);box-shadow:0 6px 0 var(--gold-d);color:#fff}
.node.due{background:var(--blue);box-shadow:0 6px 0 var(--blue-d);color:#fff}
.node-label{font-size:.72rem;font-weight:800;color:var(--gray);margin-top:4px;max-width:150px;text-align:center}
.node.active~.node-label,.node-wrap.cur .node-label{color:var(--green-d)}
.start-pop{position:absolute;top:-44px;left:50%;transform:translateX(-50%);background:#fff;border:2px solid var(--green);color:var(--green-d);font-weight:900;font-size:.78rem;padding:5px 11px;border-radius:12px;white-space:nowrap;box-shadow:0 3px 0 var(--green-d);animation:bob 1.1s infinite}
.start-pop:after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border:7px solid transparent;border-top-color:var(--green)}
@keyframes bob{0%,100%{transform:translateX(-50%)}50%{transform:translateX(-50%) translateY(-4px)}}
.nodes .node-wrap:nth-child(6n+2){margin-left:64px}.nodes .node-wrap:nth-child(6n+3){margin-left:100px}
.nodes .node-wrap:nth-child(6n+4){margin-left:64px}.nodes .node-wrap:nth-child(6n+6){margin-left:-64px}.nodes .node-wrap:nth-child(6n+1){margin-left:-100px}

.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:2px solid var(--gray-l);display:flex;justify-content:space-around;padding:7px 0 9px;z-index:30}
.bottomnav button{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--gray);font-weight:800;font-size:.66rem;flex:1}
.bottomnav button .ic{font-size:1.3rem}.bottomnav button.on{color:var(--blue)}

/* lesson screen */
.screen{position:fixed;inset:0;background:#fff;z-index:50;max-width:480px;margin:0 auto;display:flex;flex-direction:column;overflow-y:auto}
.lesson-top{display:flex;align-items:center;gap:12px;padding:13px 16px;position:sticky;top:0;background:#fff;z-index:5}
.x-btn{font-size:1.4rem;color:var(--gray);font-weight:900;width:28px}
.lesson-bar{flex:1;height:14px;background:var(--gray-l);border-radius:8px;overflow:hidden}
.lesson-bar>span{display:block;height:100%;background:var(--green);transition:width .3s}
.lesson-page{font-size:.72rem;font-weight:800;color:var(--blue-d);background:var(--blue-l);padding:3px 9px;border-radius:10px;white-space:nowrap}

/* concept */
.concept{padding:8px 22px 120px}
.concept .lt{font-size:1.4rem;font-weight:900;margin-bottom:2px}
.concept .le{font-size:.85rem;color:var(--gray);font-weight:700;margin-bottom:16px}
.ccard{border-radius:16px;padding:17px 18px;margin-bottom:14px;animation:rise .3s ease}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.ccard .ch{font-weight:900;font-size:1.05rem;margin-bottom:7px;display:flex;align-items:center;gap:7px}
.ccard p{font-size:1rem;color:#3c3c3c}
.ccard.why{background:#fff4e0;border:2px solid #ffd98a}.ccard.why .ch{color:#c47f00}
.ccard.def{background:var(--blue-l);border:2px solid #aee0fb}.ccard.def .ch{color:var(--blue-d)}
.ccard.def .term{font-weight:900;color:var(--blue-d);font-size:1.08rem}
.ccard.pts{background:var(--green-l);border:2px solid #b6f08a}.ccard.pts .ch{color:var(--green-d)}
.ccard.pts ul{list-style:none;margin-top:4px}
.ccard.pts li{padding:5px 0 5px 20px;position:relative;font-size:.97rem}
.ccard.pts li:before{content:'✓';position:absolute;left:0;color:var(--green-d);font-weight:900}
.ccard.tip{background:#f3e8ff;border:2px solid #e0c2ff}.ccard.tip .ch{color:var(--purple-d)}

/* quiz */
.quiz{padding:14px 22px 150px}
.qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.qtype{font-size:.72rem;font-weight:900;padding:3px 10px;border-radius:10px}
.qtype.mc{background:var(--blue-l);color:var(--blue-d)}
.qtype.ox{background:#fff4e0;color:#c47f00}
.qtype.free{background:#f3e8ff;color:var(--purple-d)}
.qnum{color:var(--gray);font-weight:800;font-size:.78rem}
.quiz h2{font-size:1.22rem;margin:6px 0 12px;line-height:1.45}
.hintbtn{display:inline-flex;align-items:center;gap:5px;color:var(--orange);font-weight:800;font-size:.85rem;border:2px solid #ffd98a;background:#fff8ec;padding:6px 12px;border-radius:12px;margin-bottom:14px}
.hintbox{background:#fff8ec;border:1px solid #ffd98a;border-radius:12px;padding:11px 14px;font-size:.9rem;color:#8a6d2f;margin-bottom:14px}
.choices{display:flex;flex-direction:column;gap:11px}
.choice{display:flex;align-items:center;gap:12px;border:2px solid var(--gray-l);border-bottom-width:4px;border-radius:14px;padding:14px 16px;font-size:1rem;font-weight:600;text-align:left;background:#fff;transition:.1s}
.choice .key{width:26px;height:26px;border:2px solid var(--gray-l);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.8rem;color:var(--gray);flex-shrink:0}
.choice.sel{border-color:var(--blue);background:var(--blue-l)}.choice.sel .key{border-color:var(--blue);color:var(--blue-d)}
.choice.correct{border-color:var(--green);background:var(--green-l)}.choice.correct .key{border-color:var(--green-d);background:var(--green);color:#fff}
.choice.wrong{border-color:var(--red);background:var(--red-l)}.choice.wrong .key{border-color:var(--red-d);background:var(--red);color:#fff}
.choice:disabled{cursor:default}
.oxwrap{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.oxbtn{border:2px solid var(--gray-l);border-bottom-width:4px;border-radius:14px;padding:20px;font-size:1.1rem;font-weight:800;background:#fff;transition:.1s}
.oxbtn.sel{border-color:var(--blue);background:var(--blue-l);color:var(--blue-d)}
.oxbtn.correct{border-color:var(--green);background:var(--green-l);color:var(--green-d)}
.oxbtn.wrong{border-color:var(--red);background:var(--red-l);color:var(--red-d)}
.freebox{width:100%;min-height:120px;border:2px solid var(--gray-l);border-radius:14px;padding:14px;font-size:1rem;resize:vertical}
.freebox:focus{outline:none;border-color:var(--purple)}
.freebox:disabled{background:var(--gray-bg)}

.qfoot{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:15px 22px 22px;background:#fff;border-top:2px solid var(--gray-bg);z-index:6}
.qfoot.ok{background:var(--green-l);border-top-color:transparent}
.qfoot.no{background:var(--red-l);border-top-color:transparent}
.qfoot.part{background:#fff4e0;border-top-color:transparent}
.fb{display:flex;gap:10px;margin-bottom:11px}
.fb .ic{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#fff;flex-shrink:0}
.qfoot.ok .fbt{color:var(--green-d)}.qfoot.ok .ic{background:var(--green)}
.qfoot.no .fbt{color:var(--red-d)}.qfoot.no .ic{background:var(--red)}
.qfoot.part .fbt{color:#c47f00}.qfoot.part .ic{background:var(--orange)}
.fbt{font-weight:900;font-size:1.02rem}
.fb .ex{font-weight:600;font-size:.85rem;color:#555;margin-top:3px}
.fb .ex b{color:#333}
.modelans{background:rgba(255,255,255,.7);border-radius:10px;padding:8px 11px;margin-top:7px;font-size:.84rem}
.modelans .ml{font-weight:800;color:#333}

/* result */
.result{padding:18px 18px 40px}
.rscore{background:var(--gray-bg);border-radius:18px;padding:18px;text-align:center;margin-bottom:8px}
.rscore .big{font-size:2.4rem;font-weight:900}
.rscore .big small{font-size:1rem;color:var(--gray);font-weight:700}
.rscore .date{font-size:.78rem;color:var(--gray);font-weight:600;margin-top:2px}
.rstats{display:flex;gap:10px;margin:14px 0}
.rbox{flex:1;border:2px solid var(--gray-l);border-radius:14px;padding:12px 6px;text-align:center}
.rbox .rl{font-size:.7rem;font-weight:800;color:var(--gray)}.rbox .rv{font-size:1.3rem;font-weight:900;margin-top:3px}
.rbox.xp{border-color:var(--gold)}.rbox.xp .rv{color:var(--gold-d)}
.rbox.acc{border-color:var(--green)}.rbox.acc .rv{color:var(--green-d)}
.rbox.tm{border-color:var(--blue)}.rbox.tm .rv{color:var(--blue-d)}
.revitem{border:1px solid var(--gray-l);border-radius:14px;margin-bottom:9px;overflow:hidden}
.revq{display:flex;align-items:flex-start;gap:9px;padding:13px 14px}
.revq .ri{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:#fff;flex-shrink:0;margin-top:1px}
.revq.ok .ri{background:var(--green)}.revq.no .ri{background:var(--red)}
.revq .qt{font-size:.7rem;font-weight:900;padding:2px 7px;border-radius:8px;margin-right:6px}
.revq .qtx{font-size:.92rem;font-weight:600;flex:1}
.revq .chev{color:var(--gray);font-weight:900;transition:transform .2s}
.revitem.open .chev{transform:rotate(180deg)}
.revbody{display:none;padding:0 14px 14px;font-size:.87rem}
.revitem.open .revbody{display:block}
.revbody .ra{padding:8px 11px;border-radius:10px;margin-bottom:6px}
.revbody .ra.mine{background:var(--red-l)}.revbody .ra.ans{background:var(--green-l)}
.revbody .ra .ral{font-weight:800;font-size:.76rem;color:#666}
.revbody .rex{color:#555;padding:6px 2px}

/* bridge / concept complete */
.bridge{padding:36px 24px;text-align:center}
.bridge .chk{width:78px;height:78px;border-radius:50%;background:var(--green-l);display:flex;align-items:center;justify-content:center;font-size:2.4rem;margin:0 auto 14px}
.bridge h2{font-size:1.5rem;margin-bottom:4px}
.bcard{text-align:left;border-radius:16px;padding:16px 18px;margin-top:16px}
.bcard.link{background:#fff4e0;border:2px solid #ffd98a}
.bcard.next{background:var(--blue-l);border:2px solid #aee0fb}
.bcard .bh{font-weight:900;display:flex;align-items:center;gap:7px;margin-bottom:7px}
.bcard.link .bh{color:#c47f00}.bcard.next .bh{color:var(--blue-d)}
.bcard .nt{font-weight:900;font-size:1.05rem;margin-bottom:4px}
.bcard p{font-size:.93rem;color:#444}

/* generic pages */
.page{padding:14px 18px 100px}
.page h2{font-size:1.35rem;margin:4px 0 14px}
.card{background:#fff;border:2px solid var(--gray-l);border-radius:18px;padding:16px;margin-bottom:13px}
.bigstat{display:flex;gap:10px;margin-bottom:13px}
.bigstat .bs{flex:1;border-radius:18px;padding:15px 8px;text-align:center;color:#fff}
.bigstat .bs .v{font-size:1.6rem;font-weight:900}.bigstat .bs .l{font-size:.72rem;font-weight:700;opacity:.95}
.bigstat .bs.s1{background:var(--orange)}.bigstat .bs.s2{background:var(--gold)}.bigstat .bs.s3{background:var(--green)}
.daylist .di{display:flex;align-items:center;gap:11px;padding:11px;border-radius:14px;background:var(--gray-bg);margin-bottom:8px}
.daylist .di .dd{font-weight:900;color:var(--green-d);min-width:60px;font-size:.8rem}
.daylist .di .dl{font-size:.86rem;font-weight:600}.daylist .di.done{opacity:.5}
.linkbtn{color:var(--blue);font-weight:800;text-decoration:underline;font-size:.85rem}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 0}
.sw{width:48px;height:28px;border-radius:16px;background:var(--gray-l);position:relative;transition:.2s;flex-shrink:0}
.sw.on{background:var(--green)}
.sw:after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s}
.sw.on:after{left:23px}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:20px;font-weight:800;font-size:.85rem;z-index:99;opacity:0;transition:.3s;max-width:90%;text-align:center}
.toast.show{opacity:1}
@media(max-width:380px){.nodes .node-wrap:nth-child(6n+3){margin-left:74px}.nodes .node-wrap:nth-child(6n+2),.nodes .node-wrap:nth-child(6n+4){margin-left:46px}.nodes .node-wrap:nth-child(6n+1),.nodes .node-wrap:nth-child(6n+6){margin-left:-46px}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script id="data">
window.COURSE = { title:"국제개발협력(ODA) 자격시험", units:[
{ id:'u1', title:'1. 국제개발협력의 이해', source:'1과목', color:'#58cc02', icon:'🌱', lessons:[
 { id:'u1l1', title:'빈곤과 불평등', en:'Poverty & Inequality',
   concept:{ why:'전 세계 인구의 상당수가 하루 2달러 남짓으로 살아갑니다. "왜 어떤 나라는 가난할까?"라는 질문에서 모든 개발협력이 시작돼요. 빈곤을 어떻게 정의하느냐에 따라 해결책이 완전히 달라지기 때문에, 빈곤 개념은 1과목의 출발점이자 단골 출제 포인트입니다.',
     def:{term:'빈곤(Poverty)', body:'기본적 욕구가 충족되지 못한 결핍 상태. 경제적 관점에선 절대·차상위·상대적 빈곤으로, 소득 외적 관점에선 아마르티아 센의 "역량(가능성)의 박탈"로 봅니다.'},
     points:['<span class="kw">절대빈곤</span>: 생존 기본욕구 미충족 (세계은행, 2015년 <span class="kw">1.9달러/일</span>)','차상위빈곤: 가까스로 충족 / 상대적빈곤: 주관적으로 느끼는 빈곤','<span class="kw">아마르티아 센</span>: 빈곤=역량 결핍, "선택할 자유"의 박탈 → HDI·GDI·GII 등장','개도국 빈곤 원인은 자연·재해·분쟁·거버넌스 부재·식민유산이 <span class="kw">상호복합적</span>으로 얽힘'],
     tip:'빈곤선 금액은 "1 → 1.25 → 1.9 달러" 순으로 올라간 것만 외워도 한 문제. (1990 / 2008 / 2015년)' },
   bridge:{lead:'빈곤을 "왜 줄여야 하는가"에 답했다면, 다음은 "누가, 어떤 돈으로 줄이는가" — 바로 ODA의 정의와 3대 조건입니다.', nextPreview:'ODA가 되려면 충족해야 하는 3가지 조건을 배웁니다.'},
   quiz:[
    {t:'mc',q:'세계은행이 2015년 기준으로 제시한 절대빈곤선(1일 소득)은?',choices:['1달러','1.25달러','1.9달러','3.1달러'],answer:2,hint:'1990년 1달러에서 두 번 상향 조정됐어요.',ex:'절대빈곤선은 1990년 1달러 → 2008년 1.25달러 → 2015년 1.9달러로 변화했습니다.'},
    {t:'mc',q:'다음 중 빈곤에 대한 설명으로 옳지 않은 것은?',choices:['절대빈곤은 생존의 기본욕구가 충족되지 않은 상태다','상대적 빈곤은 주관적 판단으로 느끼는 빈곤이다','아마르티아 센은 빈곤을 소득의 절대량으로만 정의했다','센은 빈곤을 역량(가능성)의 박탈로 보았다'],answer:2,hint:'센은 "소득"보다 "자유·역량"을 강조했어요.',ex:'아마르티아 센은 빈곤을 소득이 아니라 역량(케이퍼빌리티) 결핍과 선택할 자유의 박탈로 이해했습니다.'},
    {t:'ox',q:'개발도상국의 빈곤 원인은 보통 한 가지 요인으로 단순하게 설명된다.',a:false,hint:'자연·분쟁·거버넌스·식민유산이 어떻게 얽혀 있나요?',ex:'빈곤의 원인은 자연환경·재해·분쟁·거버넌스 부재·식민유산 등이 상호복합적·유기적으로 얽혀 구조화됩니다.'},
    {t:'ox',q:'아마르티아 센의 빈곤관은 HDI(인간개발지수) 같은 지표 등장에 영향을 주었다.',a:true,hint:'센은 인간개발 패러다임의 사상적 뿌리예요.',ex:'센의 역량 접근은 HDI·GDI·GII 등 인간개발 지표의 개념적 근원을 제공했습니다.'},
    {t:'free',q:'아마르티아 센이 본 빈곤의 핵심 개념을 한 문장으로 설명하시오.',keys:['역량','자유','박탈'],model:'빈곤은 단순한 소득 부족이 아니라, 원하는 삶을 선택하고 달성할 "역량(가능성)"과 "자유"가 박탈된 상태이다.',hint:'키워드: 역량 / 자유 / 박탈',ex:'센은 빈곤을 역량의 결핍, 즉 선택할 자유의 박탈로 정의했습니다.'}
   ]},
 { id:'u1l2', title:'ODA의 정의와 3대 조건', en:'Definition of ODA',
   concept:{ why:'시험에서 가장 많이 나오는 함정이 "이건 ODA인가, 아닌가?"입니다. 스타벅스가 커피농가를 돕는 건 ODA일까요? (아니에요!) 세 가지 조건만 정확히 알면 이런 적용형 문제를 다 맞힐 수 있어요.',
     def:{term:'ODA(공적개발원조)', body:'공공부문이 개발도상국·국제기구에 제공하는 양허성 자금. 1969년 OECD DAC가 도입한 개념입니다.'},
     points:['① <span class="kw">공적기관</span>이 제공 (정부·집행기관)','② 주목적이 개도국의 <span class="kw">경제발전·복지 증진</span>','③ <span class="kw">양허적 성격</span> (상대에 유리한 조건)','2018년부터 양허성 판단이 <span class="kw">증여등가율</span> 방식으로 변경 (저소득국45%·저중소득국15%·고중소득국6%↑)'],
     tip:'민간기업의 활동(FDI·CSR)은 ODA가 아님! "공공+개발목적+양허성" 셋 다 충족해야 ODA.' },
   bridge:{lead:'ODA가 무엇인지 알았으니, 이제 "누가 ODA를 주고받는지"와 "어떤 방향이 올바른지"를 봅니다.', nextPreview:'공여국·다자기구·시민사회 등 협력의 주체와 올바른 방향을 배웁니다.'},
   quiz:[
    {t:'mc',q:'다음 중 공적개발원조(ODA)로 보기 가장 어려운 것은?',choices:['경상북도가 시행하는 캄보디아 농촌지도자 초청 연수','지진 복구를 위해 투입된 외국 군대의 인도적 구호활동','증여율 75%인 대외경제협력기금(EDCF) 차관','스타벅스가 르완다 커피농가에 제공하는 기술지원'],answer:3,hint:'"공공부문이 제공"하는지 따져보세요.',ex:'민간기업(스타벅스)의 활동은 CSR이지 ODA가 아닙니다. 지자체 연수·재난 시 군대의 인도적 원조·양허성 차관은 ODA로 인정됩니다.'},
    {t:'mc',q:'ODA의 3대 성립 조건이 아닌 것은?',choices:['공적기관이 제공할 것','개도국의 경제발전·복지 증진이 주목적일 것','양허적 성격을 가질 것','반드시 상환을 전제로 할 것'],answer:3,hint:'무상원조는 갚지 않아도 되죠.',ex:'ODA는 양허적(상대에 유리) 성격을 가지며, 상환 전제는 조건이 아닙니다.'},
    {t:'mc',q:'2018년부터 ODA 양허성 판단에 도입된 방식은?',choices:['증여율 25% 일괄 적용','증여등가율 방식','GNI 비율 방식','구속성 비율 방식'],answer:1,hint:'소득그룹별로 기준이 달라졌어요.',ex:'2018년부터 소득그룹별 차등(저소득45%·저중소득15%·고중소득6%)을 둔 증여등가율 방식으로 바뀌었습니다.'},
    {t:'ox',q:'민간기업의 해외직접투자(FDI)는 ODA에 포함된다.',a:false,hint:'ODA는 "공적"자금이에요.',ex:'FDI는 민간자본의 흐름으로 ODA에 포함되지 않습니다.'},
    {t:'free',q:'ODA가 성립하기 위한 3대 조건을 쓰시오.',keys:['공적','개발','양허'],model:'① 공적기관이 제공, ② 개도국의 경제발전·복지 증진이 주목적, ③ 양허적 성격을 가질 것.',hint:'공공 / 개발목적 / 양허성',ex:'공적기관 제공·개발목적·양허성, 이 세 가지를 모두 충족해야 ODA입니다.'}
   ]},
 { id:'u1l3', title:'협력의 주체와 올바른 방향', en:'Actors & Principles',
   concept:{ why:'원조는 "주는 쪽 마음대로" 하면 실패합니다. 누가 참여하고, 어떤 원칙을 지켜야 효과가 나는지를 알아야 뒤에 나오는 원조효과성·파리선언이 이해돼요.',
     def:{term:'개발격차 & 주체', body:'선진국과 개도국의 차이를 개발격차라 하며, 이를 줄이기 위해 공여국·다자기구·시민사회·기업 등 다양한 주체가 협력합니다.'},
     points:['개도국 기준: UN은 <span class="kw">HDI 0.8 미만</span>, 세계은행은 1인당 GNI 고소득 기준 이하','주체: OECD DAC 공여국 / 신흥공여국 / 다자기구 / 시민사회·기업','올바른 방향: 개도국 <span class="kw">수요 충족·기회의 평등·포용/참여·지속가능</span>','OECD 권고 <span class="kw">ODA/GNI 0.7%</span> (실제 평균은 0.3%대)'],
     tip:'"0.7%"는 권고치, "0.3%대"는 현실. 이 숫자 대비가 자주 나와요.' },
   bridge:{lead:'주체와 원칙을 알았다면, 이 원칙들이 어떻게 역사 속에서 만들어졌는지 — 국제개발협력의 역사로 넘어갑니다.', nextPreview:'마셜플랜부터 시작되는 국제개발협력의 태동과 도약을 배웁니다.'},
   quiz:[
    {t:'mc',q:'OECD가 권고하는 ODA/GNI 비율 목표치는?',choices:['0.15%','0.33%','0.7%','1.0%'],answer:2,hint:'오래전부터 변하지 않은 "권고" 숫자예요.',ex:'국제사회는 ODA/GNI 0.7% 이상을 권고하지만 실제 평균은 0.3%대에 그칩니다.'},
    {t:'mc',q:'국제개발협력의 올바른 방향으로 보기 어려운 것은?',choices:['개도국의 개발수요를 충족시키는 방향','공여국 이익을 우선한 일방적 추진','포용적·참여적 추진','지속가능한 발전 지향'],answer:1,hint:'"일방적"이라는 단어에 주목.',ex:'공여국 이익만 앞세운 일방적 추진은 올바른 방향이 아닙니다.'},
    {t:'ox',q:'선진국과 개발도상국 사이의 격차를 "개발격차"라고 한다.',a:true,hint:'용어 그대로예요.',ex:'개발격차(development gap)는 선진국과 개도국의 차이를 가리킵니다.'},
    {t:'ox',q:'개발도상국의 정의에는 모든 나라에 적용되는 단 하나의 고정된 기준이 있다.',a:false,hint:'UN과 세계은행 기준이 다르죠.',ex:'UN(HDI)·세계은행(GNI) 등 기관마다 기준이 달라 단일한 고정 기준은 없습니다.'},
    {t:'free',q:'국제개발협력이 지향해야 할 "올바른 방향" 원칙을 2가지 이상 쓰시오.',keys:['수요','참여','지속가능','평등'],model:'개도국의 개발수요 충족, 기회의 평등 촉진, 포용적·참여적 추진, 지속가능한 발전.',hint:'수요충족 / 참여 / 지속가능 / 기회평등',ex:'개도국 수요 충족·기회 평등·포용/참여·지속가능성이 핵심 원칙입니다.'}
   ]}
]},

{ id:'u2', title:'2. 국제개발협력의 역사', source:'1과목', color:'#1cb0f6', icon:'📜', lessons:[
 { id:'u2l1', title:'태동기와 도약기 (1940~60s)', en:'Origins & Take-off',
   concept:{ why:'개발협력은 갑자기 생긴 게 아니라 2차 대전·냉전이라는 역사 속에서 태어났어요. 마셜플랜·브레턴우즈·DAC의 탄생을 알면 "왜 이런 기구들이 생겼나"가 한 번에 정리됩니다.',
     def:{term:'태동~도약기', body:'2차 대전 직후 미·소 냉전 속에서 본격화된 원조가, 1960년대 UN "개발의 10년"과 OECD DAC 설립으로 제도화된 시기.'},
     points:['1944 <span class="kw">브레턴우즈 협정</span> → 1945 IMF·IBRD 창설','1948~52 <span class="kw">마셜플랜</span>(유럽부흥계획), 미국 주도','1960 DAG → 1961 OECD <span class="kw">DAC</span> 개편 / 1969 피어슨 보고서 → GNP 0.7% 권고','담론: <span class="kw">근대화이론</span>(로스토 5단계론) vs <span class="kw">종속이론</span>(프랑크: 중심부-주변부)'],
     tip:'"브레턴우즈(1944)→IMF·IBRD" / "DAG(1960)→DAC(1961)" 두 쌍만 외우면 절반은 맞아요.' },
   bridge:{lead:'도약 뒤엔 정체와 위기가 옵니다. 석유파동과 구조조정이 어떻게 원조의 방향을 바꿨는지 봅니다.', nextPreview:'1970~90년대 정체·위기와 워싱턴 컨센서스를 배웁니다.'},
   quiz:[
    {t:'mc',q:'1944년 미국 달러를 기축통화로 한 협정과 그 직접적 산물로 옳은 것은?',choices:['마셜플랜 → OEEC','브레턴우즈 협정 → IMF·IBRD','콜롬보 계획 → DAC','반둥회의 → UNDP'],answer:1,hint:'금 1온스=35달러로 기억나는 그 협정.',ex:'1944년 브레턴우즈 협정으로 1945년 IMF와 IBRD가 창설되었습니다.'},
    {t:'mc',q:'다음 중 OECD DAC의 성립 과정으로 옳은 것은?',choices:['DAG(1960) → DAC(1961)','OEEC(1948) → DAC(1950)','UNDP(1965) → DAC(1966)','G77(1964) → DAC(1965)'],answer:0,hint:'개발원조"그룹"이 먼저였어요.',ex:'1960년 개발원조그룹(DAG)이 1961년 OECD 산하 개발원조위원회(DAC)로 개편되었습니다.'},
    {t:'mc',q:'세계를 중심부-주변부로 나누고 경제적 잉여가 주변부에서 중심부로 이전된다고 본 이론은?',choices:['근대화 이론','종속이론','균형성장론','내생적 성장이론'],answer:1,hint:'"저발전의 발전"을 말한 프랑크.',ex:'프랑크의 종속이론은 중심부-주변부 구조에서의 잉여 이전을 설명합니다.'},
    {t:'ox',q:'로스토의 경제개발 5단계론은 종속이론의 대표 모형이다.',a:false,hint:'로스토는 "발전 단계"를 말했죠.',ex:'로스토의 5단계론(전통사회-도약준비-도약-성숙-대중소비)은 근대화 이론의 대표 모형입니다.'},
    {t:'free',q:'마셜플랜의 목적을 한 문장으로 설명하시오.',keys:['유럽','부흥','재건'],model:'2차 대전 후 서유럽의 경제 재건(부흥)을 지원하고 공산주의 확산을 억제하기 위한 미국의 원조 계획.',hint:'서유럽 / 재건·부흥',ex:'마셜플랜(1948~52)은 서유럽 16개국의 재건·경제성장 지원과 소련 영향력 억제가 목적이었습니다.'}
   ]},
 { id:'u2l2', title:'정체기와 위기 (1970~90s)', en:'Stagnation & Crisis',

{ id:'a3', title:'심화 3. 농촌개발', source:'2과목', color:'#80b918', icon:'🌾', lessons:[
 { id:'a3l1', title:'농업·농촌개발과 식량안보', en:'Rural Development',
   concept:{ why:'개도국 인구의 다수는 농촌에 살아요. 농업을 살리는 건 곧 빈곤을 줄이는 길이죠. 식량안보 4요소는 외워두면 무조건 득점입니다.',
     def:{term:'농촌개발', body:'농촌(산촌·어촌 포함)의 생산성과 삶의 질을 높여 빈곤을 줄이는 것. 핵심 개념은 식량안보와 가치사슬.'},
     points:['농업의 <span class="kw">다원적 기능</span>(1992 리우회의 언급): 식량·사회·문화·환경·경제','식량안보 4요소(FAO 2006): <span class="kw">가용성·접근성·안정성·활용성</span> → SDG 2','주체: <span class="kw">FAO</span>(4B 전략)·WFP(1961 식량지원)·<span class="kw">IFAD</span>(1977 소농 중심)','곡물메이저 "ABCD"가 세계 곡물시장 약 80% 점유'],

   quiz:[
    {t:'mc',q:'FAO(2006)가 제시한 식량안보 4요소가 아닌 것은?',choices:['가용성','접근성','안정성','수익성'],answer:3,hint:'돈 버는 것과는 거리가 멀어요.',ex:'식량안보 4요소는 가용성·접근성·안정성·활용성입니다.'},

    {t:'ox',q:'농촌개발은 농촌뿐 아니라 산촌·어촌을 포함하는 개념이다.',a:true,hint:'국제개발에서의 범위.',ex:'국제개발에서 농촌개발은 산촌·어촌을 포함합니다.'},
    {t:'free',q:'식량안보의 4가지 요소를 쓰시오.',keys:['가용성','접근성','안정성','활용성'],model:'가용성, 접근성, 안정성, 활용성.',hint:'가 / 접 / 안 / 활',ex:'가용성·접근성·안정성·활용성입니다.'}
   ]},

   concept:{ why:'농업 문제는 "수요는 왜 늘고 공급은 왜 불안한가"와 "어느 기구가 무엇을 하나"로 출제돼요. 다원적 기능 5종과 WFP·IFAD·세계은행의 역할을 정리합니다.',
     def:{term:'식량 수급·주체', body:'농업의 다원적 기능은 식량안보·사회·문화·환경·경제. 수요는 개도국 소득·인구 증가로 늘고, 공급은 이상기후로 불안정해진다.'},
     points:['농업 <span class="kw">다원적 기능 5종</span>: 식량안보·사회·문화·환경·경제 (보호적 기능 아님)','수요 급증: 개도국 소득↑·식생활 개선·인구↑·바이오연료 / 공급 불안: 이상기후, 농업용수 70%','<span class="kw">WFP</span>(1961): 세계 최대 인도주의 기관, 식량 지원 / <span class="kw">IFAD</span>(1977): 소농 중심','식량안보 4요소: 안정성=위험 강도, 활용성=영양·위생 / CSV(포터, 2011): 기업활동 자체가 사회가치 창출'],
     tip:'WFP=가장 큰 인도주의기관(1961), IFAD=소농(1977). "보호적 기능"은 다원적 기능에 없다(함정)!' },
   bridge:{lead:'먹는 문제 다음은 다스리는 문제 — 거버넌스·평화입니다.', nextPreview:'굿 거버넌스와 측정지표로 이어집니다.'},
   quiz:[

    {t:'mc',q:'세계 식량 수요 급증의 원인으로 보기 어려운 것은?',choices:['개도국 소득 증가에 따른 식생활 개선','세계 인구 증가','바이오연료 생산 증가','농업이 국민경제에서 차지하는 비중이 크다는 점'],answer:3,hint:'그건 농업의 "개념" 설명이에요.',ex:'농업의 경제 비중 설명은 농림수산업의 개념이지 수요 급증의 원인이 아닙니다.'},
    {t:'mc',q:'세계식량계획(WFP)에 대한 설명으로 옳지 않은 것은?',choices:['1961년 설립된 UN 산하기구','세계에서 가장 작은 인도주의 기관','긴급상황과 빈곤지역에 식량 지원','FAO·IFAD와 긴밀히 협력'],answer:1,hint:'규모가 작을까요 클까요?',ex:'WFP는 세계에서 가장 큰 인도주의 기관입니다.'},

    {t:'free',q:'식량을 획득하기 위한 일에 종사할 수 없는 위험의 강도를 나타내는 식량안보 요소는?',keys:['안정성'],model:'식량의 안정성(Food stability).',hint:'4요소 중 하나',ex:'식량의 안정성(stability)입니다.'}

   bridge:{lead:'농업을 마무리했어요. 다음은 거버넌스·평화입니다.', nextPreview:'거버넌스 분야로 이어집니다.'},
   quiz:[

 { id:'a7l2', title:'젠더 규범·지표 심화', en:'Gender Norms & Indices',

 { id:'a7l3', title:'젠더 이론·사업 접근', en:'Gender Theory & Programs',
   concept:{ why:'젠더 후반 문제는 "개념의 기원"과 "사업/프로그램 구조"에서 갈려요. 게일 루빈·프로그램 접근·이행 단계를 정리합니다.',
     def:{term:'젠더 이론·사업', body:'젠더 개념은 1960~70년대 초 등장했고, 개발사업은 사업(project)과 프로그램(program)으로 구분된다.'},
     points:['젠더 개념: 1960~70년대 초, <span class="kw">생물학적 성역할 문제 분석</span>의 초석 (게일 루빈)','<span class="kw">프로그램 접근</span>(1989 UN 결의): 투입이 국가 발전정책과 결합해 통합·일관·조화↑','이행 5단계: 개념화·프레임화·프로그래밍 등 (지속가능성은 \'단계\'가 아니라 \'가치\')','UNDP 4대 사업: 민주적 거버넌스·빈곤감소·위기예방회복·환경에너지 (\'젠더 활성화\'는 아님)'],
     tip:'사업(project)=시한·예산 내 특정 목표 / 프로그램=국가정책과 결합한 큰 틀. 헷갈리지 말기!' },
   bridge:{lead:'젠더를 마무리했어요. 다음은 인권입니다.', nextPreview:'인권 분야로 이어집니다.'},
   quiz:[
    {t:'mc',q:'젠더 개념의 등장 배경으로 옳은 것은?',choices:['1990년대 등장, 생물학적 성 강조','1960~70년대 초 등장, 생물학적 성역할 문제 분석의 초석','2000년대 등장','성과 무관한 경제 개념'],answer:1,hint:'1960~70년대.',ex:'젠더 개념은 1960~70년대 초 등장해 생물학적 성역할 문제를 분석하는 초석이 되었습니다.'},
    {t:'mc',q:'국제개발사업의 투입이 각국 정부의 발전정책 프레임과 결합해 통합성·일관성·조화성을 높이는 것을 가리키는 개념은?',choices:['사업(project)','프로그램 접근','성주류화','이중트랙'],answer:1,hint:'1989 UN 결의 44/211.',ex:'프로그램 접근은 투입을 국가 발전정책과 결합해 통합·일관·조화를 높입니다.'},
    {t:'mc',q:'국제연합개발계획(UNDP)의 4대 주요 사업 분야가 아닌 것은?',choices:['민주적 거버넌스','빈곤감소','환경과 에너지','젠더의 활성화'],answer:3,hint:'4대 분야를 떠올려요.',ex:'UNDP 4대 분야는 민주적 거버넌스·빈곤감소·위기예방과 회복·환경과 에너지입니다.'},
    {t:'ox',q:'프로그램·사업 이행의 각 단계에서 중심 가치로 삼는 것에는 지속가능성·관련성·효과성이 있다.',a:true,hint:'가치 vs 단계 구분.',ex:'지속가능성·관련성·효과성은 \'가치\'이고, 실행(Implementation)은 이행 \'과정\'입니다.'},
    {t:'free',q:'개발에서 \'사업(project)\'과 \'프로그램(program)\'의 차이를 간단히 쓰시오.',keys:['시한','정책'],model:'사업은 일정 시한·예산 내 특정 목표 실현을 위한 행동, 프로그램은 국가 발전정책과 결합한 더 큰 틀.',hint:'시한·예산 vs 국가정책 결합',ex:'사업=시한·예산 내 특정 목표, 프로그램=국가정책과 결합한 큰 틀입니다.'}
   ]}
]},

{ id:'aenv', title:'심화 8. 환경', source:'2과목', color:'#2a9d8f', icon:'🌳', lessons:[
 { id:'aenvl1', title:'환경과 국제개발', en:'Environment',
   concept:{ why:'개발과 환경은 자주 충돌해요. 댐을 지으면 전기를 얻지만 숲이 잠기죠. 그래서 "개발하되 환경을 해치지 않는" 장치(환경평가)와 역사적 환경 사건들이 시험에 꾸준히 나옵니다.',
     def:{term:'환경 분야', body:'대기·수질·토양 오염과 삼림파괴·생물다양성 감소 등을 다루며, 경제·사회·환경의 균형(지속가능발전)을 추구하는 분야.'},
     points:['20세기 3대 오염: <span class="kw">대기·수질·토양</span> (산림오염 아님)','역사적 사건: 런던스모그(1952, 대기)·미나마타병(메틸수은)·울산공단(우리나라 최초 공해)','<span class="kw">환경영향평가(EIA)</span>: 개별 사업의 환경영향 평가 / <span class="kw">전략적 환경평가(SEA)</span>: 정책·계획 상위단계','<span class="kw">기후불의</span>: 책임 적은 최빈국이 피해를 더 받는 불일치'],
     tip:'EIA=사업(프로젝트) 단위 / SEA=정책·계획 상위 단계. "상위=Strategic"으로 연결!' },
   bridge:{lead:'환경을 지키는 국제 장치와 기금(GEF·GGGI·GCF)이 이어집니다.', nextPreview:'환경 분야 국제기구·협약과 기후행동으로 이어집니다.'},
   quiz:[
    {t:'mc',q:'20세기의 대표적 3대 환경오염 문제에 해당하지 않는 것은?',choices:['대기오염','수질오염','토양오염','산림오염'],answer:3,hint:'"오염" 3종 세트를 떠올려요.',ex:'20세기 대표 3대 오염은 대기·수질·토양오염입니다. (삼림파괴는 별도 사안)'},
    {t:'mc',q:'1952년 연료 연소로 발생한 이산화황이 안개와 결합해 2주에 4천여 명이 사망한 사건은?',choices:['미나마타병','이타이이타이병','런던스모그','크롬 중독'],answer:2,hint:'영국 수도의 안개.',ex:'런던스모그(1952)는 황산미스트로 단기간에 수천 명이 사망한 대기오염 사건입니다.'},
    {t:'mc',q:'개별 개발사업이 환경에 미칠 영향을 조사·평가하는 도구는?',choices:['환경주류화','환경영향평가(EIA)','전략적 환경평가(SEA)','녹색기후기금(GCF)'],answer:1,hint:'프로젝트 단위 평가.',ex:'EIA는 개별 사업의 환경영향을 평가하고, SEA는 정책·계획 등 상위 단계를 다룹니다.'},
    {t:'ox',q:'전략적 환경평가(SEA)는 개별 프로젝트보다 상위인 정책·계획·프로그램 단계의 환경 영향을 다룬다.',a:true,hint:'"Strategic=상위 전략".',ex:'SEA는 정책·계획·프로그램 등 상위 단계에서 환경을 고려하는 도구입니다.'},
    {t:'free',q:'"기후불의(Climate Injustice)"가 무엇인지 한 문장으로 설명하시오.',keys:['책임','최빈국','피해'],model:'기후변화에 책임이 가장 적은 최빈국·약자에게 기후재난 피해가 집중되는, 책임과 피해의 불일치 상황.',hint:'책임 적은 나라 / 피해 큼',ex:'책임이 적은 최빈국·사회적 약자에게 피해가 집중되는 불일치가 기후불의입니다.'}
   ]},
 { id:'aenvl2', title:'환경 국제기구와 협약', en:'Env Institutions',
   concept:{ why:'환경은 "돈"과 "약속"으로 움직여요. 어떤 기금이 언제 생겼고, 한국이 유치한 기구(GGGI·GCF)가 무엇인지가 단골 문제입니다.',
     def:{term:'환경 거버넌스', body:'국제 환경기금·연구기구·정상회의를 통해 지속가능발전을 추진하는 체계.'},
     points:['<span class="kw">GEF(지구환경금융)</span>: 1991년 세계은행 10억$ 시범프로그램으로 설립','<span class="kw">GGGI(글로벌녹색성장연구소)</span>: 2010년 한국 민법 제3조 비영리단체 → 2012 국제기구 전환','한국: 2008 <span class="kw">저탄소 녹색성장</span> 국가비전, 2000 지속가능발전위원회','2002 요하네스버그 <span class="kw">WSSD</span>(세계지속가능발전정상회의), 1992 리우회의'],
     tip:'한국발 환경기구: GGGI(2010, 연구소)·GCF(송도, 기금). "녹색성장=한국 브랜드"로 기억!' },
   bridge:{lead:'환경 다음은 그 핵심인 기후행동입니다.', nextPreview:'기후위기 대응과 파리협정으로 이어집니다.'},
   quiz:[
    {t:'mc',q:'1991년 세계은행의 10억 달러 규모 시범 프로그램으로 설립된, 가장 포괄적인 환경 국제기금은?',choices:['GCF','GEF(지구환경금융)','GGGI','KOICA'],answer:1,hint:'가장 오래되고 포괄적인 환경기금.',ex:'지구환경금융(GEF)은 1991년 세계은행 시범 프로그램으로 설립되었습니다.'},
    {t:'mc',q:'2010년 한국 민법 제3조에 의해 비영리단체로 출범해 2012년 국제기구로 전환된 녹색성장 연구기구는?',choices:['GEF','GGGI(글로벌녹색성장연구소)','GCF','UNEP'],answer:1,hint:'한국이 주도한 "녹색성장" 연구소.',ex:'GGGI는 2010년 한국 민법 제3조 비영리단체로 출범 후 2012년 국제기구가 되었습니다.'},
    {t:'mc',q:'2002년 남아프리카공화국 요하네스버그에서 개최된 회의는?',choices:['리우회의','WSSD(세계지속가능발전정상회의)','교토 COP3','스톡홀름 회의'],answer:1,hint:'리우+10에 해당.',ex:'2002년 요하네스버그에서 WSSD가 개최되었습니다.'},
    {t:'ox',q:'한국은 2008년 "저탄소 녹색성장"을 국가비전으로 선포했다.',a:true,hint:'2008년 새 국가비전.',ex:'2008년 저탄소 녹색성장을 국가비전으로 선포해 저탄소·자원절약형 체계를 추진했습니다.'},
    {t:'free',q:'한국이 유치·주도한 환경 분야 국제기구 2개를 쓰시오.',keys:['GGGI','GCF'],model:'글로벌녹색성장연구소(GGGI), 녹색기후기금(GCF).',hint:'녹색성장연구소 / 녹색기후기금',ex:'GGGI와 GCF(송도)가 대표적입니다.'}
   ]}
]},
{ id:'a8', title:'심화 9. 인권', source:'2과목', color:'#4361ee', icon:'✊', lessons:[
 { id:'a8l1', title:'인권과 개발', en:'Human Rights',
   concept:{ why:'2과목의 마지막. 개발과 인권은 따로 놀다가 만났어요. 아마르티아 센이 "인권 실현이 곧 개발의 목적"이라 연결했죠. 1과목의 빈곤 개념과 다시 만나는 지점이에요.',
     def:{term:'인권과 개발', body:'인권은 보편·양도불가·불가분·상호의존적. 국가는 인권을 존중·보호·충족할 의무가 있으며, 개발에 인권기반접근(HRBA)을 적용한다.'},
     points:['특성: <span class="kw">보편성·양도불가능·불가분성·상호의존성</span>','국가 의무: <span class="kw">존중·보호·충족</span>','1968 UN <span class="kw">발전권 선언</span> → 발전을 인권의 언어로','아마르티아 센: 인권 실현이 개발의 목적이자 수단 → <span class="kw">인권기반접근(HRBA)</span>'],
     tip:'국가의 인권 3대 의무 "존중·보호·충족"은 거의 매번 나오는 보기 함정.' },
   bridge:{lead:'2과목까지 완주! 이제 복습 탭에서 약점을 다지고, 학습계획대로 마무리하면 합격이 보여요. 🎉', nextPreview:'전체 과정을 한 바퀴 돌았습니다. 복습으로 장기기억을 굳히세요.'},
   quiz:[
    {t:'mc',q:'국가의 인권 의무 3가지에 해당하지 않는 것은?',choices:['존중의 의무','보호의 의무','충족의 의무','처벌의 의무'],answer:3,hint:'국가가 "지키고 막고 채우는" 것.',ex:'국가의 인권 의무는 존중·보호·충족입니다.'},
    {t:'mc',q:'인권의 기본 특성으로 보기 어려운 것은?',choices:['보편성','양도 가능성','불가분성','상호 의존성'],answer:1,hint:'팔거나 넘길 수 있을까요?',ex:'인권은 양도 불가능(inalienable)합니다.'},
    {t:'ox',q:'1968년 UN 발전권 선언은 발전을 인권의 언어로 정의하는 계기가 되었다.',a:true,hint:'발전 + 권리.',ex:'1968년 UN 발전권 선언이 인권과 개발의 접합점을 마련했습니다.'},
    {t:'mc',q:'빈곤을 "기회와 권력의 박탈"로 보고 인권 실현이 개발의 목적이자 수단이라 강조한 학자는?',choices:['로스토','아마르티아 센','폴 콜리어','챔버스'],answer:1,hint:'1과목 빈곤 단원의 그 학자.',ex:'아마르티아 센은 인권 실현을 개발의 목적이자 수단으로 강조했습니다.'},
    {t:'free',q:'국가가 지는 인권 의무 3가지를 쓰시오.',keys:['존중','보호','충족'],model:'존중의 의무, 보호의 의무, 충족의 의무.',hint:'존중 / 보호 / 충족',ex:'존중·보호·충족입니다.'}
   ]},
 { id:'a8l2', title:'인권의 분류·접근 심화', en:'Rights Classification',
   concept:{ why:'인권 문제는 "정의·특성·세대별 분류·HRBA"에서 갈려요. 자유권과 사회권, 3세대 인권, 인권기반접근을 정리하면 마무리됩니다.',
     def:{term:'인권의 분류', body:'UN은 인권을 "기본적 자유·권리·존엄에 대한 침해로부터 개인·집단을 보호하는 보편적 법적 보장"으로 정의한다.'},
     points:['1993 빈 <span class="kw">세계인권회의</span>에서 인권의 기본 성격 선언','특성: 보편성·불가분성·평등·상호의존성 (평등=\'빵과 자유\'의 핵심가치)','3세대 인권: 1세대 <span class="kw">자유권</span> / 2세대 <span class="kw">사회권</span> / 3세대 <span class="kw">연대권</span>(발전권·평화권·환경권)','<span class="kw">인권기반접근(HRBA)</span>: 개발에 인권 원칙을 통합'],
     tip:'자유권=국가가 침해 안 하기(소극적), 사회권=국가가 적극 제공. 3세대=발전·평화·환경(집단 권리)!' },

<script id="engine">
/* ===================== 저장/상태 ===================== */
const LS='oda_lm_v2';
const DEF={setup:null,progress:{},xp:0,streak:0,lastStudy:null,studyDays:[],updatedAt:0};
let S=load();
function load(){try{return Object.assign({},DEF,JSON.parse(localStorage.getItem(LS))||{})}catch(e){return Object.assign({},DEF)}}
function save(){S.updatedAt=Date.now();localStorage.setItem(LS,JSON.stringify(S));scheduleCloudPush();}
const CFG=loadCfg();
function loadCfg(){try{return JSON.parse(localStorage.getItem(LS+'_cfg'))||{sound:true}}catch(e){return {sound:true}}}
function saveCfg(){localStorage.setItem(LS+'_cfg',JSON.stringify(CFG));}

const GRADES={
 A:{label:'A · 최상위',desc:'만점/최우수',pass:.9,buffer:.30},
 B:{label:'B · 안정권',desc:'고득점 합격',pass:.8,buffer:.20},
 C:{label:'C · 합격권',desc:'무난한 합격(60점+)',pass:.7,buffer:.12},
 D:{label:'D · 기초',desc:'핵심만 빠르게',pass:.6,buffer:.05}
};
const TIMES={light:{label:'가볍게',min:15},normal:{label:'보통',min:30},hard:{label:'집중',min:50}};

/* ===================== 효과음 (Web Audio) ===================== */
let AC=null;
function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}}return AC;}
function tone(freq,dur,type='sine',vol=.18,delay=0){
  if(!CFG.sound)return; const c=ac(); if(!c)return;
  const o=c.createOscillator(),g=c.createGain();
  o.type=type;o.frequency.value=freq;o.connect(g);g.connect(c.destination);
  const t=c.currentTime+delay;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.01);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.start(t);o.stop(t+dur+.02);
}
const SND={
  click:()=>tone(330,.06,'triangle',.10),
  select:()=>tone(520,.07,'sine',.12),
  correct:()=>{tone(660,.10,'sine',.16,0);tone(880,.14,'sine',.16,.09);},
  wrong:()=>{tone(196,.18,'sawtooth',.12,0);tone(155,.22,'sawtooth',.10,.10);},
  partial:()=>{tone(523,.10,'sine',.14,0);tone(587,.12,'sine',.12,.10);},
  complete:()=>{[523,659,784,1047].forEach((f,i)=>tone(f,.16,'sine',.16,i*.10));},
  tab:()=>tone(440,.05,'triangle',.08)
};

/* ===================== 유틸 ===================== */
const $=(s,el=document)=>el.querySelector(s);
const app=$('#app');
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function allLessons(){const a=[];COURSE.units.forEach(u=>u.lessons.forEach(l=>a.push({unit:u,lesson:l})));return a;}
function lp(id){return S.progress[id]||{status:'locked',best:0};}
function todayStr(){return new Date().toISOString().slice(0,10);}
function daysBetween(a,b){return Math.round((b-a)/864e5);}
function fmtDate(d){return `${d.getMonth()+1}/${d.getDate()}`;}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1900);}

/* 콘텐츠 정규화: 구·신 스키마 모두 지원 */
function quizItems(l){return (l.quiz||[]).map(q=>({
  t:q.t||(q.choices?'mc':(q.a===true||q.a===false?'ox':'free')),
  q:q.q, choices:q.choices||q.c, a:(q.answer!==undefined?q.answer:q.a),
  keys:q.keys||[], model:q.model||'', hint:q.hint||'', ex:q.ex||q.explain||''
}));}

/* ===================== 학습계획 ===================== */
function buildPlan(){
  const su=S.setup,total=allLessons().length;
  const exam=new Date(su.examDate+'T00:00:00'),today=new Date(todayStr()+'T00:00:00');
  let dleft=Math.max(1,daysBetween(today,exam));
  const g=GRADES[su.grade];
  const learnDays=Math.max(1,Math.round(dleft*(1-g.buffer)));
  const perDay=Math.max(1,Math.ceil(total/learnDays));
  return {total,daysLeft:dleft,learnDays,perDay,reviewDays:dleft-learnDays,exam,today,pass:g.pass};
}

/* ===================== 진도 초기화 ===================== */
function initProgress(){
  if(!S.setup)return;
  const ls=allLessons();
  ls.forEach((x,i)=>{if(!S.progress[x.lesson.id])S.progress[x.lesson.id]={status:i===0?'active':'locked',best:0};});
  let prevDone=true;
  ls.forEach(x=>{const st=S.progress[x.lesson.id];
    if(st.status==='done'){prevDone=true;}
    else{if(prevDone&&st.status==='locked')st.status='active';prevDone=false;}});
  save();
}

/* ===================== 라우팅 ===================== */
let CUR=null,QUIZ=null,NAV='path';
function render(){if(!S.setup){renderOnboarding();return;}renderPath();}
window.addEventListener('load',async()=>{await cloudAutoLoad();initProgress();render();});
document.addEventListener('pointerdown',()=>{ac();},{once:true});
</script>
<script id="engine2">
/* ===================== 온보딩 ===================== */
let OB={examDate:'',grade:'B',time:'normal'},PRESERVE=false;
function renderOnboarding(){
  app.innerHTML=`<div class="ob">
    <div class="logo">🌍📚</div><h1>ODA 러닝메이트</h1>
    <div class="sub">국제개발협력 자격시험, 단계별로 정복</div>
    <div class="ob-step"><h3>📅 시험은 언제인가요?</h3><p class="hint">남은 기간에 맞춰 학습 일정을 자동으로 짜드려요.</p>
      <input type="date" id="ob-date" min="${todayStr()}" value="${OB.examDate}"></div>
    <div class="ob-step"><h3>🎯 목표 등급은?</h3><p class="hint">합격 기준은 과목당 60점. 목표가 높을수록 하루 학습량·통과 기준이 올라가요.</p>
      <div class="grade-grid" id="ob-g">${Object.entries(GRADES).map(([k,v])=>`<button class="grade-card ${OB.grade===k?'sel':''}" data-g="${k}"><span class="g">${k}</span>${v.label.split('·')[1]}<span class="d">${v.desc}</span></button>`).join('')}</div></div>
    <div class="ob-step"><h3>⏱️ 하루 학습 강도</h3><p class="hint">매일 투자할 시간을 골라주세요.</p>
      <div class="time-grid" id="ob-t">${Object.entries(TIMES).map(([k,v])=>`<button class="time-card ${OB.time===k?'sel':''}" data-t="${k}"><span class="t">${v.min}분</span><span class="d">${v.label}</span></button>`).join('')}</div></div>
    <div id="ob-pv"></div><div style="flex:1"></div>
    <button class="btn" id="ob-start" disabled>학습 시작하기</button>
    <p class="center muted" style="font-size:.72rem;margin-top:10px">총 ${allLessons().length}개 레슨 · 1과목(이해) + 2과목(분야별 이슈)</p></div>`;
  $('#ob-date').addEventListener('change',e=>{OB.examDate=e.target.value;obPv();});
  $('#ob-g').addEventListener('click',e=>{const b=e.target.closest('[data-g]');if(b){SND.select();OB.grade=b.dataset.g;renderOnboarding();}});
  $('#ob-t').addEventListener('click',e=>{const b=e.target.closest('[data-t]');if(b){SND.select();OB.time=b.dataset.t;renderOnboarding();}});
  $('#ob-start').addEventListener('click',startCourse);
  obPv();
}
function obPv(){
  const ok=!!OB.examDate;$('#ob-start').disabled=!ok;const pv=$('#ob-pv');if(!pv)return;
  if(!ok){pv.innerHTML='';return;}
  const exam=new Date(OB.examDate+'T00:00:00'),today=new Date(todayStr()+'T00:00:00');
  const dleft=Math.max(0,daysBetween(today,exam)),total=allLessons().length,g=GRADES[OB.grade];
  const learnDays=Math.max(1,Math.round(Math.max(1,dleft)*(1-g.buffer))),perDay=Math.max(1,Math.ceil(total/learnDays));
  pv.innerHTML=`<div class="plan-box">
    <div class="plan-row"><span class="k">D-day</span><span class="v big">D-${dleft}</span></div>
    <div class="plan-row"><span class="k">하루 목표</span><span class="v">레슨 ${perDay}개 · 약 ${TIMES[OB.time].min}분</span></div>
    <div class="plan-row"><span class="k">학습/복습 기간</span><span class="v">${learnDays}일 / ${Math.max(0,dleft-learnDays)}일</span></div>
    <div class="plan-row"><span class="k">레슨 통과 기준</span><span class="v">정답률 ${Math.round(g.pass*100)}%+</span></div></div>`;
}
function startCourse(){
  SND.complete();
  const was=PRESERVE;
  S.setup={examDate:OB.examDate,grade:OB.grade,time:OB.time,startedAt:todayStr()};
  if(!PRESERVE){S.progress={};S.xp=0;S.streak=0;S.studyDays=[];S.lastStudy=null;}
  PRESERVE=false;initProgress();save();render();
  toast(was?'계획을 업데이트했어요!':'학습 계획이 준비됐어요! 🎉');
}

/* ===================== 학습 경로 ===================== */
function renderPath(){
  NAV='path';const plan=buildPlan(),ls=allLessons();
  const done=ls.filter(x=>lp(x.lesson.id).status==='done').length;
  const pct=Math.round(done/plan.total*100);
  const doneToday=(S.studyDays.find(d=>d.date===todayStr())||{count:0}).count;
  let html=`<div class="topbar"><div class="stat streak">🔥${S.streak}</div><div class="bar"><span style="width:${pct}%"></span></div><div class="stat xp">⭐${S.xp}</div></div>
   <div class="path-head"><div class="course">국제개발협력(ODA) 자격시험</div>
     <div class="meta"><span>📅 <b>D-${plan.daysLeft}</b></span><span>✅ <b>${done}/${plan.total}</b></span><span>🎯 <b>${S.setup.grade}등급</b></span></div></div>
   <div class="today-banner"><span class="ic">${doneToday>=plan.perDay?'🎉':'📌'}</span>${doneToday>=plan.perDay?`오늘 목표 달성! (${doneToday}/${plan.perDay})`:`오늘의 목표 · 레슨 ${plan.perDay}개 중 <b>${doneToday}개</b> 완료`}</div>
   <div class="path">`;
  let activeFound=false;
  COURSE.units.forEach(u=>{
    html+=`<div class="unit-header" style="background:${u.color}"><div><div class="ut">${u.title}</div><div class="us">${u.source} · 레슨 ${u.lessons.length}개</div></div><div style="font-size:1.5rem">${u.icon||'📘'}</div></div><div class="nodes">`;
    u.lessons.forEach(l=>{
      const st=lp(l.id);let cls=st.status,icon='🔒';
      if(st.status==='done'){cls=isDue(l.id)?'due':'done';icon=cls==='due'?'🔄':(st.best>=100?'👑':'⭐');}
      else if(st.status==='active'){cls='active';icon='▶';}
      const pop=st.status==='active'&&!activeFound;if(pop)activeFound=true;
      html+=`<div class="node-wrap ${pop?'cur':''}">${pop?'<div class="start-pop">시작</div>':''}<button class="node ${cls}" data-l="${l.id}" ${st.status==='locked'?'disabled':''}>${icon}</button><div class="node-label">${l.title}</div></div>`;
    });
    html+=`</div>`;
  });
  html+=`</div>`+navBar('path');
  app.innerHTML=html;
  app.querySelectorAll('[data-l]').forEach(b=>b.addEventListener('click',()=>{SND.click();openLesson(b.dataset.l);}));
  bindNav();
}

/* ===================== 레슨: 개념 ===================== */
function conceptCards(l){
  const c=l.concept;
  if(Array.isArray(c)){ // 구 스키마 호환
    return c.map(card=>({cls:'def',h:card.h||'개념',html:(card.body?`<p>${card.body}</p>`:'')+(card.points?`<ul>${card.points.map(p=>`<li>${p}</li>`).join('')}</ul>`:'')}));
  }
  const cards=[];
  if(c.why)cards.push({cls:'why',h:'🤔 왜 중요할까?',html:`<p>${c.why}</p>`});
  if(c.def)cards.push({cls:'def',h:'📖 핵심 정의',html:`<p><span class="term">${c.def.term}</span> — ${c.def.body}</p>`});
  if(c.points)cards.push({cls:'pts',h:'✅ 요점 정리',html:`<ul>${c.points.map(p=>`<li>${p}</li>`).join('')}</ul>`+(c.tip?'':'')});
  if(c.tip)cards.push({cls:'tip',h:'🧠 암기 팁',html:`<p>${c.tip}</p>`});
  return cards;
}
function openLesson(id){const x=allLessons().find(a=>a.lesson.id===id);if(!x)return;CUR=x;renderConcept(0);}
function renderConcept(i){
  const l=CUR.lesson,cards=conceptCards(l),n=cards.length;
  const sc=newScreen();
  sc.innerHTML=`<div class="lesson-top"><button class="x-btn" id="lx">✕</button><div class="lesson-bar"><span style="width:${Math.round((i+1)/(n+1)*100)}%"></span></div>${l.page?`<span class="lesson-page">📄 ${l.page}</span>`:''}</div>
   <div class="concept"><div class="lt">${l.title}</div>${l.en?`<div class="le">${l.en}</div>`:'<div class="le"></div>'}
     ${cards.slice(0,i+1).map(c=>`<div class="ccard ${c.cls}"><div class="ch">${c.h}</div>${c.html}</div>`).join('')}</div>
   <div class="qfoot"><button class="btn" id="cn">${i+1<n?'계속':'퀴즈 풀기 →'}</button></div>`;
  $('#lx').onclick=closeScreen;
  $('#cn').onclick=()=>{SND.click();if(i+1<n)renderConcept(i+1);else startQuiz();};

function keywordGrade(q,ans){
  const norm=s=>s.toLowerCase().replace(/\s|[.,·()\[\]'"]/g,'');
  const na=norm(ans);
  const hit=q.keys.filter(k=>na.includes(norm(k)));
  const ratio=q.keys.length?hit.length/q.keys.length:0;
  const score=Math.round(ratio*100);
  const correct=ratio>=0.6, partial=!correct&&ratio>=0.3;
  let fb;
  if(correct)fb=`핵심 키워드 ${hit.length}/${q.keys.length}개를 잘 짚었어요.`;
  else if(partial)fb=`핵심 일부(${hit.length}/${q.keys.length})만 담겼어요. 빠진 키워드: ${q.keys.filter(k=>!hit.includes(k)).join(', ')}`;
  else fb=`핵심을 더 담아야 해요. 필요한 키워드: ${q.keys.join(', ')}`;
  return {score,correct,partial,fb,ai:false};
}
async function aiGrade(q,ans){
  const sys='너는 국제개발협력(ODA) 자격시험의 서술형 채점관이다. 학생 답안이 문제의 핵심 의미를 정확히 파악했는지 "의미 기반"으로 평가하라(단순 키워드 일치가 아니라 개념 이해 여부). 반드시 JSON 객체 하나만 출력: {"score": 0~100 정수, "correct": true 또는 false, "feedback": "한국어 2문장 이내, 무엇을 맞혔고 무엇이 빠졌는지"}';
  const user=`[문제]\n${q.q}\n\n[모범답안]\n${q.model||q.ex||''}\n\n[채점 참고 키워드]\n${(q.keys||[]).join(', ')}\n\n[학생 답안]\n${ans}\n\n핵심 의미를 담았으면 correct=true. JSON만 출력하라.`;
  let text;
  if(CFG.aiProvider==='anthropic'){
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'x-api-key':CFG.aiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','content-type':'application/json'},
      body:JSON.stringify({model:CFG.aiModel||'claude-3-5-haiku-latest',max_tokens:400,system:sys,messages:[{role:'user',content:user}]})});
    if(!res.ok)throw new Error('Anthropic HTTP '+res.status);
    const d=await res.json();text=(d.content&&d.content[0]&&d.content[0].text)||'';
  }else{ // OpenAI 호환
    const base=(CFG.aiBase||'https://api.openai.com/v1').replace(/\/$/,'');
    const res=await fetch(base+'/chat/completions',{method:'POST',
      headers:{'Authorization':'Bearer '+CFG.aiKey,'content-type':'application/json'},
      body:JSON.stringify({model:CFG.aiModel||'gpt-4o-mini',temperature:0,messages:[{role:'system',content:sys},{role:'user',content:user}]})});
    if(!res.ok)throw new Error('OpenAI HTTP '+res.status);
    const d=await res.json();text=(d.choices&&d.choices[0]&&d.choices[0].message.content)||'';
  }
  const m=text.match(/\{[\s\S]*\}/);const j=JSON.parse(m?m[0]:text);
  const score=Math.max(0,Math.min(100,Math.round(Number(j.score)||0)));
  const correct=(j.correct===true)||(j.correct===undefined&&score>=60);
  return {score,correct,partial:(!correct&&score>=40),fb:j.feedback||'',ai:true};
}
async function gradeFree(q){
  const ans=($('#fa').value||'').trim();
  if(!ans){toast('답을 입력해 주세요');return;}
  QUIZ._ans=true;$('#fa').disabled=true;
  if(CFG.aiProvider&&CFG.aiProvider!=='none'&&CFG.aiKey){
    const btn=$('#qc');if(btn){btn.disabled=true;btn.textContent='🤖 AI가 채점 중...';}
    try{const r=await aiGrade(q,ans);finishQ(r.correct,q,ans,r);return;}
    catch(e){toast('AI 채점 실패('+e.message+') — 키워드 채점으로 대체');}
  }
  finishQ.call(null,...(()=>{const r=keywordGrade(q,ans);return [r.correct,q,ans,r];})());
}
function finishQ(correct,q,myAns,free){
  QUIZ.records.push({q,correct,myAns,free});
  if(correct)QUIZ.correct++;
  const foot=$('#qf');
  if(correct){SND.correct();foot.className='qfoot ok';}
  else if(free&&free.partial){SND.partial();foot.className='qfoot part';}
  else {SND.wrong();foot.className='qfoot no';}
  const head=correct?'정답이에요!':(free&&free.partial?'거의 맞았어요':'아쉬워요');
  const icon=correct?'✓':(free&&free.partial?'~':'✕');
  let exHtml=`<div class="ex">${q.ex||''}</div>`;
  if(free){exHtml=`<div class="ex"><b>${free.ai?'🤖 AI 채점':'📝 키워드 채점'} (점수 ${free.score}%)</b><br>${free.fb}</div>
     <div class="modelans"><span class="ml">모범답안</span><br>${q.model||q.ex||''}</div>`;}
  foot.innerHTML=`<div class="fb"><div class="ic">${icon}</div><div><div class="fbt">${head}</div>${exHtml}</div></div>
    <button class="btn ${correct?'':(free&&free.partial?'gold':'red')}" id="qc">${QUIZ.i+1<QUIZ.total?'계속':'결과 보기'}</button>`;
  $('#qc').onclick=()=>{QUIZ._ans=false;nextQuiz();};
}

function finishLesson(){

  const passed=acc>=plan.pass,best=Math.round(acc*100),secs=Math.round((Date.now()-QUIZ.start)/1000);

    S.progress[l.id]={status:'done',best:Math.max(best,st.best||0),due:nextReview(best)};
    const ls=allLessons(),idx=ls.findIndex(x=>x.lesson.id===l.id);
    if(idx+1<ls.length){const nx=ls[idx+1].lesson.id;if(lp(nx).status==='locked')S.progress[nx]={status:'active',best:0};}
    recordStudy();SND.complete();
  } else SND.wrong();

     <div class="rstats"><div class="rbox acc"><div class="rl">정답률</div><div class="rv">${best}%</div></div><div class="rbox xp"><div class="rl">획득 XP</div><div class="rv">+${gained}</div></div><div class="rbox tm"><div class="rl">소요</div><div class="rv">${secs}s</div></div></div>
     <button class="btn ${passed?'':'red'}" id="rmain">${passed?'다음 개념으로 이동 →':'다시 도전하기'}</button>

     <div style="margin:18px 0 8px;font-weight:800;color:#666;font-size:.9rem">📋 문제별 복습 (눌러서 펼치기)</div>
     ${QUIZ.records.map((r,i)=>`<div class="revitem" data-i="${i}"><div class="revq ${r.correct?'ok':'no'}"><div class="ri">${r.correct?'✓':'✕'}</div><div class="qtx"><span class="qt qtype ${r.q.t}">${tag[r.q.t]}</span>${r.q.q}</div><span class="chev">▾</span></div>
       <div class="revbody">
         ${r.q.t==='free'?`<div class="ra mine"><span class="ral">내 답변</span><br>${esc(r.myAns)}</div><div class="ra ans"><span class="ral">모범답안</span><br>${r.q.model||r.q.ex||''}</div>`:
           `<div class="ra ${r.correct?'ans':'mine'}"><span class="ral">내 선택</span><br>${esc(r.myAns)}</div>${r.correct?'':`<div class="ra ans"><span class="ral">정답</span><br>${r.q.t==='ox'?(r.q.a?'맞다':'아니다'):esc(r.q.choices[r.q.a])}</div>`}`}

   </div>`;
  $('#lx').onclick=closeScreen;

}

function recordStudy(){const t=todayStr();let d=S.studyDays.find(x=>x.date===t);if(!d){d={date:t,count:0};S.studyDays.push(d);}d.count++;
  if(S.lastStudy!==t){const y=new Date(Date.now()-864e5).toISOString().slice(0,10);S.streak=(S.lastStudy===y)?S.streak+1:1;S.lastStudy=t;}}

     <h3 style="margin:16px 0 10px;font-size:1.05rem">📚 단원별 진도</h3>
     ${COURSE.units.map(u=>{const d=u.lessons.filter(l=>lp(l.id).status==='done').length,t=u.lessons.length;
       return `<div class="card" style="padding:13px 15px;margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-weight:800;margin-bottom:7px;font-size:.92rem"><span>${u.icon||'📘'} ${u.title}</span><span style="color:var(--green-d)">${d}/${t}</span></div><div class="bar" style="height:11px"><span style="width:${Math.round(d/t*100)}%"></span></div></div>`;}).join('')}
   </div>`+navBar('profile');
  app.innerHTML=html;bindNav();
}

/* ===================== 설정/동기화 탭 ===================== */

     <div class="card"><div style="font-weight:900;margin-bottom:4px">☁️ 기기 간 진도 동기화 (Supabase)</div>

       <input type="password" id="sk" placeholder="anon public key" value="${esc(CFG.supaKey||'')}" style="margin-bottom:8px">
       <input type="text" id="scd" placeholder="나만의 동기화 코드 (예: sein-oda-2026)" value="${esc(CFG.syncCode||'')}" style="margin-bottom:10px">
       <button class="btn blue sm" id="savecfg" style="margin-bottom:8px">동기화 설정 저장</button>
       <div style="display:flex;gap:8px"><button class="btn ghost sm" id="cpush">⬆️ 클라우드에 올리기</button><button class="btn ghost sm" id="cpull">⬇️ 클라우드에서 가져오기</button></div>
       <div id="syncmsg" class="muted" style="font-size:.8rem;margin-top:8px"></div></div>
     <div class="card"><div style="font-weight:900;margin-bottom:4px">🤖 AI 서술형 채점 (선택)</div>
       <p class="muted" style="font-size:.82rem;margin-bottom:10px">설정하면 자유응답을 <b>문장 의미 기반</b>으로 채점해요. API 키는 <b>이 브라우저에만</b> 저장되며 파일·GitHub에 들어가지 않습니다. (미설정 시 키워드 채점)</p>
       <select id="aip" style="width:100%;padding:12px;border:2px solid var(--gray-l);border-radius:13px;font-size:1rem;font-family:inherit;background:#fff;margin-bottom:8px">
         <option value="none">사용 안 함 (키워드 채점)</option>
         <option value="openai">OpenAI (또는 호환 API)</option>
         <option value="anthropic">Anthropic (Claude)</option></select>
       <input type="password" id="aikey" placeholder="API Key (sk-... 등)" value="${esc(CFG.aiKey||'')}" style="margin-bottom:8px">
       <input type="text" id="aimodel" placeholder="모델명 (예: gpt-4o-mini 또는 claude-3-5-haiku-latest)" value="${esc(CFG.aiModel||'')}" style="margin-bottom:8px">
       <input type="text" id="aibase" placeholder="(OpenAI 호환 전용) Base URL · 기본 https://api.openai.com/v1" value="${esc(CFG.aiBase||'')}" style="margin-bottom:10px">
       <button class="btn blue sm" id="aisave">AI 채점 설정 저장</button>
       <div id="aimsg" class="muted" style="font-size:.8rem;margin-top:8px"></div></div>
     <div class="card"><div style="font-weight:900;margin-bottom:8px">💾 백업 (파일)</div>
       <div style="display:flex;gap:8px"><button class="btn ghost sm" id="exp">내보내기(JSON)</button><button class="btn ghost sm" id="imp">가져오기</button></div>

  app.innerHTML=html;bindNav();
  $('#swsound').onclick=function(){CFG.sound=!CFG.sound;saveCfg();this.classList.toggle('on');if(CFG.sound)SND.correct();};

  $('#cpush').onclick=async()=>{$('#syncmsg').textContent='올리는 중...';const r=await cloudPush(true);$('#syncmsg').textContent=r;};
  $('#cpull').onclick=async()=>{if(!confirm('클라우드 진도로 덮어쓸까요?'))return;$('#syncmsg').textContent='가져오는 중...';const r=await cloudPull();$('#syncmsg').textContent=r;};
  $('#exp').onclick=()=>{const blob=new Blob([JSON.stringify(S)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='oda_progress_'+todayStr()+'.json';a.click();};
  $('#imp').onclick=()=>$('#impf').click();

    $('#aimsg').textContent=CFG.aiProvider==='none'?'키워드 채점을 사용합니다.':`✅ 저장됨 · ${CFG.aiProvider==='anthropic'?'Anthropic':'OpenAI'} 채점이 켜졌어요.`;};
  $('#hard').onclick=()=>{if(confirm('모든 진도와 설정을 삭제할까요?')){localStorage.removeItem(LS);S=load();OB={examDate:'',grade:'B',time:'normal'};render();}};
}

/* ===================== Supabase 동기화 ===================== */
let pushT=null;
function syncReady(){return CFG.supaUrl&&CFG.supaKey&&CFG.syncCode;}
function scheduleCloudPush(){if(!syncReady())return;clearTimeout(pushT);pushT=setTimeout(()=>cloudPush(false),2500);}
async function cloudPush(manual){
  if(!syncReady())return '동기화 정보를 먼저 저장하세요.';
  try{
    const r=await fetch(`${CFG.supaUrl}/rest/v1/oda_progress?on_conflict=code`,{method:'POST',
      headers:{apikey:CFG.supaKey,Authorization:'Bearer '+CFG.supaKey,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify([{code:CFG.syncCode,data:S,updated_at:new Date().toISOString()}])});
    if(!r.ok)throw new Error('HTTP '+r.status);
    return manual?'✅ 클라우드에 저장됐어요.':'';
  }catch(e){return '❌ 실패: '+e.message+' (설정/테이블 확인)';}
}
async function cloudPull(){
  if(!syncReady())return '동기화 정보를 먼저 저장하세요.';
  try{
    const r=await fetch(`${CFG.supaUrl}/rest/v1/oda_progress?code=eq.${encodeURIComponent(CFG.syncCode)}&select=data`,{headers:{apikey:CFG.supaKey,Authorization:'Bearer '+CFG.supaKey}});
    if(!r.ok)throw new Error('HTTP '+r.status);const rows=await r.json();
    if(!rows.length)return '클라우드에 저장된 진도가 없어요.';
    S=Object.assign({},DEF,rows[0].data);localStorage.setItem(LS,JSON.stringify(S));initProgress();render();return '✅ 가져왔어요!';
  }catch(e){return '❌ 실패: '+e.message;}
}
async function cloudAutoLoad(){
  if(!syncReady())return;
  try{
    const r=await fetch(`${CFG.supaUrl}/rest/v1/oda_progress?code=eq.${encodeURIComponent(CFG.syncCode)}&select=data,updated_at`,{headers:{apikey:CFG.supaKey,Authorization:'Bearer '+CFG.supaKey}});
    if(!r.ok)return;const rows=await r.json();if(!rows.length)return;
    const cloud=rows[0].data;if(cloud&&(cloud.updatedAt||0)>(S.updatedAt||0)){S=Object.assign({},DEF,cloud);localStorage.setItem(LS,JSON.stringify(S));}
  }catch(e){}
}

   <button class="${a==='path'?'on':''}" data-nav="path"><span class="ic">🛤️</span>학습</button>

   <button class="${a==='profile'?'on':''}" data-nav="profile"><span class="ic">📊</span>현황</button>
   <button class="${a==='settings'?'on':''}" data-nav="settings"><span class="ic">⚙️</span>설정</button></div>`;}
function bindNav(){app.querySelectorAll('[data-nav]').forEach(b=>b.addEventListener('click',()=>{SND.tab();const n=b.dataset.nav;({path:renderPath,review:renderReview,plan:renderPlan,profile:renderProfile,settings:renderSettings}[n])();}));}
</script>
