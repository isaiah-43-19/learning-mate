<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ODA 러닝메이트 · 국제개발협력 자격시험 대비</title>
<style>
:root{
  --green:#58cc02;--green-d:#46a302;--green-l:#d7ffb8;
  --blue:#1cb0f6;--blue-d:#1899d6;--blue-l:#e3f4ff;
  --purple:#ce82ff;--purple-d:#a44dd6;
  --gold:#ffc800;--gold-d:#e6a800;
  --red:#ff4b4b;--red-d:#e63939;--red-l:#ffdfe0;
  --orange:#ff9600;
  --ink:#3c3c3c;--gray:#afafaf;--gray-l:#e5e5e5;--gray-bg:#f7f7f7;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  color:var(--ink);background:var(--gray-bg);line-height:1.5;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
textarea{font-family:inherit}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:#fff;position:relative;display:flex;flex-direction:column}
.hidden{display:none!important}.center{text-align:center}.muted{color:var(--gray)}.kw{font-weight:800;color:var(--ink)}
h1,h2,h3{letter-spacing:-.01em}

.btn{display:block;width:100%;padding:15px;border-radius:16px;font-size:1.05rem;font-weight:800;color:#fff;background:var(--green);box-shadow:0 4px 0 var(--green-d);transition:transform .05s,filter .1s}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--green-d)}
.btn:disabled{background:var(--gray-l);color:#fff;box-shadow:0 4px 0 #cfcfcf;cursor:default}
.btn.blue{background:var(--blue);box-shadow:0 4px 0 var(--blue-d)}.btn.blue:active{box-shadow:0 2px 0 var(--blue-d)}
.btn.red{background:var(--red);box-shadow:0 4px 0 var(--red-d)}.btn.red:active{box-shadow:0 2px 0 var(--red-d)}
.btn.gold{background:var(--gold);color:#7a5a00;box-shadow:0 4px 0 var(--gold-d)}
.btn.ghost{background:#fff;color:var(--blue);border:2px solid var(--gray-l);box-shadow:0 4px 0 var(--gray-l)}
.btn.sm{padding:10px;font-size:.92rem;border-radius:13px}

/* onboarding */
.ob{padding:26px 22px 40px;display:flex;flex-direction:column;min-height:100vh}
.ob .logo{font-size:3rem;text-align:center;margin-top:14px}
.ob h1{font-size:1.6rem;text-align:center;margin:8px 0 2px;color:var(--green-d)}
.ob .sub{text-align:center;color:var(--gray);margin-bottom:20px;font-weight:600;font-size:.92rem}
.ob-step{background:var(--gray-bg);border-radius:18px;padding:18px;margin-bottom:14px}
.ob-step h3{font-size:1.02rem;margin-bottom:4px}
.ob-step p.hint{font-size:.82rem;color:var(--gray);margin-bottom:12px}
input[type=date],input[type=text],input[type=password]{width:100%;padding:13px;border:2px solid var(--gray-l);border-radius:13px;font-size:1.02rem;font-family:inherit;color:var(--ink);background:#fff}
input:focus{outline:none;border-color:var(--blue)}
.grade-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grade-card{border:2px solid var(--gray-l);border-radius:14px;padding:12px;text-align:center;background:#fff;transition:.12s;font-weight:700}
.grade-card .g{font-size:1.4rem;font-weight:900;display:block}
.grade-card .d{font-size:.74rem;color:var(--gray);font-weight:600;margin-top:2px}
.grade-card.sel{border-color:var(--green);background:var(--green-l);color:var(--green-d)}.grade-card.sel .d{color:var(--green-d)}
.time-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.time-card{border:2px solid var(--gray-l);border-radius:14px;padding:12px 4px;text-align:center;font-weight:700;background:#fff;transition:.12s}
.time-card .t{font-size:1.1rem;font-weight:900;display:block}.time-card .d{font-size:.7rem;color:var(--gray)}
.time-card.sel{border-color:var(--blue);background:var(--blue-l);color:var(--blue-d)}
.plan-box{background:#fff;border:2px solid var(--green);border-radius:18px;padding:16px;margin-bottom:14px}
.plan-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px dashed var(--gray-l)}
.plan-row:last-child{border-bottom:none}.plan-row .k{color:var(--gray);font-weight:700;font-size:.9rem}
.plan-row .v{font-weight:900;font-size:1rem}.plan-row .v.big{color:var(--green-d);font-size:1.15rem}

/* top */
.topbar{display:flex;align-items:center;gap:12px;padding:13px 16px;position:sticky;top:0;background:#fff;z-index:20;border-bottom:2px solid var(--gray-bg)}
.stat{display:flex;align-items:center;gap:4px;font-weight:800}
.stat.streak{color:var(--orange)}.stat.xp{color:var(--gold-d)}
.bar{flex:1;height:15px;background:var(--gray-l);border-radius:10px;overflow:hidden}
.bar>span{display:block;height:100%;background:var(--green);border-radius:10px;transition:width .4s}
.iconbtn{font-size:1.2rem;width:30px;text-align:center}

.path-head{padding:16px;background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;border-radius:0 0 22px 22px}
.path-head .course{font-size:1.2rem;font-weight:900}
.path-head .meta{display:flex;gap:14px;margin-top:8px;font-size:.82rem;font-weight:700;opacity:.95;flex-wrap:wrap}
.path-head .meta b{font-size:.98rem}
.today-banner{margin:10px 14px;background:var(--gold);color:#7a5a00;border-radius:16px;padding:11px 15px;font-weight:800;display:flex;align-items:center;gap:9px;box-shadow:0 4px 0 var(--gold-d);font-size:.92rem}
.today-banner .ic{font-size:1.3rem}
.path{padding:6px 0 96px}
.unit-header{margin:16px 14px 4px;padding:13px 17px;border-radius:16px;color:#fff;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 0 rgba(0,0,0,.16)}
.unit-header .ut{font-weight:900;font-size:1.02rem}.unit-header .us{font-size:.74rem;opacity:.92;font-weight:700}
.nodes{display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 0}
.node-wrap{position:relative;display:flex;flex-direction:column;align-items:center}
.node{width:72px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.7rem;transition:transform .08s}
.node:active{transform:translateY(3px)}
.node.locked{background:var(--gray-l);box-shadow:0 5px 0 #cfcfcf;color:#fff}
.node.active{background:var(--green);box-shadow:0 6px 0 var(--green-d);color:#fff}
.node.done{background:var(--gold);box-shadow:0 6px 0 var(--gold-d);color:#fff}
.node.due{background:var(--blue);box-shadow:0 6px 0 var(--blue-d);color:#fff}
.node-label{font-size:.72rem;font-weight:800;color:var(--gray);margin-top:4px;max-width:150px;text-align:center}
.node.active~.node-label,.node-wrap.cur .node-label{color:var(--green-d)}
.start-pop{position:absolute;top:-44px;left:50%;transform:translateX(-50%);background:#fff;border:2px solid var(--green);color:var(--green-d);font-weight:900;font-size:.78rem;padding:5px 11px;border-radius:12px;white-space:nowrap;box-shadow:0 3px 0 var(--green-d);animation:bob 1.1s infinite}
.start-pop:after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border:7px solid transparent;border-top-color:var(--green)}
@keyframes bob{0%,100%{transform:translateX(-50%)}50%{transform:translateX(-50%) translateY(-4px)}}
.nodes .node-wrap:nth-child(6n+2){margin-left:64px}.nodes .node-wrap:nth-child(6n+3){margin-left:100px}
.nodes .node-wrap:nth-child(6n+4){margin-left:64px}.nodes .node-wrap:nth-child(6n+6){margin-left:-64px}.nodes .node-wrap:nth-child(6n+1){margin-left:-100px}

.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:2px solid var(--gray-l);display:flex;justify-content:space-around;padding:7px 0 9px;z-index:30}
.bottomnav button{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--gray);font-weight:800;font-size:.66rem;flex:1}
.bottomnav button .ic{font-size:1.3rem}.bottomnav button.on{color:var(--blue)}

/* lesson screen */
.screen{position:fixed;inset:0;background:#fff;z-index:50;max-width:480px;margin:0 auto;display:flex;flex-direction:column;overflow-y:auto}
.lesson-top{display:flex;align-items:center;gap:12px;padding:13px 16px;position:sticky;top:0;background:#fff;z-index:5}
.x-btn{font-size:1.4rem;color:var(--gray);font-weight:900;width:28px}
.lesson-bar{flex:1;height:14px;background:var(--gray-l);border-radius:8px;overflow:hidden}
.lesson-bar>span{display:block;height:100%;background:var(--green);transition:width .3s}
.lesson-page{font-size:.72rem;font-weight:800;color:var(--blue-d);background:var(--blue-l);padding:3px 9px;border-radius:10px;white-space:nowrap}

/* concept */
.concept{padding:8px 22px 120px}
.concept .lt{font-size:1.4rem;font-weight:900;margin-bottom:2px}
.concept .le{font-size:.85rem;color:var(--gray);font-weight:700;margin-bottom:16px}
.ccard{border-radius:16px;padding:17px 18px;margin-bottom:14px;animation:rise .3s ease}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.ccard .ch{font-weight:900;font-size:1.05rem;margin-bottom:7px;display:flex;align-items:center;gap:7px}
.ccard p{font-size:1rem;color:#3c3c3c}
.ccard.why{background:#fff4e0;border:2px solid #ffd98a}.ccard.why .ch{color:#c47f00}
.ccard.def{background:var(--blue-l);border:2px solid #aee0fb}.ccard.def .ch{color:var(--blue-d)}
.ccard.def .term{font-weight:900;color:var(--blue-d);font-size:1.08rem}
.ccard.pts{background:var(--green-l);border:2px solid #b6f08a}.ccard.pts .ch{color:var(--green-d)}
.ccard.pts ul{list-style:none;margin-top:4px}
.ccard.pts li{padding:5px 0 5px 20px;position:relative;font-size:.97rem}
.ccard.pts li:before{content:'✓';position:absolute;left:0;color:var(--green-d);font-weight:900}
.ccard.tip{background:#f3e8ff;border:2px solid #e0c2ff}.ccard.tip .ch{color:var(--purple-d)}

/* quiz */
.quiz{padding:14px 22px 150px}
.qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.qtype{font-size:.72rem;font-weight:900;padding:3px 10px;border-radius:10px}
.qtype.mc{background:var(--blue-l);color:var(--blue-d)}
.qtype.ox{background:#fff4e0;color:#c47f00}
.qtype.free{background:#f3e8ff;color:var(--purple-d)}
.qnum{color:var(--gray);font-weight:800;font-size:.78rem}
.quiz h2{font-size:1.22rem;margin:6px 0 12px;line-height:1.45}
.hintbtn{display:inline-flex;align-items:center;gap:5px;color:var(--orange);font-weight:800;font-size:.85rem;border:2px solid #ffd98a;background:#fff8ec;padding:6px 12px;border-radius:12px;margin-bottom:14px}
.hintbox{background:#fff8ec;border:1px solid #ffd98a;border-radius:12px;padding:11px 14px;font-size:.9rem;color:#8a6d2f;margin-bottom:14px}
.choices{display:flex;flex-direction:column;gap:11px}
.choice{display:flex;align-items:center;gap:12px;border:2px solid var(--gray-l);border-bottom-width:4px;border-radius:14px;padding:14px 16px;font-size:1rem;font-weight:600;text-align:left;background:#fff;transition:.1s}
.choice .key{width:26px;height:26px;border:2px solid var(--gray-l);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.8rem;color:var(--gray);flex-shrink:0}
.choice.sel{border-color:var(--blue);background:var(--blue-l)}.choice.sel .key{border-color:var(--blue);color:var(--blue-d)}
.choice.correct{border-color:var(--green);background:var(--green-l)}.choice.correct .key{border-color:var(--green-d);background:var(--green);color:#fff}
.choice.wrong{border-color:var(--red);background:var(--red-l)}.choice.wrong .key{border-color:var(--red-d);background:var(--red);color:#fff}
.choice:disabled{cursor:default}
.oxwrap{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.oxbtn{border:2px solid var(--gray-l);border-bottom-width:4px;border-radius:14px;padding:20px;font-size:1.1rem;font-weight:800;background:#fff;transition:.1s}
.oxbtn.sel{border-color:var(--blue);background:var(--blue-l);color:var(--blue-d)}
.oxbtn.correct{border-color:var(--green);background:var(--green-l);color:var(--green-d)}
.oxbtn.wrong{border-color:var(--red);background:var(--red-l);color:var(--red-d)}
.freebox{width:100%;min-height:120px;border:2px solid var(--gray-l);border-radius:14px;padding:14px;font-size:1rem;resize:vertical}
.freebox:focus{outline:none;border-color:var(--purple)}
.freebox:disabled{background:var(--gray-bg)}

.qfoot{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:15px 22px 22px;background:#fff;border-top:2px solid var(--gray-bg);z-index:6}
.qfoot.ok{background:var(--green-l);border-top-color:transparent}
.qfoot.no{background:var(--red-l);border-top-color:transparent}
.qfoot.part{background:#fff4e0;border-top-color:transparent}
.fb{display:flex;gap:10px;margin-bottom:11px}
.fb .ic{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#fff;flex-shrink:0}
.qfoot.ok .fbt{color:var(--green-d)}.qfoot.ok .ic{background:var(--green)}
.qfoot.no .fbt{color:var(--red-d)}.qfoot.no .ic{background:var(--red)}
.qfoot.part .fbt{color:#c47f00}.qfoot.part .ic{background:var(--orange)}
.fbt{font-weight:900;font-size:1.02rem}
.fb .ex{font-weight:600;font-size:.85rem;color:#555;margin-top:3px}
.fb .ex b{color:#333}
.modelans{background:rgba(255,255,255,.7);border-radius:10px;padding:8px 11px;margin-top:7px;font-size:.84rem}
.modelans .ml{font-weight:800;color:#333}

/* result */
.result{padding:18px 18px 40px}
.rscore{background:var(--gray-bg);border-radius:18px;padding:18px;text-align:center;margin-bottom:8px}
.rscore .big{font-size:2.4rem;font-weight:900}
.rscore .big small{font-size:1rem;color:var(--gray);font-weight:700}
.rscore .date{font-size:.78rem;color:var(--gray);font-weight:600;margin-top:2px}
.rstats{display:flex;gap:10px;margin:14px 0}
.rbox{flex:1;border:2px solid var(--gray-l);border-radius:14px;padding:12px 6px;text-align:center}
.rbox .rl{font-size:.7rem;font-weight:800;color:var(--gray)}.rbox .rv{font-size:1.3rem;font-weight:900;margin-top:3px}
.rbox.xp{border-color:var(--gold)}.rbox.xp .rv{color:var(--gold-d)}
.rbox.acc{border-color:var(--green)}.rbox.acc .rv{color:var(--green-d)}
.rbox.tm{border-color:var(--blue)}.rbox.tm .rv{color:var(--blue-d)}
.revitem{border:1px solid var(--gray-l);border-radius:14px;margin-bottom:9px;overflow:hidden}
.revq{display:flex;align-items:flex-start;gap:9px;padding:13px 14px}
.revq .ri{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:#fff;flex-shrink:0;margin-top:1px}
.revq.ok .ri{background:var(--green)}.revq.no .ri{background:var(--red)}
.revq .qt{font-size:.7rem;font-weight:900;padding:2px 7px;border-radius:8px;margin-right:6px}
.revq .qtx{font-size:.92rem;font-weight:600;flex:1}
.revq .chev{color:var(--gray);font-weight:900;transition:transform .2s}
.revitem.open .chev{transform:rotate(180deg)}
.revbody{display:none;padding:0 14px 14px;font-size:.87rem}
.revitem.open .revbody{display:block}
.revbody .ra{padding:8px 11px;border-radius:10px;margin-bottom:6px}
.revbody .ra.mine{background:var(--red-l)}.revbody .ra.ans{background:var(--green-l)}
.revbody .ra .ral{font-weight:800;font-size:.76rem;color:#666}
.revbody .rex{color:#555;padding:6px 2px}

/* bridge / concept complete */
.bridge{padding:36px 24px;text-align:center}
.bridge .chk{width:78px;height:78px;border-radius:50%;background:var(--green-l);display:flex;align-items:center;justify-content:center;font-size:2.4rem;margin:0 auto 14px}
.bridge h2{font-size:1.5rem;margin-bottom:4px}
.bcard{text-align:left;border-radius:16px;padding:16px 18px;margin-top:16px}
.bcard.link{background:#fff4e0;border:2px solid #ffd98a}
.bcard.next{background:var(--blue-l);border:2px solid #aee0fb}
.bcard .bh{font-weight:900;display:flex;align-items:center;gap:7px;margin-bottom:7px}
.bcard.link .bh{color:#c47f00}.bcard.next .bh{color:var(--blue-d)}
.bcard .nt{font-weight:900;font-size:1.05rem;margin-bottom:4px}
.bcard p{font-size:.93rem;color:#444}

/* generic pages */
.page{padding:14px 18px 100px}
.page h2{font-size:1.35rem;margin:4px 0 14px}
.card{background:#fff;border:2px solid var(--gray-l);border-radius:18px;padding:16px;margin-bottom:13px}
.bigstat{display:flex;gap:10px;margin-bottom:13px}
.bigstat .bs{flex:1;border-radius:18px;padding:15px 8px;text-align:center;color:#fff}
.bigstat .bs .v{font-size:1.6rem;font-weight:900}.bigstat .bs .l{font-size:.72rem;font-weight:700;opacity:.95}
.bigstat .bs.s1{background:var(--orange)}.bigstat .bs.s2{background:var(--gold)}.bigstat .bs.s3{background:var(--green)}
.daylist .di{display:flex;align-items:center;gap:11px;padding:11px;border-radius:14px;background:var(--gray-bg);margin-bottom:8px}
.daylist .di .dd{font-weight:900;color:var(--green-d);min-width:60px;font-size:.8rem}
.daylist .di .dl{font-size:.86rem;font-weight:600}.daylist .di.done{opacity:.5}
.linkbtn{color:var(--blue);font-weight:800;text-decoration:underline;font-size:.85rem}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 0}
.sw{width:48px;height:28px;border-radius:16px;background:var(--gray-l);position:relative;transition:.2s;flex-shrink:0}
.sw.on{background:var(--green)}
.sw:after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s}
.sw.on:after{left:23px}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:20px;font-weight:800;font-size:.85rem;z-index:99;opacity:0;transition:.3s;max-width:90%;text-align:center}
.toast.show{opacity:1}
/* AI 튜터 챗봇 */
#chatfab{position:fixed;bottom:78px;right:calc(50% - 240px + 16px);width:56px;height:56px;border-radius:50%;background:var(--purple);color:#fff;font-size:1.5rem;box-shadow:0 4px 14px rgba(0,0,0,.28);z-index:60;display:flex;align-items:center;justify-content:center}
#chatfab.hidden{display:none}
#chatpanel{position:fixed;bottom:78px;right:calc(50% - 240px + 16px);width:340px;max-width:88vw;height:460px;max-height:72vh;background:#fff;border:2px solid var(--purple);border-radius:18px;z-index:61;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,.3)}
#chatpanel.hidden{display:none}
.cp-head{background:var(--purple);color:#fff;font-weight:800;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;font-size:.95rem}
.cp-head button{color:#fff;font-size:1.1rem;font-weight:900}
.cp-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;background:var(--gray-bg)}
.cp-msg{padding:9px 12px;border-radius:13px;font-size:.88rem;line-height:1.5;max-width:85%;white-space:pre-wrap}
.cp-msg.bot{background:#fff;border:1px solid var(--gray-l);align-self:flex-start;border-bottom-left-radius:3px}
.cp-msg.user{background:var(--blue-l);align-self:flex-end;border-bottom-right-radius:3px}
.cp-msg.bot b{color:var(--purple-d)}
.cp-input{display:flex;gap:6px;padding:9px;border-top:1px solid var(--gray-l);background:#fff}
.cp-input input{flex:1;padding:10px;border:2px solid var(--gray-l);border-radius:12px;font-size:.9rem}
.cp-input button{background:var(--purple);color:#fff;border-radius:12px;padding:0 14px;font-weight:800}
.cp-quick{display:flex;gap:6px;flex-wrap:wrap;padding:0 12px 8px;background:var(--gray-bg)}
.cp-quick button{font-size:.74rem;background:#fff;border:1px solid var(--purple);color:var(--purple-d);border-radius:20px;padding:5px 10px;font-weight:700}
@media(max-width:520px){#chatfab,#chatpanel{right:14px}}
@media(max-width:380px){.nodes .node-wrap:nth-child(6n+3){margin-left:74px}.nodes .node-wrap:nth-child(6n+2),.nodes .node-wrap:nth-child(6n+4){margin-left:46px}.nodes .node-wrap:nth-child(6n+1),.nodes .node-wrap:nth-child(6n+6){margin-left:-46px}}
</style>
</head>
<body>
<div class="app" id="app"></div>

   concept:{ why:'전 세계 인구의 상당수가 하루 2달러 남짓으로 살아갑니다. "왜 어떤 나라는 가난할까?"라는 질문에서 모든 개발협력이 시작돼요. 빈곤을 어떻게 정의하느냐에 따라 해결책이 완전히 달라지기 때문에, 빈곤 개념은 1과목의 출발점이자 단골 출제 포인트입니다.',
     def:{term:'빈곤(Poverty)', body:'기본적 욕구가 충족되지 못한 결핍 상태. 경제적 관점에선 절대·차상위·상대적 빈곤으로, 소득 외적 관점에선 아마르티아 센의 "역량(가능성)의 박탈"로 봅니다.'},
     points:['<span class="kw">절대빈곤</span>: 생존 기본욕구 미충족 (세계은행, 2015년 <span class="kw">1.9달러/일</span>). <span style="color:#888">→ 하루 1.9달러로는 먹고사는 최소한도 충족하지 못하는 상태예요.</span>','차상위빈곤: 가까스로 충족 / 상대적빈곤: 주관적으로 느끼는 빈곤. <span style="color:#888">→ 차상위=겨우 버티는 수준, 상대적=남과 비교해 느끼는 박탈감.</span>','<span class="kw">아마르티아 센</span>: 빈곤=역량 결핍, "선택할 자유"의 박탈 → HDI(Human Development Index, 인간개발지수)·GDI(남녀평등지수)·GII(성불평등지수) 등장. <span style="color:#888">→ 돈이 아니라 \'원하는 삶을 선택할 능력\'의 결핍이 빈곤이라는 관점.</span>','개도국 빈곤 원인은 자연·재해·분쟁·거버넌스 부재·식민유산이 <span class="kw">상호복합적</span>으로 얽힘. <span style="color:#888">→ 원인이 하나가 아니라 여러 개가 서로 얽혀 굳어져요.</span>'],
     tip:'빈곤선 금액은 "1 → 1.25 → 1.9 달러" 순으로 올라간 것만 외워도 한 문제. (1990 / 2008 / 2015년)' },
   bridge:{lead:'빈곤을 "왜 줄여야 하는가"에 답했다면, 다음은 "누가, 어떤 돈으로 줄이는가" — 바로 ODA의 정의와 3대 조건입니다.', nextPreview:'ODA가 되려면 충족해야 하는 3가지 조건을 배웁니다.'},
   quiz:[
    {t:'mc',q:'세계은행이 2015년 기준으로 제시한 절대빈곤선(1일 소득)은?',choices:['1달러','1.25달러','1.9달러','3.1달러'],answer:2,hint:'1990년 1달러에서 두 번 상향 조정됐어요.',ex:'절대빈곤선은 1990년 1달러 → 2008년 1.25달러 → 2015년 1.9달러로 변화했습니다.'},
    {t:'mc',q:'다음 중 빈곤에 대한 설명으로 옳지 않은 것은?',choices:['절대빈곤은 생존의 기본욕구가 충족되지 않은 상태다','상대적 빈곤은 주관적 판단으로 느끼는 빈곤이다','아마르티아 센은 빈곤을 소득의 절대량으로만 정의했다','센은 빈곤을 역량(가능성)의 박탈로 보았다'],answer:2,hint:'센은 "소득"보다 "자유·역량"을 강조했어요.',ex:'아마르티아 센은 빈곤을 소득이 아니라 역량(케이퍼빌리티) 결핍과 선택할 자유의 박탈로 이해했습니다.'},
    {t:'ox',q:'개발도상국의 빈곤 원인은 보통 한 가지 요인으로 단순하게 설명된다.',a:false,hint:'자연·분쟁·거버넌스·식민유산이 어떻게 얽혀 있나요?',ex:'빈곤의 원인은 자연환경·재해·분쟁·거버넌스 부재·식민유산 등이 상호복합적·유기적으로 얽혀 구조화됩니다.'},
    {t:'ox',q:'아마르티아 센의 빈곤관은 HDI(인간개발지수) 같은 지표 등장에 영향을 주었다.',a:true,hint:'센은 인간개발 패러다임의 사상적 뿌리예요.',ex:'센의 역량 접근은 HDI·GDI·GII 등 인간개발 지표의 개념적 근원을 제공했습니다.'},
    {t:'free',q:'아마르티아 센이 본 빈곤의 핵심 개념을 한 문장으로 설명하시오.',keys:['역량','자유','박탈'],model:'빈곤은 단순한 소득 부족이 아니라, 원하는 삶을 선택하고 달성할 "역량(가능성)"과 "자유"가 박탈된 상태이다.',hint:'키워드: 역량 / 자유 / 박탈',ex:'센은 빈곤을 역량의 결핍, 즉 선택할 자유의 박탈로 정의했습니다.'}
   ]},
 { id:'u1l2', title:'ODA의 정의와 3대 조건', en:'Definition of ODA',
   concept:{ why:'시험에서 가장 많이 나오는 함정이 "이건 ODA인가, 아닌가?"입니다. 스타벅스가 커피농가를 돕는 건 ODA일까요? (아니에요!) 세 가지 조건만 정확히 알면 이런 적용형 문제를 다 맞힐 수 있어요.',
     def:{term:'ODA(Official Development Assistance, 공적개발원조)', body:'공공부문이 개발도상국·국제기구에 제공하는 양허성 자금. 1969년 OECD(경제협력개발기구) DAC(개발원조위원회)가 도입한 개념이에요.'},
     points:['① <span class="kw">공적기관</span>이 제공 (정부·집행기관). <span style="color:#888">→ 민간기업이 아니라 정부·공공기관이 줘야 해요.</span>','② 주목적이 개도국의 <span class="kw">경제발전·복지 증진</span>','③ <span class="kw">양허적 성격</span>(讓許性): 시중보다 금리 낮고 상환기간 길어 \'상대에게 유리한 조건\'','<span class="kw">증여등가율</span>(Grant Equivalent): 차관이 얼마나 \'공짜에 가까운가\'를 %로 표시 — 100%=완전 무상, 0%=시장금리(혜택 없음). 금리↓·상환기간↑일수록 ↑','2018년부터 ODA 인정 기준(증여등가율): 저소득국 45%·저중소득국 15%·고중소득국 6% 이상 (예전엔 \'증여율 25%\' 기준)'],
     tip:'증여등가율은 "이 차관이 얼마나 공짜냐"의 점수예요. 무상원조는 100%! 민간기업 활동(FDI·CSR)은 ODA 아님.' },
   bridge:{lead:'ODA가 무엇인지 알았으니, 이제 "누가 ODA를 주고받는지"와 "어떤 방향이 올바른지"를 봅니다.', nextPreview:'공여국·다자기구·시민사회 등 협력의 주체와 올바른 방향을 배웁니다.'},
   quiz:[
    {t:'mc',q:'다음 중 공적개발원조(ODA)로 보기 가장 어려운 것은?',choices:['경상북도가 시행하는 캄보디아 농촌지도자 초청 연수','지진 복구를 위해 투입된 외국 군대의 인도적 구호활동','증여율 75%인 대외경제협력기금(EDCF) 차관','스타벅스가 르완다 커피농가에 제공하는 기술지원'],answer:3,hint:'"공공부문이 제공"하는지 따져보세요.',ex:'민간기업(스타벅스)의 활동은 CSR이지 ODA가 아닙니다. 지자체 연수·재난 시 군대의 인도적 원조·양허성 차관은 ODA로 인정됩니다.'},
    {t:'mc',q:'ODA의 3대 성립 조건이 아닌 것은?',choices:['공적기관이 제공할 것','개도국의 경제발전·복지 증진이 주목적일 것','양허적 성격을 가질 것','반드시 상환을 전제로 할 것'],answer:3,hint:'무상원조는 갚지 않아도 되죠.',ex:'ODA는 양허적(상대에 유리) 성격을 가지며, 상환 전제는 조건이 아닙니다.'},
    {t:'mc',q:'2018년부터 ODA 양허성 판단에 도입된 방식은?',choices:['증여율 25% 일괄 적용','증여등가율 방식','GNI 비율 방식','구속성 비율 방식'],answer:1,hint:'소득그룹별로 기준이 달라졌어요.',ex:'2018년부터 소득그룹별 차등(저소득45%·저중소득15%·고중소득6%)을 둔 증여등가율 방식으로 바뀌었습니다.'},
    {t:'ox',q:'민간기업의 해외직접투자(FDI)는 ODA에 포함된다.',a:false,hint:'ODA는 "공적"자금이에요.',ex:'FDI는 민간자본의 흐름으로 ODA에 포함되지 않습니다.'},
    {t:'free',q:'ODA가 성립하기 위한 3대 조건을 쓰시오.',keys:['공적','개발','양허'],model:'① 공적기관이 제공, ② 개도국의 경제발전·복지 증진이 주목적, ③ 양허적 성격을 가질 것.',hint:'공공 / 개발목적 / 양허성',ex:'공적기관 제공·개발목적·양허성, 이 세 가지를 모두 충족해야 ODA입니다.'}
   ]},
 { id:'u1l3', title:'협력의 주체와 올바른 방향', en:'Actors & Principles',
   concept:{ why:'원조는 "주는 쪽 마음대로" 하면 실패합니다. 누가 참여하고, 어떤 원칙을 지켜야 효과가 나는지를 알아야 뒤에 나오는 원조효과성·파리선언이 이해돼요.',
     def:{term:'개발격차 & 주체', body:'선진국과 개도국의 차이를 개발격차라 하며, 이를 줄이기 위해 공여국·다자기구·시민사회·기업 등 다양한 주체가 협력합니다.'},
     points:['개도국 기준: UN은 <span class="kw">HDI 0.8 미만</span>, 세계은행은 1인당 GNI(Gross National Income, 국민총소득) 고소득 기준 이하. <span style="color:#888">→ 기관마다 \'개도국\'을 가르는 잣대가 달라요.</span>','주체: OECD DAC 공여국 / 신흥공여국 / 다자기구 / 시민사회·기업','올바른 방향: 개도국 <span class="kw">수요 충족·기회의 평등·포용/참여·지속가능</span>. <span style="color:#888">→ 주는 쪽 편의가 아니라 받는 쪽 필요에 맞춰, 함께, 오래가게.</span>','OECD 권고 <span class="kw">ODA/GNI 0.7%</span> (실제 평균은 0.3%대)'],
     tip:'"0.7%"는 권고치, "0.3%대"는 현실. 이 숫자 대비가 자주 나와요.' },
   bridge:{lead:'주체와 원칙을 알았다면, 이 원칙들이 어떻게 역사 속에서 만들어졌는지 — 국제개발협력의 역사로 넘어갑니다.', nextPreview:'마셜플랜부터 시작되는 국제개발협력의 태동과 도약을 배웁니다.'},
   quiz:[
    {t:'mc',q:'OECD가 권고하는 ODA/GNI 비율 목표치는?',choices:['0.15%','0.33%','0.7%','1.0%'],answer:2,hint:'오래전부터 변하지 않은 "권고" 숫자예요.',ex:'국제사회는 ODA/GNI 0.7% 이상을 권고하지만 실제 평균은 0.3%대에 그칩니다.'},
    {t:'mc',q:'국제개발협력의 올바른 방향으로 보기 어려운 것은?',choices:['개도국의 개발수요를 충족시키는 방향','공여국 이익을 우선한 일방적 추진','포용적·참여적 추진','지속가능한 발전 지향'],answer:1,hint:'"일방적"이라는 단어에 주목.',ex:'공여국 이익만 앞세운 일방적 추진은 올바른 방향이 아닙니다.'},
    {t:'ox',q:'선진국과 개발도상국 사이의 격차를 "개발격차"라고 한다.',a:true,hint:'용어 그대로예요.',ex:'개발격차(development gap)는 선진국과 개도국의 차이를 가리킵니다.'},
    {t:'ox',q:'개발도상국의 정의에는 모든 나라에 적용되는 단 하나의 고정된 기준이 있다.',a:false,hint:'UN과 세계은행 기준이 다르죠.',ex:'UN(HDI)·세계은행(GNI) 등 기관마다 기준이 달라 단일한 고정 기준은 없습니다.'},
    {t:'free',q:'국제개발협력이 지향해야 할 "올바른 방향" 원칙을 2가지 이상 쓰시오.',keys:['수요','참여','지속가능','평등'],model:'개도국의 개발수요 충족, 기회의 평등 촉진, 포용적·참여적 추진, 지속가능한 발전.',hint:'수요충족 / 참여 / 지속가능 / 기회평등',ex:'개도국 수요 충족·기회 평등·포용/참여·지속가능성이 핵심 원칙입니다.'}
   ]},
 { id:'u1l4', title:'빈곤의 복합적 원인·다면성', en:'Multidimensional Poverty',
   concept:{ why:'"가난은 돈만의 문제가 아니다"라는 게 시험의 단골 함정이에요. 세계은행과 OECD가 빈곤을 어떻게 여러 측면으로 쪼갰는지 알면 \'다면성\' 문제를 다 맞혀요.',
     def:{term:'빈곤의 다면성', body:'빈곤은 소득뿐 아니라 무력함·취약성 등 여러 차원이 얽힌 복합적 현상이다.'},
     points:['세계은행 2000/2001 보고서 빈곤 3원인: <span class="kw">①소득·자산 부족 ②무력함(목소리 못 냄) ③취약성</span>(재해·질병). <span style="color:#888">→ 가난은 돈 부족만이 아니라, 목소리를 못 내는 무력함과 재해에 쉽게 무너지는 취약성까지 포함해요.</span>','OECD DAC(개발원조위원회) 빈곤 5측면: <span class="kw">경제·인적·정치·사회문화·보호</span>적 측면. <span style="color:#888">→ 소득(경제)·건강교육(인적)·권리(정치)·지위(사회문화)·안전(보호) 다섯 갈래로 봄.</span>','특히 OECD DAC은 <span class="kw">양성평등과 환경</span>을 빈곤과 교차하는 핵심으로 강조. <span style="color:#888">→ 성차별·환경파괴가 빈곤과 맞물려 작동한다고 본 것.</span>'],
     tip:'세계은행=3원인(소득·무력함·취약성), OECD DAC=5측면(경·인·정·사·보). 숫자 3 vs 5로 구분!' },
   bridge:{lead:'빈곤을 여러 각도로 봤으니, 개도국이 "왜" 가난한지 원인으로 들어갑니다.', nextPreview:'개발재원의 종류로 이어집니다.'},
   quiz:[
    {t:'mc',q:'세계은행 2000/2001 세계개발보고서가 제시한 빈곤의 3대 원인이 아닌 것은?',choices:['소득과 자산의 부족','목소리를 내지 못하는 무력함','자연재해·질병에 대한 취약성','과도한 사회보장 의존'],answer:3,hint:'소득·무력함·취약성 3가지.',ex:'세계은행은 빈곤 원인을 소득·자산 부족, 무력함, 취약성으로 봤습니다.'},

    {t:'mc',q:'빈곤의 "다면성"이 의미하는 바로 가장 옳은 것은?',choices:['빈곤은 소득 부족만을 뜻한다','빈곤은 소득 외 무력함·취약성 등 여러 차원이 얽힌 현상이다','빈곤은 정치와 무관하다','빈곤은 측정할 수 없다'],answer:1,hint:'여러 차원.',ex:'빈곤은 소득뿐 아니라 무력함·취약성 등 여러 차원이 복합된 다면적 현상입니다.'},
    {t:'free',q:'세계은행이 제시한 빈곤의 3대 원인을 쓰시오.',keys:['소득','무력','취약'],model:'소득·자산 부족, 무력함(목소리 못 냄), 취약성.',hint:'소득 / 무력함 / 취약성',ex:'소득·자산 부족, 무력함, 취약성입니다.'},

 { id:'u1l5', title:'개발재원의 종류', en:'Development Finance Types',
   concept:{ why:'"이 돈이 ODA냐 아니냐"를 가르려면 먼저 개발재원의 큰 분류를 알아야 해요. ODA·OOF·민간흐름·민간증여·송금 5종을 구분하면 측정 문제가 쉬워져요.',
     def:{term:'개발재원', body:'개발도상국의 개발을 목적으로 사용되는 자금. 공적·민간으로 나뉜다.'},
     points:['<span class="kw">ODA</span>(공적개발원조): 공공부문의 양허성 자금 (양자=무상/유상, 다자). <span style="color:#888">→ 정부가 주는, 갚더라도 조건이 유리한 돈.</span>','<span class="kw">기타공적자금(OOF</span>, Other Official Flows): 공적이지만 ODA 요건 미충족 (수출신용 등). <span style="color:#888">→ 정부 돈이지만 \'양허성\'이 약해 ODA로는 안 쳐줘요.</span>','<span class="kw">민간자본 흐름</span>: FDI(Foreign Direct Investment, 해외직접투자)·증권투자 등 / <span class="kw">민간증여</span>: NGO(비정부기구) 증여 / <span class="kw">송금</span>(remittance, 이주노동자가 본국에 보내는 돈)','남남협력도 있으나 통계가 부족해 규모 파악이 어려움. <span style="color:#888">→ 개도국끼리 돕는 협력은 집계가 잘 안 돼요.</span>'],
     tip:'ODA=공공+양허, OOF=공공인데 양허성 부족, FDI=민간. "공공/민간 × 양허성"으로 갈래!' },
   bridge:{lead:'재원 갈래를 알았으니, 그중 핵심인 ODA의 정의·조건으로 이어집니다.', nextPreview:'ODA 규모·성과·논란으로 이어집니다.'},
   quiz:[
    {t:'mc',q:'공여국 공공부문이 제공하지만 ODA 요건(양허성 등)을 충족하지 못하는 자금은?',choices:['ODA','기타공적자금(OOF)','해외직접투자(FDI)','민간증여'],answer:1,hint:'공적인데 ODA는 아닌 것.',ex:'기타공적자금(OOF)은 공적자금이지만 ODA 요건을 충족하지 못하는 자금(수출신용 등)입니다.'},
    {t:'mc',q:'개발재원 분류에서 성격이 다른 하나는?',choices:['양자 무상원조','다자원조','해외직접투자(FDI)','양허성 차관'],answer:2,hint:'민간이 제공하는 것.',ex:'FDI는 민간자본 흐름이며, 나머지는 공적개발원조(ODA)입니다.'},
    {t:'ox',q:'NGO가 개발도상국에 제공하는 증여(민간증여)도 개발재원에 포함된다.',a:true,hint:'민간증여.',ex:'민간증여(NGO 증여)도 개발재원의 한 종류입니다.'},
    {t:'mc',q:'해외 노동자가 본국 가족에게 보내는 자금으로, 개발재원의 한 종류인 것은?',choices:['송금(remittance)','OOF','ODA','FDI'],answer:0,hint:'이주노동자의 본국 송금.',ex:'송금(remittance)은 개발도상국에 중요한 개발재원입니다.'},
    {t:'free',q:'개발재원 중 공적개발원조(ODA)와 기타공적자금(OOF)의 차이를 한 가지로 쓰시오.',keys:['양허'],model:'둘 다 공적자금이나, ODA는 양허성(증여등가율) 요건을 충족하고 OOF는 충족하지 못한다.',hint:'양허성 충족 여부',ex:'ODA는 양허성 요건을 충족, OOF는 미충족입니다.'}
   ]},
 { id:'u1l6', title:'ODA 규모·성과·논란', en:'Scale, Results & Debate',
   concept:{ why:'시험은 "원조가 효과 있었나?"라는 논쟁도 물어요. 0.7% 권고, 원조피로, ODA 무용론 vs 효용론을 알면 마지막 절을 잡아요.',
     def:{term:'규모·성과·논란', body:'ODA 규모는 권고치(0.7%)에 못 미치고, 효과를 둘러싼 찬반 논쟁이 있다.'},
     points:['OECD 권고 <span class="kw">ODA/GNI 0.7%</span>, 실제 ~0.33%(2021) / 1990년대 <span class="kw">원조피로</span>, 2000년대 MDGs·9.11로 반등. <span style="color:#888">→ GNI(국민총소득)의 0.7%를 권고하지만 현실은 절반도 안 돼요. 한때 식었다가(원조피로) 2000년대 다시 늘었어요.</span>','신흥공여국 규모: <span class="kw">중국 > 인도 > 브라질</span>','성과: 마셜플랜, <span class="kw">아시아의 네 마리 용</span>(한국·싱가포르·대만·홍콩), MDGs·SDGs','<span class="kw">ODA 무용론</span>: 국내산업 기회 박탈·저축/투자 억제·부패 심화. <span style="color:#888">→ "원조가 오히려 개도국 자립을 막는다"는 비판적 시각이에요.</span>'],
     tip:'0.7%(권고) vs 0.33%(현실), 네 마리 용=한·싱·대·홍. ODA 무용론의 3가지 비판 기억!' },
   bridge:{lead:'1장을 더 깊게 마쳤어요. 다음은 국제개발협력의 역사입니다.', nextPreview:'역사 — 태동기와 도약기로 이어집니다.'},
   quiz:[
    {t:'mc',q:'다음 중 신흥공여국의 원조 규모 순서로 옳은 것은?',choices:['인도 > 중국 > 브라질','중국 > 인도 > 브라질','브라질 > 중국 > 인도','인도 > 브라질 > 중국'],answer:1,hint:'가장 큰 신흥공여국은?',ex:'신흥공여국 규모는 중국 > 인도 > 브라질 순입니다.'},
    {t:'mc',q:'\'아시아의 네 마리 용\'에 해당하지 않는 곳은?',choices:['한국','싱가포르','대만','일본'],answer:3,hint:'네 마리 용은 신흥공업국.',ex:'네 마리 용은 한국·싱가포르·대만·홍콩입니다. 일본은 포함되지 않습니다.'},
    {t:'mc',q:'\'ODA 무용론\'의 비판 논거가 아닌 것은?',choices:['개도국 국내산업 발전 기회를 빼앗는다','국내 저축·투자를 억제한다','부패한 정부를 더 부패하게 만든다','원조를 더 늘려야 한다'],answer:3,hint:'무용론은 부정적 시각이에요.',ex:'\'더 많은 원조\'는 효용론의 주장입니다. 무용론은 기회 박탈·저축투자 억제·부패 심화를 비판합니다.'},
    {t:'ox',q:'2000년대 들어 MDGs 채택과 9.11 테러를 계기로 ODA 규모가 다시 증가했다.',a:true,hint:'1990년대 원조피로 이후 반등.',ex:'1990년대 원조피로 이후 2000년대 MDGs·9.11을 계기로 원조가 반등했습니다.'},
    {t:'free',q:'OECD의 ODA/GNI 권고치와 실제 평균을 각각 쓰시오.',keys:['0.7','0.3'],model:'권고치 0.7%, 실제 평균 약 0.33%(0.3%대).',hint:'권고 vs 현실',ex:'권고 0.7%, 현실 0.3%대입니다.'}
   ]}

{ id:'u2', title:'2. 국제개발협력의 역사', source:'1과목', color:'#1cb0f6', icon:'📜', lessons:[
 { id:'u2l1', title:'태동기와 도약기 (1940~60s)', en:'Origins & Take-off',
   concept:{ why:'개발협력은 갑자기 생긴 게 아니라 2차 대전·냉전이라는 역사 속에서 태어났어요. 마셜플랜·브레턴우즈·DAC의 탄생을 알면 "왜 이런 기구들이 생겼나"가 한 번에 정리됩니다.',
     def:{term:'태동~도약기', body:'2차 대전 직후 미·소 냉전 속에서 본격화된 원조가, 1960년대 UN "개발의 10년"과 OECD DAC 설립으로 제도화된 시기.'},
     points:['1944 <span class="kw">브레턴우즈 협정</span> → 1945 IMF(International Monetary Fund, 국제통화기금)·IBRD(국제부흥개발은행) 창설. <span style="color:#888">→ 2차 대전 후 국제 금융질서를 세운 회의에서 두 기구가 탄생.</span>','1948~52 <span class="kw">마셜플랜</span>(유럽부흥계획), 미국 주도. <span style="color:#888">→ 전후 서유럽 재건을 도운 대규모 원조, 본격 개발원조의 출발점.</span>','1960 DAG(개발원조그룹) → 1961 OECD <span class="kw">DAC</span>(개발원조위원회) 개편 / 1969 피어슨 보고서 → GNP의 0.7% 원조 권고. <span style="color:#888">→ 공여국 협의체가 만들어지고 \'0.7%\' 권고가 처음 등장.</span>','담론: <span class="kw">근대화이론</span>(로스토 5단계론) vs <span class="kw">종속이론</span>(프랑크: 중심부-주변부). <span style="color:#888">→ "단계를 밟으면 발전" vs "무역할수록 주변부는 더 가난"의 대립.</span>'],
     tip:'"브레턴우즈(1944)→IMF·IBRD" / "DAG(1960)→DAC(1961)" 두 쌍만 외우면 절반은 맞아요.' },
   bridge:{lead:'도약 뒤엔 정체와 위기가 옵니다. 석유파동과 구조조정이 어떻게 원조의 방향을 바꿨는지 봅니다.', nextPreview:'1970~90년대 정체·위기와 워싱턴 컨센서스를 배웁니다.'},
   quiz:[
    {t:'mc',q:'1944년 미국 달러를 기축통화로 한 협정과 그 직접적 산물로 옳은 것은?',choices:['마셜플랜 → OEEC','브레턴우즈 협정 → IMF·IBRD','콜롬보 계획 → DAC','반둥회의 → UNDP'],answer:1,hint:'금 1온스=35달러로 기억나는 그 협정.',ex:'1944년 브레턴우즈 협정으로 1945년 IMF와 IBRD가 창설되었습니다.'},
    {t:'mc',q:'다음 중 OECD DAC의 성립 과정으로 옳은 것은?',choices:['DAG(1960) → DAC(1961)','OEEC(1948) → DAC(1950)','UNDP(1965) → DAC(1966)','G77(1964) → DAC(1965)'],answer:0,hint:'개발원조"그룹"이 먼저였어요.',ex:'1960년 개발원조그룹(DAG)이 1961년 OECD 산하 개발원조위원회(DAC)로 개편되었습니다.'},
    {t:'mc',q:'세계를 중심부-주변부로 나누고 경제적 잉여가 주변부에서 중심부로 이전된다고 본 이론은?',choices:['근대화 이론','종속이론','균형성장론','내생적 성장이론'],answer:1,hint:'"저발전의 발전"을 말한 프랑크.',ex:'프랑크의 종속이론은 중심부-주변부 구조에서의 잉여 이전을 설명합니다.'},
    {t:'ox',q:'로스토의 경제개발 5단계론은 종속이론의 대표 모형이다.',a:false,hint:'로스토는 "발전 단계"를 말했죠.',ex:'로스토의 5단계론(전통사회-도약준비-도약-성숙-대중소비)은 근대화 이론의 대표 모형입니다.'},
    {t:'free',q:'마셜플랜의 목적을 한 문장으로 설명하시오.',keys:['유럽','부흥','재건'],model:'2차 대전 후 서유럽의 경제 재건(부흥)을 지원하고 공산주의 확산을 억제하기 위한 미국의 원조 계획.',hint:'서유럽 / 재건·부흥',ex:'마셜플랜(1948~52)은 서유럽 16개국의 재건·경제성장 지원과 소련 영향력 억제가 목적이었습니다.'}
   ]},
 { id:'u2l2', title:'정체기와 위기 (1970~90s)', en:'Stagnation & Crisis',
   concept:{ why:'"원조를 많이 했는데 왜 가난은 그대로지?"라는 회의(원조피로)가 이 시기에 터집니다. 구조조정의 실패는 오늘날 "주인의식·효과성" 논의가 나온 직접적 배경이에요.',
     def:{term:'정체~위기기', body:'두 차례 석유파동과 외채위기로 원조가 흔들리고, 신자유주의 구조조정(워싱턴 컨센서스)이 확산됐다가 실패하며 비판받은 시기.'},
     points:['1970s: 석유파동 → 인프라 중심 → <span class="kw">인간의 기본적 욕구(BHN</span>, Basic Human Needs)로 전환. <span style="color:#888">→ 길·댐 같은 인프라보다 \'사람의 최소 필요(식량·물·보건)\'를 먼저 채우자는 흐름.</span>','신자유주의 구조조정(SAP, Structural Adjustment Program) → <span class="kw">워싱턴 컨센서스</span>. <span style="color:#888">→ "정부는 줄이고 시장은 키워라"는 처방.</span>','선진국의 <span class="kw">원조피로(Aid Fatigue)</span> 현상, 냉전 종식. <span style="color:#888">→ 오래 도왔는데 성과가 더디자 원조 의욕이 식음.</span>','1987 브룬트란트 보고서 → <span class="kw">지속가능발전(SD</span>, Sustainable Development) 정의. <span style="color:#888">→ "미래 세대를 해치지 않는 선에서 현 세대 필요 충족".</span>'],
     tip:'"정부 축소·시장 확대 → 구조조정 → 워싱턴 컨센서스"는 1980년대! 연대 묻는 문제 단골.' },

    {t:'ox',q:'구조조정정책(SAP)은 대부분의 아프리카·중남미 국가에서 큰 성공을 거두었다.',a:false,hint:'"실패"와 "비판"이 핵심.',ex:'구조조정정책은 거버넌스가 갖춰진 일부를 빼면 대다수 국가에서 실패하며 비판받았습니다.'},

 { id:'u2l4', title:'근대화 이론', en:'Modernization Theory',

     def:{term:'근대화 이론', body:'전근대→근대화→근대의 단계 모형으로, 개도국이 \'근대화\' 과정을 거쳐 선진국이 된다고 본 일방향적 사고.'},
     points:['<span class="kw">로스토 5단계</span>: 전통사회→도약준비기→도약기→성숙기→대중소비사회. <span style="color:#888">→ 비행기 이륙(take-off)처럼 \'도약기\'에 본격 성장이 시작된다는 모형.</span>','<span class="kw">거센크론</span>: 후발주자의 이점(상대적 후진성에 대응). <span style="color:#888">→ 늦게 출발한 나라는 선진국을 그대로 베끼지 않고 자기 방식으로 따라잡는다.</span>','균형성장론: <span class="kw">넉시(빈곤의 악순환)</span>·로단(동시 투자) / 불균형성장론: <span class="kw">허시먼</span>(전략산업 집중). <span style="color:#888">→ "여러 산업 골고루" vs "전략 산업에 집중"의 대비.</span>','일방향 가정: 문화적 근대화→경제발전→민주주의. <span style="color:#888">→ 한 방향으로만 발전한다고 본 게 비판점.</span>'],
     tip:'로스토=5단계(전·준·도·성·대), 허시먼=불균형(집중), 넉시=균형(빈곤 악순환). 학자-개념 매칭!' },
   bridge:{lead:'근대화 이론에 반기를 든 게 종속이론이에요. 다음으로 이어집니다.', nextPreview:'종속이론·세계체제론으로 이어집니다.'},
   quiz:[
    {t:'mc',q:'로스토(W.W. Rostow) 경제개발 5단계론에서, 사회가 근대적 가치관을 확립하고 본격적 성장이 시작되는 단계는?',choices:['전통사회','도약 준비기','도약기(Take-off)','대중소비사회'],answer:2,hint:'비행기가 이륙(take-off)하듯.',ex:'도약기(Take-off)는 경제 발전이 가속되며 본격 성장이 이루어지는 단계입니다.'},

    {t:'mc',q:'\'빈곤의 악순환\'을 들어 여러 산업에 골고루 투자하는 균형성장을 주장한 학자는?',choices:['넉시','허시먼','로스토','센'],answer:0,hint:'균형 vs 불균형.',ex:'넉시는 빈곤의 악순환을 들어 균형성장(여러 산업 동시 투자)을 주장했습니다. 허시먼은 불균형성장(전략산업 집중).'},
    {t:'ox',q:'근대화 이론은 모든 사회가 전근대→근대화→근대의 일방향적 단계를 밟는다고 본다.',a:true,hint:'일방향 단계론.',ex:'근대화 이론은 서구 모델을 따라 일정 단계를 밟는다는 일방향적 사고에 기반합니다.'},
    {t:'free',q:'로스토 경제개발 5단계를 순서대로 쓰시오.',keys:['전통','도약','성숙','대중'],model:'전통사회 → 도약 준비기 → 도약기 → 성숙기 → 대중소비사회.',hint:'전통-준비-도약-성숙-대중소비',ex:'전통사회→도약준비기→도약기→성숙기→대중소비사회입니다.'}
   ]},
 { id:'u2l5', title:'종속이론·세계체제론', en:'Dependency & World-System',
   concept:{ why:'"왜 무역할수록 개도국은 더 가난해지나?"에 답한 비판 이론이에요. 근대화 이론과 정반대 시각이라 비교 문제로 자주 나옵니다.',
     def:{term:'종속이론', body:'세계는 중심부와 주변부로 나뉘고, 무역이 심화될수록 경제적 잉여가 주변부에서 중심부로 이전된다고 본 이론(프랑크).'},
     points:['프랑크 <span class="kw">종속이론</span>: \'저발전의 발전\', 중심부-주변부, 잉여 이전. <span style="color:#888">→ 무역할수록 이익이 주변부에서 중심부로 빠져나가 저발전이 고착돼요.</span>','전략: <span class="kw">수입대체산업화(ISI</span>, Import Substitution Industrialization) 제안 → 남미 채택 / 아시아는 <span class="kw">수출주도산업화(EOI</span>, Export-Oriented Industrialization) 채택. <span style="color:#888">→ 수입을 국산으로 막기 vs 수출로 키우기.</span>','<span class="kw">월러스턴 세계체제론</span>: 중심부-반주변부-주변부 (노동분업). <span style="color:#888">→ 종속이론에 \'반주변부\'를 더한 3층 구조.</span>','한계: 유통구조 중심이라 정치·군사 갈등 설명 부족'],
     tip:'종속=중심/주변(2층), 세계체제=중심/반주변/주변(3층). ISI=수입대체(남미), EOI=수출주도(아시아)!' },
   bridge:{lead:'1970년대엔 석유파동과 함께 새 담론이 등장해요. 다음으로 이어집니다.', nextPreview:'1970년대 NIEO·인간기본욕구(BHN)로 이어집니다.'},
   quiz:[

    {t:'free',q:'수입대체산업화(ISI)와 수출주도산업화(EOI)를 채택한 지역을 각각 쓰시오.',keys:['남미','아시아'],model:'ISI=남미(중남미), EOI=아시아 신흥공업국.',hint:'ISI=남미 / EOI=아시아',ex:'ISI는 남미, EOI는 아시아입니다.'},

 { id:'u2l6', title:'1970년대: NIEO와 기본욕구', en:'1970s: NIEO & BHN',

     points:['1974 <span class="kw">신국제경제질서(NIEO</span>, New International Economic Order) 선언, G77(개도국 77개국 그룹)이 공정한 질서 요구. <span style="color:#888">→ 개도국들이 "불공정한 경제질서를 바꿔달라"고 목소리를 냄.</span>','<span class="kw">인간의 기본적 욕구(BHN)</span>: 식량·물·주거·위생·보건·교육. <span style="color:#888">→ 생존에 필요한 최소한부터 채우자는 접근.</span>','<span class="kw">빈곤선</span>: 생존 최소 소비 기준 / 파울 스트리텐: 물질적+비물질적 욕구. <span style="color:#888">→ 먹는 것뿐 아니라 자유·안보 같은 비물질 욕구까지 포함.</span>','환경(1972 스톡홀름 UNCHE→UNEP)·여성(1975 WID) 이슈 부상. <span style="color:#888">→ UNCHE=유엔인간환경회의, UNEP=유엔환경계획, WID=개발 속 여성.</span>'],

{ id:'u3', title:'3. 지속가능발전목표(SDGs)', source:'1과목', color:'#ce82ff', icon:'🎯', lessons:[
 { id:'u3l1', title:'MDGs에서 SDGs로', en:'From MDGs to SDGs',
   concept:{ why:'MDGs는 절반의 성공이었어요. "무엇이 부족했고 무엇을 바꿨나"를 알면 SDGs의 17개 목표가 왜 그렇게 생겼는지 이해돼요.',
     def:{term:'전환의 핵심', body:'개도국에만 책임을 지운 MDGs의 한계를 넘어, 선진국·개도국 모두에 적용되는 보편적 목표로 확장한 것이 SDGs.'},
     points:['MDGs 성과: 절대빈곤율 1990년 36% → 2015년 12%. <span style="color:#888">→ 가장 큰 성과는 빈곤율을 3분의 1로 줄인 것.</span>','한계: 개도국 입장 미반영, 불평등·글로벌 이슈 미흡. <span style="color:#888">→ 선진국이 개도국에 \'시켜준\' 목표라는 비판.</span>','SDGs 슬로건: <span class="kw">"Leave No One Behind"</span>. <span style="color:#888">→ "그 누구도 뒤에 남기지 않는다".</span>','3대 가치(인권·평등·지속가능성), 4대 핵심(경제·사회·환경·평화)'],
     tip:'MDGs=8개 목표(개도국 중심), SDGs=17개 목표(보편적). 숫자 8↔17만 헷갈리지 마세요.' },
   bridge:{lead:'전환 배경을 알았으니, SDGs의 실제 구조(17목표 169세부목표)를 들여다봅니다.', nextPreview:'SDGs의 구조와 기억해야 할 핵심 목표 번호를 배웁니다.'},
   quiz:[

    {t:'mc',q:'SDGs 수립 시 제시된 3대 가치가 아닌 것은?',choices:['인권','평등','지속가능성','이윤극대화'],answer:3,hint:'기업 목표가 아니에요.',ex:'3대 가치는 인권·평등·지속가능성입니다.'},
    {t:'ox',q:'MDGs는 결과 중심 패러다임을 정착시켰다는 성과가 있다.',a:true,hint:'한계만 있는 건 아니죠.',ex:'MDGs는 정량 목표·모니터링 등 결과 중심 패러다임을 정착시켰습니다.'},
    {t:'ox',q:'SDGs는 MDGs와 달리 선진국에 해당하는 목표는 전혀 포함하지 않는다.',a:false,hint:'"보편적"이라는 말의 의미.',ex:'SDGs는 선진국에도 적용되는 보편적 목표를 포함합니다.'},
    {t:'free',q:'MDGs의 대표적 한계 2가지를 쓰시오.',keys:['불평등','개도국','글로벌'],model:'경제적 불평등을 다루지 못함, 글로벌 이슈 미포함, 개도국 입장 미반영, 공여국 책무 부재로 인식됨 중 2가지.',hint:'불평등 / 개도국 입장 / 글로벌 이슈',ex:'불평등·글로벌 이슈 미흡, 개도국 입장 미반영이 대표적 한계입니다.'}
   ]},
 { id:'u3l2', title:'SDGs의 구조와 주요 목표', en:'Structure of SDGs',
   concept:{ why:'17개를 다 외울 필요는 없어요. 자주 나오는 번호(1·4·5·13·16·17)만 잡으면 시험은 충분합니다.',
     def:{term:'SDGs 구조', body:'"2030 지속가능발전의제"에 담긴 17개 목표·169개 세부목표. 경제·사회·환경·평화를 통합합니다.'},
     points:['<span class="kw">17개 목표 · 169개 세부목표</span>. <span style="color:#888">→ MDGs(8개)보다 범위가 훨씬 넓어졌어요.</span>','자주 나오는 번호: 1 빈곤 · 4 교육 · 5 성평등 · 13 기후 · 16 평화/제도 · 17 파트너십','MDGs보다 넓고, 다양한 개발재원을 강조. <span style="color:#888">→ ODA만이 아니라 민간 재원까지 끌어옴.</span>','이행에 다양한 이해관계자 참여 필요. <span style="color:#888">→ 정부뿐 아니라 기업·시민사회가 함께 참여.</span>'],
     tip:'8(MDGs) vs 17(SDGs), 21(MDGs 세부) vs 169(SDGs 세부) — 숫자 짝을 외우세요.' },
   bridge:{lead:'목표를 알았으니, 이 목표들을 "무슨 돈으로" 달성할지 — 개발재원과 ODA 현대화로 이어집니다.', nextPreview:'개발재원의 다각화와 TOSSD 등 ODA 현대화를 배웁니다.'},
   quiz:[
    {t:'mc',q:'SDGs의 목표·세부목표 개수로 옳은 것은?',choices:['8개 목표, 21개 세부목표','17개 목표, 169개 세부목표','12개 목표, 54개 세부목표','15개 목표, 100개 세부목표'],answer:1,hint:'8개는 MDGs예요.',ex:'SDGs는 17개 목표·169개 세부목표입니다.'},
    {t:'mc',q:'SDG 번호와 주제가 잘못 짝지어진 것은?',choices:['SDG 1 - 빈곤 종식','SDG 4 - 양질의 교육','SDG 5 - 성평등','SDG 13 - 양질의 일자리'],answer:3,hint:'13번은 환경 쪽이에요.',ex:'SDG 13은 기후행동입니다. 양질의 일자리는 SDG 8입니다.'},
    {t:'ox',q:'SDGs는 ODA뿐 아니라 다양한 민간 개발재원의 필요성을 강조한다.',a:true,hint:'재원이 다각화됐죠.',ex:'SDGs는 ODA 외 다양한 재원의 동원을 강조합니다.'},
    {t:'ox',q:'SDGs 17개 목표는 서로 독립적이어서 연관 없이 개별 달성하면 된다.',a:false,hint:'"상호관계"가 중요하다고 했죠.',ex:'SDGs는 목표 간 상호관계 속에서 통합적으로 달성하는 것이 중요합니다.'},
    {t:'free',q:'SDGs가 통합하려는 4대 축(영역)을 쓰시오.',keys:['경제','사회','환경','평화'],model:'경제·사회·환경·평화.',hint:'경제 / 사회 / 환경 / 평화',ex:'SDGs는 경제·사회·환경·평화를 통합적으로 다룹니다.'}
   ]},
 { id:'u3l3', title:'개발재원과 ODA 현대화', en:'Development Finance',
   concept:{ why:'목표는 거창한데 돈이 부족하면 그림의 떡이죠. 그래서 "ODA만으론 부족하다, 민간재원도 끌어오자"는 흐름이 생겼고, ODA를 측정하는 방식도 진화했어요.',
     def:{term:'ODA 현대화', body:'ODA의 정확한 측정·투명성을 높이고, ODA를 넘어선 다양한 재원의 가치를 인정하려는 흐름. 대표 개념이 TOSSD.'},
     points:['개발재원이 공적재원 위주 → <span class="kw">민간재원으로 다각화</span>. <span style="color:#888">→ 정부 돈만으론 부족해 민간 돈까지 끌어오는 추세.</span>','<span class="kw">TOSSD</span>(Total Official Support for Sustainable Development, 총공적지원): ODA를 넘는 재원의 가치 인정. <span style="color:#888">→ ODA보다 넓은 그릇으로 다양한 공적 지원을 집계.</span>','<span class="kw">DFI</span>(개발금융기관)·<span class="kw">PSI</span>(민간금융수단): 민간동원용 공적재원의 양허분을 ODA로 인정. <span style="color:#888">→ 공적 돈으로 민간투자 위험을 덜어주면 그 양허분을 ODA로 인정.</span>','코로나·전쟁으로 ODA 추가 확대는 쉽지 않음'],
     tip:'"TOSSD = ODA보다 넓은 그릇" 한 줄이면 충분.' },
   bridge:{lead:'재원을 알았으니, 실제로 그 돈을 움직이는 "주체들"을 본격적으로 살펴봅니다.', nextPreview:'양자 공여국(미·영·독·일 등)부터 시작합니다.'},
   quiz:[
    {t:'mc',q:'ODA를 넘어서는 다양한 형태의 재원 가치를 인정하는 ODA 현대화 개념은?',choices:['TOSSD','OOF','FDI','PRSP'],answer:0,hint:'"총공적지원"의 영문 약자.',ex:'TOSSD(총공적지원)는 ODA를 넘어서는 재원의 가치를 인정하는 개념입니다.'},
    {t:'ox',q:'SDGs 시대에는 개발재원이 공적재원 단일 구조로 회귀하고 있다.',a:false,hint:'반대 방향이에요.',ex:'SDGs 시대에는 민간재원으로 다각화되는 추세입니다.'},
    {t:'mc',q:'다음 중 개발재원의 성격이 다른 하나는?',choices:['양자 무상원조(ODA)','다자 ODA','민간기업의 해외직접투자(FDI)','양허성 차관(ODA)'],answer:2,hint:'"공적"이 아닌 것은?',ex:'FDI는 민간자본 흐름으로, 나머지 공적개발원조(ODA)와 성격이 다릅니다.'},
    {t:'free',q:'SDGs 시대 개발재원 흐름의 핵심 변화를 한 문장으로 쓰시오.',keys:['민간','다각화'],model:'공적재원 중심에서 민간재원을 포함한 다양한 재원으로 다각화되고 있다.',hint:'민간 / 다각화',ex:'공적재원 중심에서 민간재원으로의 다각화가 핵심입니다.'}
   ]},
 { id:'u3l4', title:'MDGs 8대 목표·성과·한계', en:'MDGs in Detail',
   concept:{ why:'SDGs를 이해하려면 그 전신인 MDGs를 알아야 해요. 8개 목표와 \'무엇이 성공이고 무엇이 한계였나\'가 단골 출제 포인트입니다.',
     def:{term:'MDGs', body:'2000 새천년선언을 거쳐 2001년 발표된 8대 목표·21개 세부목표·60개 지표. 2015년까지 인간개발에 초점을 둔 결과 중심 목표.'},
     points:['2000 새천년선언 → 2001 MDGs 발표, <span class="kw">8대 목표</span>(빈곤·기아, 초등교육, 양성평등, 아동사망률, 모성보건, 질병퇴치, 지속가능환경, 글로벌파트너십). <span style="color:#888">→ 사람 중심(빈곤·교육·보건) 8개 목표.</span>','성과: 절대빈곤율 <span class="kw">1990년 36% → 2015년 12%</span>','한계: <span class="kw">\'one size fits all\'</span>, 불평등 미고려, 개도국만의 과제로 인식. <span style="color:#888">→ \'one size fits all\'=모든 나라에 똑같은 목표를 들이댄 획일 적용.</span>','경제개발의 중요성 간과, 개도국 입장 미반영'],
     tip:'MDGs=8목표(개도국 중심), 성과=빈곤율 36→12%, 한계=one size fits all. 숫자/한계 키워드!' },
   bridge:{lead:'MDGs의 한계를 넘으려 SDGs가 어떻게 만들어졌는지 봅니다.', nextPreview:'SDGs 수립 과정·구조로 이어집니다.'},
   quiz:[
    {t:'mc',q:'MDGs의 구성으로 옳은 것은?',choices:['17대 목표, 169개 세부목표','8대 목표, 21개 세부목표, 60개 지표','12대 목표, 54개 세부목표','15대 목표, 100개 지표'],answer:1,hint:'8개는 MDGs.',ex:'MDGs는 8대 목표·21개 세부목표·60개 지표입니다. (17개는 SDGs)'},
    {t:'mc',q:'MDGs의 대표적 성과로 옳은 것은?',choices:['절대빈곤율 1990년 36% → 2015년 12%로 감소','모든 지역에서 모든 목표 달성','경제 불평등 완전 해소','선진국 빈곤 종식'],answer:0,hint:'빈곤율 수치.',ex:'절대빈곤율이 1990년 36%에서 2015년 12%로 크게 감소했습니다.'},
    {t:'mc',q:'MDGs의 한계로 보기 어려운 것은?',choices:['모든 나라에 동일 목표(one size fits all)','경제적 불평등 고려 미흡','결과 중심 패러다임을 전혀 만들지 못함','개도국만의 과제로 인식'],answer:2,hint:'성과도 있었죠.',ex:'MDGs는 결과 중심 패러다임을 정착시킨 성과가 있습니다. 나머지는 한계입니다.'},
    {t:'ox',q:'MDGs는 2000년 새천년선언을 거쳐 2001년에 발표되었다.',a:true,hint:'선언 후 발표.',ex:'2000년 새천년선언 → 2001년 MDGs 발표 순입니다.'},
    {t:'free',q:'MDGs가 받은 대표적 비판을 \'획일성\' 관점에서 영어 표현으로 쓰시오.',keys:['one size'],model:'모든 나라에 같은 목표를 적용한 \'one size fits all\' 비판.',hint:'영어 관용구',ex:"'one size fits all'입니다."}
   ]},
 { id:'u3l5', title:'SDGs 수립과정·17목표', en:'Making of SDGs',
   concept:{ why:'SDGs 17개를 다 외울 필요는 없지만, "어떻게·어떤 가치로 만들어졌고 어떻게 분류되나"는 자주 나와요.',
     def:{term:'SDGs 수립', body:'2012년부터 UN 작업반·고위급패널·공개작업반을 거쳐 17개 목표·169개 세부목표로 확정된 보편적 목표.'},
     points:['2012 반기문 UN 작업반: <span class="kw">4핵심</span>(경제·사회·환경·평화안보), <span class="kw">3가치</span>(인권·평등·지속가능성). <span style="color:#888">→ SDGs를 떠받치는 네 기둥과 세 가치.</span>','100만의 목소리, 공개작업반(리우+20) → 17목표·169세부. <span style="color:#888">→ 전 세계 의견을 모아 만든 목표.</span>','영역 분류 예: 경제(8·9·12)·환경(7·14·15)·사회(3·5·10·16)','슬로건 <span class="kw">Leave No One Behind</span>'],
     tip:'4핵심(경·사·환·평) + 3가치(인·평·지). 17목표는 영역별로 묶어 기억!' },
   bridge:{lead:'목표를 만들었으면 \'얼마나 달성했나\'를 재야겠죠. 다음으로 이어집니다.', nextPreview:'SDGs 이행성과 측정으로 이어집니다.'},
   quiz:[
    {t:'mc',q:'SDGs 수립 시 UN 작업반이 제시한 4대 핵심요소가 아닌 것은?',choices:['경제','사회','환경','군사'],answer:3,hint:'경제·사회·환경·평화안보.',ex:'4대 핵심요소는 경제·사회·환경·평화와 안보입니다.'},
    {t:'mc',q:'SDGs의 3대 가치로 옳은 것은?',choices:['인권·평등·지속가능성','효율·성장·이윤','자유·시장·경쟁','안보·질서·통제'],answer:0,hint:'인간 중심 가치.',ex:'3대 가치는 인권·평등·지속가능성입니다.'},
    {t:'mc',q:'SDGs의 목표·세부목표 수로 옳은 것은?',choices:['8개·21개','17개·169개','12개·54개','15개·100개'],answer:1,hint:'17개.',ex:'SDGs는 17개 목표·169개 세부목표입니다.'},
    {t:'ox',q:'SDGs는 개도국뿐 아니라 선진국에도 적용되는 보편적 목표이다.',a:true,hint:'보편성.',ex:'SDGs는 선진국·개도국 모두에 적용되는 보편적 목표입니다.'},
    {t:'free',q:'SDGs 수립 시 제시된 3대 가치를 쓰시오.',keys:['인권','평등','지속가능'],model:'인권·평등·지속가능성.',hint:'인권 / 평등 / 지속가능성',ex:'인권·평등·지속가능성입니다.'}
   ]},
 { id:'u3l6', title:'SDGs 이행성과 측정', en:'Measuring SDGs',
   concept:{ why:'"달성도를 누가·어떻게 재나"가 의외로 자주 나와요. SDGR·VNR·IATI 같은 측정·투명성 장치를 정리합니다.',
     def:{term:'성과 측정', body:'SDGs 이행은 유엔 고위급 정치포럼 주도의 보고서와 국가 자발적 보고로 측정되며, \'데이터 혁명\'과 투명성이 강조된다.'},
     points:['<span class="kw">SDGR</span>(SDGs Report, SDGs 보고서): 유엔 고위급 정치포럼 주도, 지표별 데이터 수집. <span style="color:#888">→ 유엔이 작성하는 공식 성과 보고서.</span>','<span class="kw">VNR</span>(Voluntary National Review, 자발적 국가 보고서): 회원국이 17목표 성과·과제 제출. <span style="color:#888">→ 각 나라가 스스로 내는 성적표.</span>','데이터 혁명·<span class="kw">IATI</span>(International Aid Transparency Initiative, 국제원조투명성기구, 2008 아크라) → 한국 2016 가입. <span style="color:#888">→ 원조 정보를 투명하게 공개하자는 흐름.</span>','상호책무성(공여국·수원국 상호 책임)'],
     tip:'SDGR=유엔이 작성, VNR=각국이 자발 제출, IATI=원조 투명성. 약자 3종 구분!' },
   bridge:{lead:'3장 SDGs를 깊게 마쳤어요. 다음은 4장 다양한 주체입니다.', nextPreview:'4장 주체로 이어집니다.'},
   quiz:[
    {t:'mc',q:'각 회원국이 17개 목표에 대한 성과·과제를 자발적으로 작성해 유엔 고위급 정치포럼에 제출하는 보고서는?',choices:['SDGR','VNR(자발적 국가보고서)','HDR','IATI'],answer:1,hint:'Voluntary National Review.',ex:'VNR(자발적 국가 보고서)은 회원국이 자발적으로 제출하는 보고서입니다.'},
    {t:'mc',q:'원조 정보의 투명성을 위해 2008년 아크라 포럼을 계기로 설립된 기구는?',choices:['IATI(국제원조투명성기구)','GPEDC','OECD DAC','UNDP'],answer:0,hint:'투명성·데이터 공개.',ex:'IATI는 2008년 아크라 포럼을 계기로 설립되었고, 한국은 2016년 가입했습니다.'},
    {t:'ox',q:'상호책무성은 공여국과 수원국이 서로에 대해 책임을 진다는 원칙이다.',a:true,hint:'양방향 책임.',ex:'상호책무성은 공여국·수원국 상호 간의 책임을 의미합니다.'},
    {t:'mc',q:'유엔 고위급 정치포럼 주도로 지표별 데이터를 모아 발간하는 SDGs 성과 보고서는?',choices:['SDGR(SDGs 보고서)','VNR','피어슨 보고서','브룬트란트 보고서'],answer:0,hint:'SDGs Report.',ex:'SDGR(SDGs 보고서)은 유엔 고위급 정치포럼이 주도합니다.'},
    {t:'free',q:'원조 정보 투명성을 위한 국제기구의 약자를 쓰시오.',keys:['IATI'],model:'IATI(국제원조투명성기구).',hint:'영문 약자 4글자',ex:'IATI입니다.'}
   ]}
]},

{ id:'u4', title:'4. 국제개발협력의 다양한 주체', source:'1과목', color:'#ff9600', icon:'🤝', lessons:[
 { id:'u4l1', title:'양자 공여국', en:'Bilateral Donors',
   concept:{ why:'미국·영국·독일·일본은 각자 "원조 스타일"이 달라요. 누가 어떤 기관으로, 어떤 철학으로 원조하는지 구분하는 문제가 자주 나옵니다.',
     def:{term:'양자 공여국', body:'자국 예산으로 개도국에 직접 원조하는 국가. OECD DAC 회원국이 대표적입니다.'},
     points:['미국: 케네디가 <span class="kw">대외원조법·USAID</span>(United States Agency for International Development, 미국국제개발처) 설립, 9.11 후 3D(외교·국방·개발). <span style="color:#888">→ 미국 원조의 핵심 집행기관이 USAID.</span>','영국: DFID(Department for International Development, 국제개발부) → 2020 외교부와 합병해 <span class="kw">FCDO</span>(외교영연방개발부). <span style="color:#888">→ 독립 원조부처가 외교부로 흡수됨.</span>','독일: BMZ(연방경제협력개발부, 정책 총괄) 산하 <span class="kw">KfW(금융)·GIZ(기술협력)</span>. <span style="color:#888">→ BMZ가 머리, KfW·GIZ가 손발.</span>','일본: JICA(국제협력기구), <span class="kw">비구속화율 100%</span>, 2015 개발협력대강(군 비군사 분야 관여 가능). <span style="color:#888">→ 비구속=자국 물자 강제 구매가 없음.</span>'],
     tip:'"독일=BMZ가 머리, KfW·GIZ가 손발" / "일본=JICA + 비구속 100%"로 묶어 외우기.' },
   bridge:{lead:'한 나라가 아니라 여러 나라가 모인 기구는? 다음은 UN·IMF·세계은행 같은 다자기구입니다.', nextPreview:'UN·국제금융기구·세계은행그룹을 배웁니다.'},
   quiz:[
    {t:'mc',q:'미국 케네디 대통령이 시행한 개발원조 내용으로 옳은 것은?',choices:['외교·국방·개발의 3D원칙 도입','2006년 전환외교 천명','2010년 QDDR 발간','대외원조법 제정 및 USAID 설립'],answer:3,hint:'USAID를 누가 만들었죠?',ex:'케네디는 대외원조법을 제정하고 USAID를 설립했습니다. 3D·전환외교·QDDR은 이후 시기의 일입니다.'},
    {t:'mc',q:'영국 DFID가 2020년 외교부와 합병해 출범한 기관은?',choices:['USAID','FCDO','JICA','GIZ'],answer:1,hint:'외교·영연방·개발이 합쳐진 이름.',ex:'영국은 DFID를 외교부와 합병해 외교영연방개발부(FCDO)를 출범시켰습니다.'},
    {t:'mc',q:'독일의 원조 체계에 대한 설명으로 옳은 것은?',choices:['BMZ가 원조정책의 기획·결정을 총괄한다','GIZ가 정책을 총괄하고 BMZ는 집행만 한다','KfW 산하에 BMZ가 있다','GTZ는 1990년에 통합되었다'],answer:0,hint:'정책의 "머리"는 BMZ.',ex:'BMZ가 정책을 총괄하고, KfW(금융)·GIZ(기술협력)가 집행합니다. GIZ는 GTZ 등 3개 기관이 2011년 통합된 것입니다.'},
    {t:'ox',q:'일본은 ODA의 비구속화율이 100%로 높은 편이다.',a:true,hint:'구속성=자국 물자 강제 구매.',ex:'일본은 비구속화율 100%이며 JICA가 원조를 집행합니다.'},
    {t:'free',q:'독일의 정책총괄 부처와 두 집행기관(금융·기술)을 쓰시오.',keys:['BMZ','KfW','GIZ'],model:'정책 총괄은 BMZ, 금융은 KfW, 기술협력은 GIZ.',hint:'BMZ / KfW / GIZ',ex:'BMZ(정책)-KfW(금융)-GIZ(기술협력) 구조입니다.'}
   ]},
 { id:'u4l2', title:'다자개발기구 (UN·IFI·WBG)', en:'Multilateral Agencies',
   concept:{ why:'세계은행그룹 5형제(IBRD·IDA·IFC·MIGA·ICSID)는 이름이 비슷해 헷갈리기 딱 좋아요. 각자 뭘 하는지 구분하면 "바르게 짝지은 것" 문제를 쓸어담아요.',
     def:{term:'다자개발기구', body:'여러 나라가 함께 만든 국제기구. UN(United Nations, 국제연합)·국제금융기구·세계은행그룹(WBG)이 대표적. <span style="color:#888">(한 나라가 직접 주는 양자원조와 달리, 여러 나라가 모은 공동 재원으로 돕는 방식이에요.)</span>'},
     points:['<span class="kw">UNDP</span>(United Nations Development Programme, 유엔개발계획): 매년 <span class="kw">인간개발지수(HDI</span>, Human Development Index)를 발표. <span style="color:#888">→ 소득만이 아니라 수명·지식(교육)·생활수준을 합쳐 한 나라의 발전 정도를 재는 지표예요.</span>','<span class="kw">IMF</span>(International Monetary Fund, 국제통화기금): 일시적 국제수지 불균형 시 긴급 금융. <span style="color:#888">→ 한 나라가 갑자기 외화가 부족할 때 급한 불을 꺼주는 긴급 대출이에요.</span>','<span class="kw">MDB</span>(Multilateral Development Bank, 다자개발은행): 개발 프로젝트 차관. <span style="color:#888">→ 개도국 개발사업에 장기 자금을 빌려줘요.</span>','<span class="kw">세계은행그룹(WBG)</span>: IBRD(중소득)·<span class="kw">IDA</span>(저소득 무이자)·IFC(민간)·MIGA(투자보증)·ICSID(분쟁해결). <span style="color:#888">→ 누구에게·무엇을 주느냐로 나뉜 5개 기구예요.</span>','<span class="kw">OECD</span>(Organisation for Economic Co-operation and Development, 경제협력개발기구) 산하 <span class="kw">DAC</span>(Development Assistance Committee, 개발원조위원회) 3대 기능: ODA 모니터링·표준화·동료검토. (한국 2010 가입)'],
     tip:'세계은행 5형제는 "누구에게 주느냐"로 구분: 중소득=IBRD, 최빈국=IDA(무이자), 민간기업=IFC, 보증=MIGA, 분쟁=ICSID.' },
   bridge:{lead:'정부와 큰 기구 말고도, 신흥공여국·시민사회·기업이 새 주체로 떠오릅니다.', nextPreview:'중국 등 신흥공여국과 CSO·기업의 역할을 배웁니다.'},
   quiz:[
    {t:'mc',q:'세계은행그룹 기구와 역할이 바르게 짝지어진 것은?',choices:['IBRD - 국제개발협회','MIGA - 국제투자보증기구','ICSID - 국제개발협회','IFC - 국제투자분쟁해결기구'],answer:1,hint:'MIGA의 G가 Guarantee(보증).',ex:'MIGA는 국제투자보증기구입니다. IBRD=국제부흥개발은행, IFC=국제금융공사, ICSID=국제투자분쟁해결센터.'},
    {t:'mc',q:'저소득국에 무이자·초저리로 융자하는 세계은행그룹 기구는?',choices:['IBRD','IDA','IFC','MIGA'],answer:1,hint:'가장 가난한 나라를 위한 창구.',ex:'IDA(국제개발협회)는 저소득국에 무이자 또는 초저리로 융자합니다.'},
    {t:'mc',q:'IMF의 주요 기능으로 옳은 것은?',choices:['개도국 장기 개발 프로젝트 차관','일시적 국제수지 불균형 시 긴급 외환 지원','민간기업 직접 투자','투자분쟁 조정'],answer:1,hint:'"긴급 외환"이 핵심.',ex:'IMF는 회원국의 일시적 국제수지 불균형 시 긴급 외환을 지원합니다.'},
    {t:'ox',q:'매년 인간개발지수(HDI)를 발표하는 기구는 세계은행이다.',a:false,hint:'HDI는 UN 기구가 발표해요.',ex:'HDI는 UNDP가 매년 발표합니다.'},
    {t:'free',q:'OECD DAC의 3대 핵심 기능을 쓰시오.',keys:['모니터링','표준','동료검토'],model:'ODA 모니터링(통계), 개발협력 표준화(규범·가이드라인), 동료검토(Peer Review).',hint:'모니터링 / 표준화 / 동료검토',ex:'DAC의 3대 기능은 ODA 모니터링·표준화·동료검토입니다.'},
    {t:'mc',q:'[적용] 한 개도국 민간기업에 정부 보증 없이도 직접 투자·융자하려 한다. 적절한 세계은행그룹 기구는?',choices:['IBRD','IDA','IFC','MIGA'],answer:2,hint:'민간부문 전담.',ex:'IFC(국제금융공사)는 정부 보증 없이 개도국 민간부문에 투자·융자합니다. (MIGA는 보증, IDA는 저소득국 융자)'}
   ]},
 { id:'u4l3', title:'신흥공여국·시민사회·기업', en:'New Actors',
   concept:{ why:'중국 같은 신흥공여국, 게이츠 재단 같은 민간, 옥스팜 같은 NGO가 판을 키우고 있어요. "전통적 공여국 외에 누가 있나"를 묻는 문제가 늘고 있습니다.',
     def:{term:'다양한 주체', body:'OECD DAC 밖의 신흥공여국, 시민사회단체(CSO), 민간재단·기업이 새로운 개발 주체로 부상.'},
     points:['신흥공여국: 중국(2018 CICDA, 국제개발협력청), <span class="kw">남남협력</span>(개도국끼리 돕는 협력), 삼각협력(남+남+북). <span style="color:#888">→ 전통 공여국 외에 중국 등이 새 주체로 부상.</span>','AIIB(아시아인프라투자은행, 중국 주도·OECD국도 참여) / NDB(신개발은행, <span class="kw">BRICS</span> 5개국). <span style="color:#888">→ BRICS=브라질·러시아·인도·중국·남아공.</span>','CSO(Civil Society Organization, 시민사회단체): 2008 아크라(AAA, 아크라행동계획)에서 <span class="kw">독립적 개발주체로 인정</span>. <span style="color:#888">→ NGO 등도 정식 개발 파트너로 인정됨.</span>','기업: FDI(해외직접투자; 생산거점형/시장접근형)·CSR(기업의 사회적 책임) / 게이츠재단(보건 집중)'],
     tip:'NDB=BRICS(브라질·러시아·인도·중국·남아공), AIIB=중국 주도. 칠레는 BRICS 아님!' },
   bridge:{lead:'세계의 주체들을 봤으니, 마지막으로 "우리 한국"의 특별한 이야기로 마무리합니다.', nextPreview:'수원국에서 공여국으로 변신한 한국의 역사를 배웁니다.'},
   quiz:[
    {t:'mc',q:'브릭스 신개발은행(NDB)에 속하지 않는 나라는?',choices:['브라질','중국','남아프리카공화국','칠레'],answer:3,hint:'BRICS 다섯 글자를 떠올려요.',ex:'NDB는 브라질·러시아·인도·중국·남아공(BRICS)이 설립했습니다. 칠레는 포함되지 않습니다.'},
    {t:'mc',q:'시민사회단체(CSO)를 독립적 개발주체로 인정한 회의는?',choices:['2005 파리 HLF-2','2008 아크라 HLF-3','2002 몬테레이','2015 아디스아바바'],answer:1,hint:'아크라 행동계획(AAA).',ex:'2008년 아크라 행동계획(AAA)에서 CSO를 독립적 개발주체로 인정했습니다.'},
    {t:'mc',q:'시장접근형 FDI에 대한 설명으로 옳은 것은?',choices:['원·부자재를 수입해 가공하는 생산이 일반적','일정 구매력 이상의 제3국 시장 접근이 목표','값싼 노동력 활용이 핵심 목적','고용 창출만을 목적으로 함'],answer:1,hint:'"시장"에 접근하려는 투자.',ex:'시장접근형 FDI는 일정 수준 이상 구매력을 가진 제3국 시장에 접근하려는 목적의 투자입니다. (값싼 노동·생산비 절감은 생산거점형)'},
    {t:'ox',q:'남남협력에 선진국(북)이 함께 참여하는 형태를 삼각협력이라 한다.',a:true,hint:'남+남+북.',ex:'삼각협력은 남+남+북이 함께하는 협력입니다.'},
    {t:'free',q:'AIIB와 NDB의 주도 세력 차이를 간단히 쓰시오.',keys:['중국','BRICS'],model:'AIIB는 중국 주도(다수 OECD국도 참여), NDB는 BRICS 5개국 주도.',hint:'AIIB=중국 / NDB=BRICS',ex:'AIIB는 중국 주도, NDB는 BRICS 주도입니다.'}
   ]},
 { id:'u4l4', title:'수원국', en:'Recipient Countries',
   concept:{ why:'원조는 결국 받는 나라(수원국)가 잘 써야 효과가 나요. 수원국의 돈줄(조세)과 발전전략, 수원 체제가 출제 포인트입니다.',
     def:{term:'수원국', body:'원조를 받는 개발도상국. 국내 재원은 주로 세금(조세)이며, 주체적 발전전략과 수원 체제가 중요하다.'},
     points:['국내재원=세금. 조세부담률 권고 <span class="kw">세계은행 15%</span>, OECD 평균 33.8%, 취약국 10.4%. <span style="color:#888">→ 수원국이 스스로 걷는 세금이 부족하면 자립이 어려워요.</span>','세금 낮은 원인: 천연자원 의존·조세기반 취약·다국적기업 면세·탈세','경제발전전략: 1999 <span class="kw">PRSP</span>(Poverty Reduction Strategy Paper, 빈곤감소전략보고서) → 2016 국가개발계획(NDP)와 통합. <span style="color:#888">→ 수원국이 직접 짜는 발전전략.</span>','진정한 수원국 체제 활용 = <span class="kw">공공재정관리시스템(PFM</span>, Public Financial Management) 활용. <span style="color:#888">→ 공여국 시스템이 아닌 수원국 자체 시스템으로 집행.</span>'],
     tip:'세계은행 권고 조세부담률 15%, PRSP→NDP, PFM(공공재정관리). 숫자/약자 세트!' },
   bridge:{lead:'받는 쪽을 봤으니, 민간이 끌어오는 \'개발금융 전담기관\'으로 이어집니다.', nextPreview:'개발금융 전담기관(DFI)으로 이어집니다.'},
   quiz:[
    {t:'mc',q:'수원국의 세금 징수율이 낮은 원인으로 보기 어려운 것은?',choices:['비재생 천연자원에 과도하게 의존','조세 기반 증대의 어려움','국민들의 세금 납부율이 현저히 낮음','탈세와 자본 도피'],answer:2,hint:'구조적 요인.',ex:'국민 납부율 자체는 원인이 아닙니다. 천연자원 의존·조세기반 취약·탈세 등이 원인입니다.'},

{ id:'u7', title:'7. 적용형 집중 (1과목)', source:'1과목', color:'#06d6a0', icon:'🎯', lessons:[
 { id:'u7l1', title:'사례·상황 적용 문제', en:'Application Questions',
   concept:{ why:'실제 시험에서 변별력이 가장 높은 게 적용형이에요. "이 사례가 ODA인가? 어느 담론인가?"처럼 개념을 구체적 상황에 끌어다 쓰는 연습을 합니다.',

     points:['핵심 전략: 먼저 사례의 \'핵심 키워드\'를 잡고 → 해당 개념을 끌어온다','ODA 판별: <span class="kw">공공 + 개발목적 + 양허성</span> 셋 다 충족하는가?','담론·이론 매칭: 제시문 → 워싱턴 컨센서스 / 참여적 개발 / 근대화·종속 등','자주 나오는 함정: 민간기업 활동(CSR)·군 인도적 원조 예외 등'],

   bridge:{lead:'1과목 적용 연습을 마쳤어요. 이제 2과목 분야별 이슈로 들어갑니다.', nextPreview:'2과목 교육으로 이어집니다.'},
   quiz:[
    {t:'mc',q:'다음 중 공적개발원조(ODA) 사업으로 가장 거리가 먼 것은?',choices:['경상북도가 시행하는 캄보디아 농촌지도자 초청 연수','아이티 지진 복구에 투입된 외국 군대의 인도적 구호활동','증여율 75%인 대외경제협력기금(EDCF) 양허성 차관','스타벅스가 르완다 커피농가에 제공하는 기술지원'],answer:3,hint:'\'공공부문\'이 제공하나요?',ex:'민간기업(스타벅스)의 활동은 CSR이지 ODA가 아닙니다. 지자체 연수·재난 시 군대 인도적 원조·양허성 차관은 ODA로 인정됩니다.'},

    {t:'mc',q:'한국 정부가 개도국에 양허성 \'차관\'을 제공하려 한다. 주관·집행 기관으로 옳은 것은?',choices:['외교부 - KOICA','기획재정부 - 한국수출입은행(EDCF)','외교부 - 수출입은행','산업부 - KOICA'],answer:1,hint:'유상=차관.',ex:'유상 ODA(차관)는 기획재정부 주관, 한국수출입은행이 EDCF로 집행합니다.'},
    {t:'free',q:'"한 다국적 기업이 개도국에 공장을 세워 일자리를 만들고 이윤도 얻는 활동"은 ODA인가? 이유와 함께 쓰시오.',keys:['아니','민간','공공'],model:'ODA가 아니다. ODA는 공공부문이 제공해야 하는데 이는 민간기업의 투자(FDI)이기 때문이다.',hint:'공공부문이 아님',ex:'민간기업의 투자(FDI)이므로 ODA가 아닙니다. ODA는 공적기관이 제공해야 합니다.'}
   ]}

{ id:'a1', title:'심화 1. 교육', source:'2과목', color:'#2ec4b6', icon:'📖', lessons:[

 { id:'a1l2', title:'교육 현황·전략 심화', en:'Education Deep-dive',

{ id:'a2', title:'심화 2. 보건', source:'2과목', color:'#e63946', icon:'🩺', lessons:[
 { id:'a2l1', title:'국제보건과 UHC', en:'Global Health',
   concept:{ why:'코로나가 보여줬듯, 한 나라의 질병은 곧 모두의 문제예요. 국경을 넘는 "국제보건"의 개념과 핵심 기구·협약이 자주 출제됩니다.',
     def:{term:'국제보건', body:'국경을 넘는 보건문제를 다루며 "건강 형평성"과 "모든 사람"을 강조하는 개념. 핵심 가치는 보편적 의료보장(UHC).'},

{ id:'a3', title:'심화 3. 농촌개발', source:'2과목', color:'#80b918', icon:'🌾', lessons:[
 { id:'a3l1', title:'농업·농촌개발과 식량안보', en:'Rural Development',
   concept:{ why:'개도국 인구의 다수는 농촌에 살아요. 농업을 살리는 건 곧 빈곤을 줄이는 길이죠. 식량안보 4요소는 외워두면 무조건 득점입니다.',
     def:{term:'농촌개발', body:'농촌(산촌·어촌 포함)의 생산성과 삶의 질을 높여 빈곤을 줄이는 것. 핵심 개념은 식량안보와 가치사슬.'},
     points:['농업의 <span class="kw">다원적 기능</span>(1992 리우회의 언급): 식량·사회·문화·환경·경제. <span style="color:#888">→ 농업이 식량 생산만이 아니라 환경·문화 등 여러 역할을 한다는 뜻.</span>','식량안보 4요소(<span class="kw">FAO</span> 2006, 식량농업기구): <span class="kw">가용성·접근성·안정성·활용성</span> → SDG 2','주체: <span class="kw">FAO</span>(Food and Agriculture Organization, 식량농업기구; 4B 전략)·WFP(세계식량계획, 1961)·<span class="kw">IFAD</span>(국제농업개발기금, 1977 소농 중심)','곡물메이저 "ABCD"가 세계 곡물시장 약 80% 점유'],
     tip:'식량안보 4요소 "가·접·안·활"로 리듬 타서 외우기.' },
   bridge:{lead:'먹고사는 문제 다음은 "어떻게 다스리는가" — 거버넌스와 평화입니다.', nextPreview:'굿 거버넌스와 평화의 3단계를 배웁니다.'},
   quiz:[
    {t:'mc',q:'FAO(2006)가 제시한 식량안보 4요소가 아닌 것은?',choices:['가용성','접근성','안정성','수익성'],answer:3,hint:'돈 버는 것과는 거리가 멀어요.',ex:'식량안보 4요소는 가용성·접근성·안정성·활용성입니다.'},
    {t:'mc',q:'농업의 다원적 기능이 처음 언급된 국제회의는?',choices:['1992 리우회의','1996 세계식량정상회의','2000 다카르포럼','2015 아디스아바바'],answer:0,hint:'환경 정상회의.',ex:'농업의 다원적 기능은 1992년 리우회의에서 처음 언급되었습니다.'},
    {t:'mc',q:'1977년 설립되어 소농 중심 농촌개발에 주력하는 국제금융기구는?',choices:['FAO','WFP','IFAD','WTO'],answer:2,hint:'농업개발"기금".',ex:'IFAD(국제농업개발기금, 1977)는 소농·농촌 빈곤층 지원에 주력합니다.'},
    {t:'ox',q:'농촌개발은 농촌뿐 아니라 산촌·어촌을 포함하는 개념이다.',a:true,hint:'국제개발에서의 범위.',ex:'국제개발에서 농촌개발은 산촌·어촌을 포함합니다.'},
    {t:'free',q:'식량안보의 4가지 요소를 쓰시오.',keys:['가용성','접근성','안정성','활용성'],model:'가용성, 접근성, 안정성, 활용성.',hint:'가 / 접 / 안 / 활',ex:'가용성·접근성·안정성·활용성입니다.'},
    {t:'mc',q:'[적용] 불규칙한 강우 지역의 소농이 \'식량을 얻기 위한 일에 종사할 수 없는 위험\'에 처했다. 식량안보 4요소 중 무엇이 위협받는가?',choices:['가용성','접근성','안정성','활용성'],answer:2,hint:'위험의 강도.',ex:'생존 위험으로 식량 획득 활동에 종사하지 못할 위험은 식량의 안정성(stability)에 해당합니다.'}
   ]},
 { id:'a3l2', title:'식량 수급·기구·현황', en:'Food & Actors',
   concept:{ why:'농업 문제는 "수요는 왜 늘고 공급은 왜 불안한가"와 "어느 기구가 무엇을 하나"로 출제돼요. 다원적 기능 5종과 WFP·IFAD·세계은행의 역할을 정리합니다.',
     def:{term:'식량 수급·주체', body:'농업의 다원적 기능은 식량안보·사회·문화·환경·경제. 수요는 개도국 소득·인구 증가로 늘고, 공급은 이상기후로 불안정해진다.'},
     points:['농업 <span class="kw">다원적 기능 5종</span>: 식량안보·사회·문화·환경·경제 (보호적 기능 아님)','수요 급증: 개도국 소득↑·식생활 개선·인구↑·바이오연료 / 공급 불안: 이상기후, 농업용수 70%','<span class="kw">WFP</span>(World Food Programme, 세계식량계획, 1961): 세계 최대 인도주의 기관 / <span class="kw">IFAD</span>(국제농업개발기금, 1977): 소농 중심','식량안보 4요소: 안정성=위험 강도, 활용성=영양·위생 / CSV(Creating Shared Value, 공유가치창출; 포터, 2011): 기업활동 자체가 사회가치 창출'],
     tip:'WFP=가장 큰 인도주의기관(1961), IFAD=소농(1977). "보호적 기능"은 다원적 기능에 없다(함정)!' },
   bridge:{lead:'먹는 문제 다음은 다스리는 문제 — 거버넌스·평화입니다.', nextPreview:'굿 거버넌스와 측정지표로 이어집니다.'},
   quiz:[
    {t:'mc',q:'FAO가 분류한 농업의 다원적 기능에 해당하지 않는 것은?',choices:['식량안보 기능','사회적 기능','문화적 기능','보호적 기능'],answer:3,hint:'5가지를 떠올려요.',ex:'다원적 기능은 식량안보·사회·문화·환경·경제 기능입니다. 보호적 기능은 포함되지 않습니다.'},
    {t:'mc',q:'세계 식량 수요 급증의 원인으로 보기 어려운 것은?',choices:['개도국 소득 증가에 따른 식생활 개선','세계 인구 증가','바이오연료 생산 증가','농업이 국민경제에서 차지하는 비중이 크다는 점'],answer:3,hint:'그건 농업의 "개념" 설명이에요.',ex:'농업의 경제 비중 설명은 농림수산업의 개념이지 수요 급증의 원인이 아닙니다.'},
    {t:'mc',q:'세계식량계획(WFP)에 대한 설명으로 옳지 않은 것은?',choices:['1961년 설립된 UN 산하기구','세계에서 가장 작은 인도주의 기관','긴급상황과 빈곤지역에 식량 지원','FAO·IFAD와 긴밀히 협력'],answer:1,hint:'규모가 작을까요 클까요?',ex:'WFP는 세계에서 가장 큰 인도주의 기관입니다.'},
    {t:'ox',q:'국제농업개발기금(IFAD)은 세계식량회의(1974) 합의를 바탕으로 1977년 설립된 국제금융기구다.',a:true,hint:'소농 중심, 1977.',ex:'IFAD는 1977년 설립되어 농촌 빈곤층·소농 지원에 주력합니다.'},
    {t:'free',q:'식량을 획득하기 위한 일에 종사할 수 없는 위험의 강도를 나타내는 식량안보 요소는?',keys:['안정성'],model:'식량의 안정성(Food stability).',hint:'4요소 중 하나',ex:'식량의 안정성(stability)입니다.'}
   ]},
 { id:'a3l3', title:'세계 농업현황·대륙별 특징', en:'Regional Agriculture',
   concept:{ why:'농업 문제는 "대륙별 특징"과 "현황" 사실 확인에서 갈려요. 아시아·아프리카·중남미의 차이를 잡으면 함정 문제를 피할 수 있어요.',
     def:{term:'세계 농업현황', body:'산업화로 선진국 농업은 위축·고령화되고, 개도국은 대륙별로 농업 구조가 크게 다르다.'},
     points:['선진국: 산업화로 농업 위축, <span class="kw">농촌 고령화</span>·노동력 부족','아프리카: 농업기반·<span class="kw">소농 구조</span>·토질 저하, 가치사슬 미형성','중남미: <span class="kw">도시화 국가</span>, 대규모 상업농 / 아시아: 녹색혁명, 다양한 발전수준','<span class="kw">ICT</span>(Information & Communication Technology, 정보통신기술) 농촌지도: <span class="kw">인터넷·모바일</span> / SDG 2 = 식량안보'],
     tip:'아프리카=소농·토질저하, 중남미=도시화·상업농, 아시아=다양·녹색혁명. 대륙별 키워드 매칭!' },
   bridge:{lead:'농업을 마무리했어요. 다음은 거버넌스·평화입니다.', nextPreview:'거버넌스 분야로 이어집니다.'},
   quiz:[
    {t:'mc',q:'선진국 세계농업현황에 대한 설명으로 옳은 것은?',choices:['산업화로 농업이 위축되고 농촌 고령화가 문제','농업 비중이 계속 커지고 있다','농촌 인구가 빠르게 증가','농업 노동력이 과잉 상태'],answer:0,hint:'산업화의 결과.',ex:'산업화로 농업·농촌 부문의 노동력·자본 공급이 약화되어 농업이 위축되고 고령화가 문제됩니다.'},
    {t:'mc',q:'아프리카 대륙 농업의 특징으로 옳지 않은 것은?',choices:['대부분 농업기반 국가','소농 구조가 보편화','토질 저하·생산성 저하','지역마다 발전수준이 비슷해 패턴이 동일'],answer:3,hint:'다양성은 어느 대륙?',ex:'기후·식생이 다양해 발전수준·패턴이 다른 것은 아시아 특징입니다. 아프리카는 소농 구조·토질저하가 특징.'},
    {t:'mc',q:'최근 개도국 농촌지도(정보 제공)에서 주요 논의 대상이 되는 수단은?',choices:['TV와 라디오','신문과 농업지도사','인터넷과 모바일','우편'],answer:2,hint:'디지털 수단.',ex:'전통적 수단(TV·라디오 등)에서 인터넷·모바일로 농촌지도 수단이 이동하고 있습니다.'},
    {t:'ox',q:'식량안보는 지속가능발전목표(SDGs) 중 SDG 2에 해당한다.',a:true,hint:'기아 종식.',ex:'식량안보·기아 종식은 SDG 2입니다.'},
    {t:'free',q:'중남미 대륙 농업의 대표적 특징을 한 가지 쓰시오.',keys:['도시화'],model:'대부분 도시화 국가이며 대규모 상업농이 발달.',hint:'도시화 / 상업농',ex:'중남미는 도시화 국가가 많고 대규모 상업농이 발달했습니다.'}
   ]},
 { id:'a3l4', title:'농촌개발 주요 주체·전략', en:'Rural Actors & Strategy',
   concept:{ why:'농업 분야는 "어느 기구가 어떤 전략을 쓰나"가 출제돼요. FAO·WFP·IFAD의 전략 키워드를 구분하면 됩니다.',
     def:{term:'농촌개발 주체', body:'FAO·WFP·IFAD·세계은행·USAID·JICA 등이 각자의 전략으로 농업·농촌개발을 지원한다.'},
     points:['FAO 중기전략 <span class="kw">4B</span>: Better Production·Nutrition·Environment·Life. <span style="color:#888">→ 더 나은 생산·영양·환경·삶.</span>','WFP: 식량지원 5대 전략목표 / IFAD: <span class="kw">소농 중심</span> 농촌개발','USAID <span class="kw">Feed the Future</span>(미국 식량안보 이니셔티브; 2016 세계식량안보법 GFSA 법제화)','농업과 물: 농업이 전 세계 취수량의 <span class="kw">70%</span> → 통합물관리(IWRM, Integrated Water Resources Management)'],
     tip:'FAO=4B, USAID=Feed the Future, 농업 물 사용 70%. 기구-전략 매칭!' },
   bridge:{lead:'주체·전략을 봤으니, KOICA의 농촌 사례·과제로 이어집니다.', nextPreview:'농촌개발 KOICA 사례·과제로 이어집니다.'},
   quiz:[

    {t:'mc',q:'미국 USAID가 주도하는 식량안보 이니셔티브는?',choices:['Feed the Future','New Deal','Marshall Plan','Build Back Better'],answer:0,hint:'2016 GFSA 법제화.',ex:'Feed the Future는 USAID의 식량안보 이니셔티브로 2016년 세계식량안보법으로 법제화됐습니다.'},

    {t:'mc',q:'소농 중심 농촌개발에 주력하는 1977년 설립 국제금융기구는?',choices:['FAO','WFP','IFAD','WTO'],answer:2,hint:'농업개발기금.',ex:'IFAD(1977)는 소농 중심 농촌개발에 주력합니다.'},
    {t:'free',q:'FAO 중기전략의 핵심 \'4B\'를 쓰시오.',keys:['production','nutrition','environment','life'],model:'Better Production, Better Nutrition, Better Environment, Better Life.',hint:'생산·영양·환경·삶',ex:'Better Production·Nutrition·Environment·Life입니다.'}

{ id:'a5', title:'심화 5. 기후행동', source:'2과목', color:'#06d6a0', icon:'🌍', lessons:[
 { id:'a5l1', title:'기후위기와 국제 대응', en:'Climate Action',
   concept:{ why:'기후위기는 개도국에 더 가혹해요(기후 불평등). 교토의정서와 파리협정의 차이는 거의 매번 나오는 핵심입니다.',
     def:{term:'기후행동', body:'온실가스를 줄이는 "완화"와 영향을 줄이는 "적응"의 균형. 파리협정으로 모든 나라가 감축에 참여하게 됐다.'},
     points:['완화(배출 감축)·<span class="kw">적응</span>(영향 최소화)·탄소중립(순배출 0). <span style="color:#888">→ 완화=원인 줄이기, 적응=피해에 대비하기.</span>','1997 교토의정서(선진국 의무, 하향식) → 2015 <span class="kw">파리협정</span>(모든 나라, <span class="kw">상향식 NDC</span>, Nationally Determined Contribution·5년마다). <span style="color:#888">→ NDC=각 나라가 스스로 정해 제출하는 감축목표.</span>','기후저지선 <span class="kw">1.5℃</span>(2018 IPCC 특별보고서)','기금: GEF(지구환경금융) / <span class="kw">GCF(인천 송도)</span> — 감축:적응 50:50'],
     tip:'교토=선진국·하향식 / 파리=모든 나라·상향식(NDC). 이 대비가 핵심.' },
   bridge:{lead:'위기를 푸는 열쇠 중 하나가 기술이에요. 다음은 과학기술혁신입니다.', nextPreview:'과학기술혁신과 디지털 전환을 배웁니다.'},
   quiz:[
    {t:'mc',q:'2015년 채택되어 모든 나라가 자발적으로 감축목표(NDC)를 제출하는 협정은?',choices:['교토의정서','파리협정','몬트리올의정서','코펜하겐 합의'],answer:1,hint:'상향식·5년 주기.',ex:'2015년 파리협정은 상향식 NDC를 5년마다 제출하도록 합니다.'},
    {t:'mc',q:'기후변화 "적응(adaptation)"에 대한 설명으로 옳은 것은?',choices:['온실가스 배출을 직접 줄이는 것','기후위기 영향을 최소화·기회로 전환하는 활동','배출권을 거래하는 것','화석연료 보조금 확대'],answer:1,hint:'영향에 "적응"하는 것.',ex:'적응은 기후위기 영향을 최소화하거나 유익한 기회로 촉진하는 활동입니다.'},
    {t:'ox',q:'교토의정서는 모든 국가에, 파리협정은 선진국에만 감축의무를 부과한다.',a:false,hint:'정반대예요.',ex:'교토의정서는 선진국에, 파리협정은 모든 나라에 감축 책임을 둡니다.'},
    {t:'mc',q:'사무국이 인천 송도에 있는 기후 분야 국제기금은?',choices:['지구환경금융(GEF)','녹색기후기금(GCF)','적응기금','GAVI'],answer:1,hint:'한국이 유치했죠.',ex:'녹색기후기금(GCF) 사무국이 인천 송도에 있으며 감축:적응 재원이 50:50입니다.'},
    {t:'free',q:'교토의정서와 파리협정의 가장 큰 차이를 감축 주체 관점에서 쓰시오.',keys:['선진국','모든'],model:'교토의정서는 선진국에만 감축의무를 부과(하향식)했지만, 파리협정은 모든 나라가 자발적으로 감축(상향식 NDC)한다.',hint:'선진국만 vs 모든 나라',ex:'교토=선진국 의무, 파리=모든 나라 자발적 감축입니다.'},
    {t:'mc',q:'[적용] 해안 마을이 해수면 상승에 대비해 방조제를 쌓고 내염성 작물을 도입했다. 이는 기후행동 중 무엇인가?',choices:['완화(mitigation)','적응(adaptation)','탄소중립','배출권 거래'],answer:1,hint:'영향에 대비·대응.',ex:'영향을 최소화·대비하는 활동은 적응(adaptation)입니다. (배출을 줄이는 것은 완화)'}
   ]},

   quiz:[

 { id:'a5l3', title:'온실가스·탄소시장·KOICA', en:'GHG & Carbon Market',

{ id:'a7', title:'심화 7. 성평등', source:'2과목', color:'#f72585', icon:'⚧️', lessons:[
 { id:'a7l1', title:'성평등과 개발', en:'Gender Equality',
   concept:{ why:'"인류의 절반은 여성"입니다. 성평등은 그 자체로 목표이자 개발효과를 높이는 전략이에요. WID→GAD→성주류화의 발전 흐름이 핵심.',
     def:{term:'성평등', body:'젠더는 생물학적 성+사회문화적 성. 성평등은 SDG 5의 목표이자 개발의 수단으로 다뤄진다.'},
     points:['접근 발전: <span class="kw">WID</span>(Women in Development, 개발 속 여성) → <span class="kw">GAD</span>(Gender and Development, 젠더와 개발·구조·권한강화) → <span class="kw">성주류화</span>. <span style="color:#888">→ \'여성을 끼워 넣기\'에서 \'구조를 바꾸기\', \'모든 정책에 젠더 관점\'으로 발전.</span>','실질적 vs 전략적 젠더 수요. <span style="color:#888">→ 실질적=기존 역할 내 필요(여성 직업훈련), 전략적=역할·구조를 바꾸는 필요(할당제 등).</span>','규범: <span class="kw">CEDAW</span>(여성차별철폐협약, 1979)·1995 베이징 행동강령','OECD <span class="kw">젠더마커</span>(2=주요목적·1=중요목적·0)'],
     tip:'WID→GAD→성주류화 "발전 순서"와 젠더마커 2/1/0이 단골.' },
   bridge:{lead:'성평등은 결국 "사람의 권리" 이야기죠. 마지막 분야, 인권으로 마무리합니다.', nextPreview:'인권과 인권기반접근(HRBA)을 배웁니다.'},
   quiz:[
    {t:'mc',q:'WID의 한계를 비판하며 구조적 문제와 여성의 권한 강화에 주목한 접근은?',choices:['GAD','성 중립','이중트랙','SIGI'],answer:0,hint:'Gender And Development.',ex:'GAD(젠더와 개발)는 WID를 비판하며 구조적 문제·권한 강화를 강조했습니다.'},
    {t:'mc',q:'성평등이 사업의 "주요 목적"인 경우 부여하는 OECD 젠더마커 값은?',choices:['0','1','2','3'],answer:2,hint:'주요=Principal=2.',ex:'젠더마커 2는 성평등을 주요 목적(Principal)으로 하는 사업입니다.'},
    {t:'ox',q:'CEDAW(여성차별철폐협약)는 1979년에 채택되었다.',a:true,hint:'1970년대 후반.',ex:'CEDAW는 1979년 채택되어 모든 인권 범주를 포괄합니다.'},
    {t:'mc',q:'성평등 접근 방법의 발전 순서로 옳은 것은?',choices:['성주류화 → GAD → WID','WID → GAD → 성주류화','GAD → WID → 성주류화','WID → 성주류화 → GAD'],answer:1,hint:'"여성을 개발에" 넣는 게 먼저.',ex:'WID(여성을 개발에) → GAD(구조·권한) → 성주류화 순으로 발전했습니다.'},
    {t:'free',q:'성평등 접근의 발전 흐름을 순서대로 쓰시오.',keys:['WID','GAD','주류화'],model:'WID(개발과 여성) → GAD(젠더와 개발) → 성주류화.',hint:'WID / GAD / 성주류화',ex:'WID→GAD→성주류화입니다.'},
    {t:'mc',q:'[적용] 어느 사업이 여성을 \'개발의 대상\'으로 포함시키는 데 초점을 두었다. 이는 어떤 접근에 가까운가?',choices:['WID(개발과 여성)','GAD(젠더와 개발)','성 중립적 접근','이중트랙'],answer:0,hint:'여성을 개발에 \'포함\'.',ex:'여성을 개발에 포함시키는 데 초점을 두면 WID에 가깝습니다. (구조·권한 강화에 주목하면 GAD)'}
   ]},

{ id:'aenv', title:'심화 8. 환경', source:'2과목', color:'#2a9d8f', icon:'🌳', lessons:[
 { id:'aenvl1', title:'환경과 국제개발', en:'Environment',
   concept:{ why:'개발과 환경은 자주 충돌해요. 댐을 지으면 전기를 얻지만 숲이 잠기죠. 그래서 "개발하되 환경을 해치지 않는" 장치(환경평가)와 역사적 환경 사건들이 시험에 꾸준히 나옵니다.',
     def:{term:'환경 분야', body:'대기·수질·토양 오염과 삼림파괴·생물다양성 감소 등을 다루며, 경제·사회·환경의 균형(지속가능발전)을 추구하는 분야.'},
     points:['20세기 3대 오염: <span class="kw">대기·수질·토양</span> (산림오염 아님)','역사적 사건: 런던스모그(1952, 대기)·미나마타병(메틸수은)·울산공단(우리나라 최초 공해)','<span class="kw">환경영향평가(EIA)</span>: 개별 사업의 환경영향 평가 / <span class="kw">전략적 환경평가(SEA)</span>: 정책·계획 상위단계','<span class="kw">기후불의</span>: 책임 적은 최빈국이 피해를 더 받는 불일치'],
     tip:'EIA=사업(프로젝트) 단위 / SEA=정책·계획 상위 단계. "상위=Strategic"으로 연결!' },
   bridge:{lead:'환경을 지키는 국제 장치와 기금(GEF·GGGI·GCF)이 이어집니다.', nextPreview:'환경 분야 국제기구·협약과 기후행동으로 이어집니다.'},
   quiz:[

    {t:'mc',q:'1952년 연료 연소로 발생한 이산화황이 안개와 결합해 2주에 4천여 명이 사망한 사건은?',choices:['미나마타병','이타이이타이병','런던스모그','크롬 중독'],answer:2,hint:'영국 수도의 안개.',ex:'런던스모그(1952)는 황산미스트로 단기간에 수천 명이 사망한 대기오염 사건입니다.'},
    {t:'mc',q:'개별 개발사업이 환경에 미칠 영향을 조사·평가하는 도구는?',choices:['환경주류화','환경영향평가(EIA)','전략적 환경평가(SEA)','녹색기후기금(GCF)'],answer:1,hint:'프로젝트 단위 평가.',ex:'EIA는 개별 사업의 환경영향을 평가하고, SEA는 정책·계획 등 상위 단계를 다룹니다.'},
    {t:'ox',q:'전략적 환경평가(SEA)는 개별 프로젝트보다 상위인 정책·계획·프로그램 단계의 환경 영향을 다룬다.',a:true,hint:'"Strategic=상위 전략".',ex:'SEA는 정책·계획·프로그램 등 상위 단계에서 환경을 고려하는 도구입니다.'},
    {t:'free',q:'"기후불의(Climate Injustice)"가 무엇인지 한 문장으로 설명하시오.',keys:['책임','최빈국','피해'],model:'기후변화에 책임이 가장 적은 최빈국·약자에게 기후재난 피해가 집중되는, 책임과 피해의 불일치 상황.',hint:'책임 적은 나라 / 피해 큼',ex:'책임이 적은 최빈국·사회적 약자에게 피해가 집중되는 불일치가 기후불의입니다.'}
   ]},
 { id:'aenvl2', title:'환경 국제기구와 협약', en:'Env Institutions',
   concept:{ why:'환경은 "돈"과 "약속"으로 움직여요. 어떤 기금이 언제 생겼고, 한국이 유치한 기구(GGGI·GCF)가 무엇인지가 단골 문제입니다.',
     def:{term:'환경 거버넌스', body:'국제 환경기금·연구기구·정상회의를 통해 지속가능발전을 추진하는 체계.'},
     points:['<span class="kw">GEF(지구환경금융)</span>: 1991년 세계은행 10억$ 시범프로그램으로 설립','<span class="kw">GGGI(글로벌녹색성장연구소)</span>: 2010년 한국 민법 제3조 비영리단체 → 2012 국제기구 전환','한국: 2008 <span class="kw">저탄소 녹색성장</span> 국가비전, 2000 지속가능발전위원회','2002 요하네스버그 <span class="kw">WSSD</span>(세계지속가능발전정상회의), 1992 리우회의'],
     tip:'한국발 환경기구: GGGI(2010, 연구소)·GCF(송도, 기금). "녹색성장=한국 브랜드"로 기억!' },
   bridge:{lead:'환경 다음은 그 핵심인 기후행동입니다.', nextPreview:'기후위기 대응과 파리협정으로 이어집니다.'},
   quiz:[
    {t:'mc',q:'1991년 세계은행의 10억 달러 규모 시범 프로그램으로 설립된, 가장 포괄적인 환경 국제기금은?',choices:['GCF','GEF(지구환경금융)','GGGI','KOICA'],answer:1,hint:'가장 오래되고 포괄적인 환경기금.',ex:'지구환경금융(GEF)은 1991년 세계은행 시범 프로그램으로 설립되었습니다.'},
    {t:'mc',q:'2010년 한국 민법 제3조에 의해 비영리단체로 출범해 2012년 국제기구로 전환된 녹색성장 연구기구는?',choices:['GEF','GGGI(글로벌녹색성장연구소)','GCF','UNEP'],answer:1,hint:'한국이 주도한 "녹색성장" 연구소.',ex:'GGGI는 2010년 한국 민법 제3조 비영리단체로 출범 후 2012년 국제기구가 되었습니다.'},
    {t:'mc',q:'2002년 남아프리카공화국 요하네스버그에서 개최된 회의는?',choices:['리우회의','WSSD(세계지속가능발전정상회의)','교토 COP3','스톡홀름 회의'],answer:1,hint:'리우+10에 해당.',ex:'2002년 요하네스버그에서 WSSD가 개최되었습니다.'},
    {t:'ox',q:'한국은 2008년 "저탄소 녹색성장"을 국가비전으로 선포했다.',a:true,hint:'2008년 새 국가비전.',ex:'2008년 저탄소 녹색성장을 국가비전으로 선포해 저탄소·자원절약형 체계를 추진했습니다.'},
    {t:'free',q:'한국이 유치·주도한 환경 분야 국제기구 2개를 쓰시오.',keys:['GGGI','GCF'],model:'글로벌녹색성장연구소(GGGI), 녹색기후기금(GCF).',hint:'녹색성장연구소 / 녹색기후기금',ex:'GGGI와 GCF(송도)가 대표적입니다.'}
   ]},
 { id:'aenvl3', title:'환경 국제논의의 역사', en:'History of Env Governance',
   concept:{ why:'환경은 국제회의·협약의 연도와 산물이 단골이에요. 스톡홀름부터 리우까지 흐름을 잡습니다.',
     def:{term:'환경 국제논의', body:'1972 스톡홀름 회의로 시작해 1992 리우회의에서 3대 협약이 채택되며 환경 거버넌스가 발전했다.'},
     points:['1972 스톡홀름 <span class="kw">유엔인간환경회의(UNCHE)</span> → UNEP(유엔환경계획) 설립, 람사르·런던협약·CITES(멸종위기종 거래협약)','1992 리우 <span class="kw">UNCED</span>(유엔환경개발회의) → 3대 리우협약(<span class="kw">기후변화·생물다양성·사막화방지</span>), 의제21','환경주류화: <span class="kw">EIA</span>(사업)·<span class="kw">SEA</span>(정책·계획) / OECD 리우마커','한국: 2000 지속가능발전위원회, 2008 저탄소 녹색성장, MDGs 7=지속가능 환경'],
     tip:'1972 스톡홀름(첫 환경회의→UNEP), 1992 리우(3대 협약). 리우 3협약=기후·생물다양성·사막화!' },
   bridge:{lead:'환경을 깊게 마쳤어요. 다음 분야로 이어집니다.', nextPreview:'다음 분야로 이어집니다.'},
   quiz:[
    {t:'mc',q:'환경을 주제로 한 최초의 국제회의(1972)와 그 산물로 옳은 것은?',choices:['리우회의 → 의제21','스톡홀름 UNCHE → UNEP 설립','요하네스버그 → WSSD','교토 → 교토의정서'],answer:1,hint:'\'단 하나뿐인 지구\'.',ex:'1972년 스톡홀름 유엔인간환경회의(UNCHE)는 UNEP 설립으로 이어졌습니다.'},
    {t:'mc',q:'1992년 리우회의(UNCED)에서 채택된 3대 리우협약이 아닌 것은?',choices:['기후변화협약','생물다양성협약','사막화방지협약','오존층보호협약'],answer:3,hint:'리우 3협약.',ex:'리우 3대 협약은 기후변화·생물다양성·사막화방지 협약입니다.'},
    {t:'ox',q:'전략적 환경평가(SEA)는 정책·계획 등 상위 단계의 환경영향을 다룬다.',a:true,hint:'EIA=사업, SEA=상위.',ex:'SEA는 정책·계획·프로그램 등 상위 단계를 다루고, EIA는 개별 사업을 다룹니다.'},
    {t:'mc',q:'MDGs 8개 목표 중 환경과 직접 관련된 목표는?',choices:['목표 1(빈곤)','목표 4(아동사망률)','목표 7(지속가능한 환경)','목표 8(글로벌 파트너십)'],answer:2,hint:'지속가능 환경.',ex:'MDGs 목표 7이 지속가능한 환경 확보입니다.'},
    {t:'free',q:'1992년 리우회의에서 채택된 3대 협약을 쓰시오.',keys:['기후변화','생물다양성','사막화'],model:'기후변화협약, 생물다양성협약, 사막화방지협약.',hint:'기후 / 생물다양성 / 사막화',ex:'기후변화·생물다양성·사막화방지 협약입니다.'}
   ]}
]},
{ id:'a8', title:'심화 9. 인권', source:'2과목', color:'#4361ee', icon:'✊', lessons:[
 { id:'a8l1', title:'인권과 개발', en:'Human Rights',
   concept:{ why:'2과목의 마지막. 개발과 인권은 따로 놀다가 만났어요. 아마르티아 센이 "인권 실현이 곧 개발의 목적"이라 연결했죠. 1과목의 빈곤 개념과 다시 만나는 지점이에요.',
     def:{term:'인권과 개발', body:'인권은 보편·양도불가·불가분·상호의존적. 국가는 인권을 존중·보호·충족할 의무가 있으며, 개발에 인권기반접근(HRBA)을 적용한다.'},
     points:['특성: <span class="kw">보편성·양도불가능·불가분성·상호의존성</span>. <span style="color:#888">→ 누구나(보편)·뺏을 수 없고(양도불가)·나눌 수 없으며(불가분)·서로 연결됨(상호의존).</span>','국가 의무: <span class="kw">존중·보호·충족</span>','1968 UN <span class="kw">발전권 선언</span> → 발전을 인권의 언어로','아마르티아 센: 인권 실현이 개발의 목적이자 수단 → <span class="kw">인권기반접근(HRBA</span>, Human Rights Based Approach)'],
     tip:'국가의 인권 3대 의무 "존중·보호·충족"은 거의 매번 나오는 보기 함정.' },
   bridge:{lead:'2과목까지 완주! 이제 복습 탭에서 약점을 다지고, 학습계획대로 마무리하면 합격이 보여요. 🎉', nextPreview:'전체 과정을 한 바퀴 돌았습니다. 복습으로 장기기억을 굳히세요.'},
   quiz:[
    {t:'mc',q:'국가의 인권 의무 3가지에 해당하지 않는 것은?',choices:['존중의 의무','보호의 의무','충족의 의무','처벌의 의무'],answer:3,hint:'국가가 "지키고 막고 채우는" 것.',ex:'국가의 인권 의무는 존중·보호·충족입니다.'},
    {t:'mc',q:'인권의 기본 특성으로 보기 어려운 것은?',choices:['보편성','양도 가능성','불가분성','상호 의존성'],answer:1,hint:'팔거나 넘길 수 있을까요?',ex:'인권은 양도 불가능(inalienable)합니다.'},
    {t:'ox',q:'1968년 UN 발전권 선언은 발전을 인권의 언어로 정의하는 계기가 되었다.',a:true,hint:'발전 + 권리.',ex:'1968년 UN 발전권 선언이 인권과 개발의 접합점을 마련했습니다.'},
    {t:'mc',q:'빈곤을 "기회와 권력의 박탈"로 보고 인권 실현이 개발의 목적이자 수단이라 강조한 학자는?',choices:['로스토','아마르티아 센','폴 콜리어','챔버스'],answer:1,hint:'1과목 빈곤 단원의 그 학자.',ex:'아마르티아 센은 인권 실현을 개발의 목적이자 수단으로 강조했습니다.'},
    {t:'free',q:'국가가 지는 인권 의무 3가지를 쓰시오.',keys:['존중','보호','충족'],model:'존중의 의무, 보호의 의무, 충족의 의무.',hint:'존중 / 보호 / 충족',ex:'존중·보호·충족입니다.'},
    {t:'mc',q:'[적용] 국가가 시민의 표현의 자유를 침해하지 않아야 하는 의무는 주로 어떤 권리와 관련되는가?',choices:['자유권(시민·정치적 권리)','사회권(경제·사회·문화적 권리)','연대권(제3세대)','수급권'],answer:0,hint:'국가의 \'침해 금지\'.',ex:'표현의 자유 등 국가의 침해 금지 의무는 자유권(1세대, 시민·정치적 권리)과 관련됩니다.'}
   ]},
 { id:'a8l2', title:'인권의 분류·접근 심화', en:'Rights Classification',
   concept:{ why:'인권 문제는 "정의·특성·세대별 분류·HRBA"에서 갈려요. 자유권과 사회권, 3세대 인권, 인권기반접근을 정리하면 마무리됩니다.',
     def:{term:'인권의 분류', body:'UN은 인권을 "기본적 자유·권리·존엄에 대한 침해로부터 개인·집단을 보호하는 보편적 법적 보장"으로 정의한다.'},
     points:['1993 빈 <span class="kw">세계인권회의</span>에서 인권의 기본 성격 선언','특성: 보편성·불가분성·평등·상호의존성 (평등=\'빵과 자유\'의 핵심가치)','3세대 인권: 1세대 <span class="kw">자유권</span> / 2세대 <span class="kw">사회권</span> / 3세대 <span class="kw">연대권</span>(발전권·평화권·환경권). <span style="color:#888">→ 자유권=국가 침해 금지(소극), 사회권=국가가 적극 제공, 연대권=집단의 권리.</span>','<span class="kw">인권기반접근(HRBA)</span>: 개발에 인권 원칙을 통합'],
     tip:'자유권=국가가 침해 안 하기(소극적), 사회권=국가가 적극 제공. 3세대=발전·평화·환경(집단 권리)!' },
   bridge:{lead:'2과목까지 완주! 복습 탭에서 약점을 다지면 합격이 보여요. 🎉', nextPreview:'전 과정을 한 바퀴 돌았습니다. 복습으로 장기기억을 굳히세요.'},
   quiz:[
    {t:'mc',q:'UN이 정의한 인권 개념으로 가장 옳은 것은?',choices:['인간의 권리를 줄인 말','기본적 자유·권리·존엄 침해로부터 개인·집단을 보호하는 보편적 법적 보장','국가가 시혜적으로 주는 특권','헌법에만 규정된 권리'],answer:1,hint:'"보편적 법적 보장".',ex:'UN은 인권을 침해로부터 개인·집단을 보호하는 보편적 법적 보장으로 정의합니다.'},
    {t:'mc',q:'\'제3세대 인권\'에 해당하는 권리로 묶인 것은?',choices:['자유권·참정권','사회권·노동권','발전권·평화권·환경권','재산권·계약권'],answer:2,hint:'집단의 연대 권리.',ex:'발전권·평화권·환경권 등이 제3세대(연대의) 인권으로 분류됩니다.'},
    {t:'mc',q:'인권의 기본 성격을 선언한 1993년 회의는?',choices:['빈 세계인권회의','베이징 세계여성회의','리우회의','다카르 세계교육포럼'],answer:0,hint:'오스트리아 수도.',ex:'1993년 빈 세계인권회의에서 인권의 기본 성격이 선언되었습니다.'},
    {t:'ox',q:'자유권 영역에서 국가는 종종 인권의 직접적 침해자가 되고, 사회권 영역에서는 의무를 적극 이행하지 않는 경향이 있다.',a:true,hint:'자유권=소극적, 사회권=적극적 의무.',ex:'자유권은 국가의 침해가, 사회권은 국가의 소극적 이행이 문제되곤 합니다.'},

/* ===================== 효과음 (Web Audio) ===================== */
let AC=null;
function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}}return AC;}
function tone(freq,dur,type='sine',vol=.18,delay=0){
  if(!CFG.sound)return; const c=ac(); if(!c)return;
  const o=c.createOscillator(),g=c.createGain();
  o.type=type;o.frequency.value=freq;o.connect(g);g.connect(c.destination);
  const t=c.currentTime+delay;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.01);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.start(t);o.stop(t+dur+.02);
}
const SND={
  click:()=>tone(330,.06,'triangle',.10),
  select:()=>tone(520,.07,'sine',.12),
  correct:()=>{tone(660,.10,'sine',.16,0);tone(880,.14,'sine',.16,.09);},
  wrong:()=>{tone(196,.18,'sawtooth',.12,0);tone(155,.22,'sawtooth',.10,.10);},
  partial:()=>{tone(523,.10,'sine',.14,0);tone(587,.12,'sine',.12,.10);},
  complete:()=>{[523,659,784,1047].forEach((f,i)=>tone(f,.16,'sine',.16,i*.10));},
  tab:()=>tone(440,.05,'triangle',.08)
};

function lp(id){return S.progress[id]||{status:'locked',best:0};}
function todayStr(){return new Date().toISOString().slice(0,10);}
function daysBetween(a,b){return Math.round((b-a)/864e5);}
function fmtDate(d){return `${d.getMonth()+1}/${d.getDate()}`;}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1900);}

/* 콘텐츠 정규화: 구·신 스키마 모두 지원 */
function quizItems(l){return (l.quiz||[]).map(q=>({
  t:q.t||(q.choices?'mc':(q.a===true||q.a===false?'ox':'free')),
  q:q.q, choices:q.choices||q.c, a:(q.answer!==undefined?q.answer:q.a),
  keys:q.keys||[], model:q.model||'', hint:q.hint||'', ex:q.ex||q.explain||''
}));}

/* ===================== 학습계획 ===================== */
function buildPlan(){
  const su=S.setup,total=allLessons().length;
  const exam=new Date(su.examDate+'T00:00:00'),today=new Date(todayStr()+'T00:00:00');
  let dleft=Math.max(1,daysBetween(today,exam));
  const g=GRADES[su.grade];
  const learnDays=Math.max(1,Math.round(dleft*(1-g.buffer)));
  const perDay=Math.max(1,Math.ceil(total/learnDays));
  return {total,daysLeft:dleft,learnDays,perDay,reviewDays:dleft-learnDays,exam,today,pass:g.pass};
}

/* ===================== 진도 초기화 ===================== */
function initProgress(){
  if(!S.setup)return;
  const ls=allLessons();
  ls.forEach((x,i)=>{if(!S.progress[x.lesson.id])S.progress[x.lesson.id]={status:i===0?'active':'locked',best:0};});
  let prevDone=true;
  ls.forEach(x=>{const st=S.progress[x.lesson.id];
    if(st.status==='done'){prevDone=true;}
    else{if(prevDone&&st.status==='locked')st.status='active';prevDone=false;}});
  save();
}

/* ===================== 레슨: 개념 ===================== */
function conceptCards(l){

    return c.map(card=>({cls:'def',h:card.h||'개념',html:(card.body?`<p>${card.body}</p>`:'')+(card.points?`<ul>${card.points.map(p=>`<li>${p}</li>`).join('')}</ul>`:'')}));

  if(c.why)cards.push({cls:'why',h:'🤔 왜 중요할까?',html:`<p>${c.why}</p>`});
  if(c.def)cards.push({cls:'def',h:'📖 핵심 정의',html:`<p><span class="term">${c.def.term}</span> — ${c.def.body}</p>`});
  if(c.points)cards.push({cls:'pts',h:'✅ 요점 정리',html:`<ul>${c.points.map(p=>`<li>${p}</li>`).join('')}</ul>`+(c.tip?'':'')});
  if(c.tip)cards.push({cls:'tip',h:'🧠 암기 팁',html:`<p>${c.tip}</p>`});
  return cards;
}
function openLesson(id){const x=allLessons().find(a=>a.lesson.id===id);if(!x)return;CUR=x;renderConcept(0);}

   <div class="concept"><div class="lt">${l.title}</div>${l.en?`<div class="le">${l.en}</div>`:'<div class="le"></div>'}
     ${cards.slice(0,i+1).map(c=>`<div class="ccard ${c.cls}"><div class="ch">${c.h}</div>${c.html}</div>`).join('')}</div>
